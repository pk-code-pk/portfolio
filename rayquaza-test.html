<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>rayquaza viewer · test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #060812; color: #aab; overflow: hidden;
                 font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    #c { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed; top: 12px; left: 14px;
      font-size: 11px; letter-spacing: 0.04em; line-height: 1.6;
      color: rgba(255,255,255,0.55); pointer-events: none;
      background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 4px;
    }
    .toggle {
      position: fixed; top: 12px; right: 14px; display: flex; gap: 8px;
      font-size: 11px;
    }
    .toggle button {
      background: rgba(0,0,0,0.55); color: #fff; border: 1px solid #2a2d3a;
      padding: 6px 10px; cursor: pointer; font-family: inherit;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .toggle button.active { background: #1c2542; border-color: #4a6cff; }
    #status { position: fixed; bottom: 12px; left: 14px;
              font-size: 13px; color: rgba(255,255,255,0.9);
              background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 4px;
              max-width: 80vw; word-break: break-word; }
    #err { position: fixed; inset: auto 14px 60px 14px; color: #ff8585;
           background: rgba(40,0,0,0.85); padding: 10px 14px; border-radius: 4px;
           font-size: 12px; display: none; white-space: pre-wrap; max-height: 40vh; overflow: auto; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hud">
    drag · orbit<br>
    scroll · zoom<br>
    right-drag · pan
  </div>

  <div class="toggle">
    <button id="btn-wireframe">wireframe</button>
    <button id="btn-spin" class="active">spin</button>
  </div>

  <div id="status">loading…</div>
  <div id="err"></div>

  <script>
    // catch any script error and show it on screen so we don't need devtools
    const errEl = document.getElementById('err');
    function showErr(msg) {
      errEl.style.display = 'block';
      errEl.textContent = (errEl.textContent ? errEl.textContent + '\n\n' : '') + msg;
    }
    window.addEventListener('error', e => showErr('Error: ' + e.message + (e.filename ? '\n  at ' + e.filename + ':' + e.lineno : '')));
    window.addEventListener('unhandledrejection', e => showErr('Promise rejection: ' + (e.reason?.message || e.reason)));
  </script>

  <script type="module">
    const canvas = document.getElementById('c');
    const status = document.getElementById('status');
    const log = (m) => { status.textContent = m; console.log('[ray]', m); };

    log('importing three.js…');
    let THREE, GLTFLoader, OrbitControls, RoomEnvironment;
    try {
      THREE          = await import('https://esm.sh/three@0.160');
      ({ GLTFLoader }      = await import('https://esm.sh/three@0.160/examples/jsm/loaders/GLTFLoader.js'));
      ({ OrbitControls }   = await import('https://esm.sh/three@0.160/examples/jsm/controls/OrbitControls.js'));
      ({ RoomEnvironment } = await import('https://esm.sh/three@0.160/examples/jsm/environments/RoomEnvironment.js'));
      log('imports ok — initializing scene');
    } catch (e) {
      log('import failed: ' + (e.message || e));
      throw e;
    }

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.3;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#06080f');

    // image-based lighting: PBR materials (especially metallic ones) need
    // an environment to reflect, or they read pitch black. RoomEnvironment
    // is a built-in procedural studio that gives every material a natural
    // light bath — fixes the "dark statue" look on the GLB.
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    // gentle starfield so it doesn't feel like a void
    {
      const g = new THREE.BufferGeometry();
      const N = 1200;
      const arr = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const r = 200 + Math.random() * 300;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        arr[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
        arr[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        arr[i*3+2] = r * Math.cos(phi);
      }
      g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
      const m = new THREE.PointsMaterial({ size: 0.6, color: 0x8aa0ff, transparent: true, opacity: 0.7 });
      scene.add(new THREE.Points(g, m));
    }

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 4, 40);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    // diagnostic test cube — visible immediately so we can confirm the
    // render pipeline works even if model loading later fails. Removed
    // when the model is in.
    const testCube = new THREE.Mesh(
      new THREE.BoxGeometry(6, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x4a6cff, roughness: 0.4, metalness: 0.1 })
    );
    scene.add(testCube);
    log('test cube visible · waiting on model');

    // PBR-friendly lighting — GLB ships with proper materials, so we let
    // them shine instead of replacing them.
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const key = new THREE.DirectionalLight(0xffffff, 2.2);
    key.position.set(8, 14, 10);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xb6c8ff, 0.9);
    fill.position.set(-12, 4, 8);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xff8a3a, 0.7);
    rim.position.set(-8, 8, -14);
    scene.add(rim);
    scene.add(new THREE.HemisphereLight(0x8aa0ff, 0x1a1a2e, 0.4));

    let model = null;
    let mixer = null;
    let wireframe = false;
    let spinning = true;
    const clock = new THREE.Clock();

    new GLTFLoader().load('rayquaza/rayquaza.glb',
      (gltf) => {
        log('GLB parsed · normalizing…');
        model = gltf.scene;

        // remove the diagnostic test cube
        scene.remove(testCube);

        // normalize size + center on origin
        const box  = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3()).length();
        if (!isFinite(size) || size === 0) {
          log('model has zero bounding box — possibly empty scene graph');
          return;
        }
        const scale = 28 / size;
        model.scale.setScalar(scale);
        const center = box.getCenter(new THREE.Vector3()).multiplyScalar(scale);
        model.position.sub(center);

        scene.add(model);

        // re-aim the camera at the model with a sensible distance so the
        // user doesn't have to orbit-hunt to find it.
        const fittedBox    = new THREE.Box3().setFromObject(model);
        const fittedSize   = fittedBox.getSize(new THREE.Vector3()).length();
        const fittedCenter = fittedBox.getCenter(new THREE.Vector3());
        const camDist = fittedSize * 1.2;
        camera.position.set(camDist * 0.3, fittedCenter.y + camDist * 0.15, camDist);
        camera.lookAt(fittedCenter);
        camera.near = camDist / 100;
        camera.far  = camDist * 100;
        camera.updateProjectionMatrix();
        controls.target.copy(fittedCenter);
        controls.update();

        // play any baked-in animations
        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(a => mixer.clipAction(a).play());
        }

        const tris = countTris(model);
        const anims = gltf.animations?.length || 0;
        log(`loaded · ${Math.round(tris/1000)}k tris · ${anims} animation${anims === 1 ? '' : 's'} · raw size ${size.toFixed(1)}`);
      },
      (xhr) => {
        if (xhr.total) log(`loading  ${Math.round(xhr.loaded / xhr.total * 100)}%  (${xhr.loaded} / ${xhr.total})`);
        else           log(`loading  ${xhr.loaded} bytes`);
      },
      (err) => {
        log('GLTFLoader error: ' + (err.message || err));
        console.error(err);
      }
    );

    function countTris(root) {
      let n = 0;
      root.traverse(o => {
        if (o.geometry?.index)                  n += o.geometry.index.count / 3;
        else if (o.geometry?.attributes?.position) n += o.geometry.attributes.position.count / 3;
      });
      return n;
    }

    function applyWireframe() {
      if (!model) return;
      model.traverse(o => {
        if (o.isMesh) {
          const mats = Array.isArray(o.material) ? o.material : [o.material];
          mats.forEach(m => { if (m) m.wireframe = wireframe; });
        }
      });
    }

    document.getElementById('btn-wireframe').onclick = (e) => {
      wireframe = !wireframe;
      e.currentTarget.classList.toggle('active', wireframe);
      applyWireframe();
    };
    document.getElementById('btn-spin').onclick = (e) => {
      spinning = !spinning;
      e.currentTarget.classList.toggle('active', spinning);
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function tick() {
      requestAnimationFrame(tick);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      if (model && spinning) {
        model.rotation.y += 0.004;
        model.position.y = Math.sin(performance.now() * 0.0008) * 0.6;
      }
      controls.update();
      renderer.render(scene, camera);
    }
    tick();
  </script>
</body>
</html>
