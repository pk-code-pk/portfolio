<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>rayquaza · flying (clean)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
                 font-family: ui-monospace, 'SF Mono', Menlo, monospace; color: #fff; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #status { position: fixed; bottom: 22px; left: 24px;
              pointer-events: none; text-transform: lowercase; line-height: 1.05;
              display: flex; align-items: center; gap: 14px; }
    #status .st-logo {
      width: clamp(40px, 5vw, 60px); height: auto; display: block;
      /* black-and-white logo → invert to white, then screen-blend so it
         reads as a clean luminous mark floating on the dark scene. */
      filter: invert(1) brightness(1.6);
      mix-blend-mode: screen;
      opacity: 0.9;
    }
    #status .st-text { display: flex; flex-direction: column; }
    #status .st-main {
      font-family: 'Hanken Grotesk', sans-serif;
      font-weight: 800; letter-spacing: -.025em;
      font-size: clamp(1.5rem, 2.8vw, 2.3rem);
      color: rgba(255,255,255,0.95);
    }
    #status .st-sub {
      margin-top: 4px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: .6rem; letter-spacing: .28em;
      color: rgba(255,255,255,0.5);
    }
    #err    { position: fixed; left: 14px; right: 14px; top: 14px;
              background: rgba(60,0,0,0.85); color: #ffd0d0; font-size: 12px;
              padding: 10px 14px; border-radius: 4px; white-space: pre-wrap;
              display: none; max-height: 50vh; overflow: auto; z-index: 10; }

    /* music player — bottom-center, blur backdrop */
    #music-player {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 18px;
      padding: 10px 18px;
      background: rgba(10, 12, 22, 0.55);
      backdrop-filter: blur(14px) saturate(120%);
      -webkit-backdrop-filter: blur(14px) saturate(120%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      z-index: 5;
      user-select: none;
    }
    #music-toggle {
      background: none; border: none; padding: 4px;
      color: rgba(255,255,255,0.8); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color .25s, transform .2s;
    }
    #music-toggle:hover { color: #fff; transform: scale(1.08); }
    #music-toggle svg { width: 18px; height: 18px; display: block; }

    /* GYARADOS pose tuner — dark glassy panel matching the player bar */
    /* pokemon switch — mirrors the music-toggle look, sits in the same bar */
    #poke-toggle {
      background: none; border: none; padding: 4px 8px;
      color: rgba(255,255,255,0.8); cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: .62rem; letter-spacing: .14em; text-transform: lowercase;
      transition: color .25s, transform .2s;
      border-left: 1px solid rgba(255,255,255,0.10);
    }
    #poke-toggle:hover { color: #fff; transform: scale(1.06); }
    #poke-toggle:disabled { opacity: .45; cursor: progress; }
    #poke-toggle svg { width: 16px; height: 16px; display: block; }
    #poke-toggle .poke-name { min-width: 56px; text-align: left; }

    /* ElasticSlider — vanilla port of React Bits component */
    .slider-wrapper {
      display: flex; align-items: center; gap: 12px;
      width: 200px; touch-action: none; user-select: none;
      transition: transform .22s cubic-bezier(.23,1,.32,1), opacity .22s;
      opacity: 0.7;
    }
    .slider-wrapper.is-hover { transform: scale(1.18); opacity: 1; }
    .slider-wrapper .vol-icon {
      width: 16px; height: 16px; color: rgba(255,255,255,0.65);
      display: flex; align-items: center; justify-content: center;
      transform: translateX(0);
      transition: transform .22s cubic-bezier(.23,1,.32,1);
    }
    .slider-wrapper .vol-icon svg { width: 16px; height: 16px; display: block; }
    .slider-root {
      position: relative; flex: 1;
      cursor: grab; padding: 14px 0;
      touch-action: none;
    }
    .slider-root:active { cursor: grabbing; }
    .slider-track-wrap {
      transform-origin: center;
      transition: height .22s ease, margin .22s ease;
    }
    .slider-wrapper.is-hover .slider-track-wrap {
      /* fattens on hover */
    }
    .slider-track {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
      transition: height .22s ease;
    }
    .slider-wrapper.is-hover .slider-track { height: 8px; }
    .slider-range {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      border-radius: 999px;
      width: 25%;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="status">loading…</div>
  <div id="err"></div>
  <audio id="bg-audio" src="music/bg-music.mp3" loop preload="auto"></audio>

  <!-- music player: play toggle + elastic volume slider -->
  <div id="music-player">
    <button id="music-toggle" aria-label="Toggle music">
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <path d="M8 5v14l11-7L8 5z"/>
      </svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 5h4v14H6zM14 5h4v14h-4z"/>
      </svg>
    </button>
    <div class="slider-wrapper" id="vol-wrapper">
      <div class="vol-icon left">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 9v6h4l5 4V5L9 9H5z"/></svg>
      </div>
      <div class="slider-root" id="vol-root">
        <div class="slider-track-wrap" id="vol-trackwrap">
          <div class="slider-track">
            <div class="slider-range" id="vol-range"></div>
          </div>
        </div>
      </div>
      <div class="vol-icon right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 4V5L7 9H3zm10.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>
      </div>
    </div>

    <!-- pokemon switcher: toggles the hero model between rayquaza + greninja -->
    <button id="poke-toggle" aria-label="Switch pokemon" title="Switch pokemon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
      </svg>
      <span class="poke-name" id="poke-name">rayquaza</span>
    </button>
  </div>

  <!-- GYARADOS pose tuner: live sliders to dial in orientation/position/scale.
       Visible only while gyarados is shown. Drives the model's BASE transform
       (baseRot*/basePos/target size) so the idle sway + bone wave layer on top
       and the tick() loop doesn't fight the sliders. -->
  <!-- elastic slider + player controls -->
  <script>
    (function () {
      const audio   = document.getElementById('bg-audio');
      const wrapper = document.getElementById('vol-wrapper');
      const root    = document.getElementById('vol-root');
      const range   = document.getElementById('vol-range');
      const trackwrap = document.getElementById('vol-trackwrap');
      const leftIcon  = wrapper.querySelector('.vol-icon.left');
      const rightIcon = wrapper.querySelector('.vol-icon.right');
      const toggleBtn = document.getElementById('music-toggle');
      const iconPlay  = document.getElementById('icon-play');
      const iconPause = document.getElementById('icon-pause');

      const MAX_OVERFLOW = 50;
      const sigmoidDecay = (v, max) => {
        if (max === 0) return 0;
        const e = v / max;
        return (2 * (1 / (1 + Math.exp(-e)) - 0.5)) * max;
      };

      let value     = 25;          // 0..100
      let overflow  = 0;           // pixels past edge
      let dragging  = false;
      let region    = 'middle';    // 'left' | 'middle' | 'right'

      function syncRange() {
        range.style.width = value + '%';
        const v = Math.max(0, Math.min(1, value / 100));
        // prefer the Web Audio GainNode (volume-independent of analyser);
        // fall back to the element's own volume before audio init runs.
        if (window.__gain) window.__gain.gain.value = v;
        else                audio.volume = v;
      }
      function syncTrack() {
        const rect = root.getBoundingClientRect();
        const sx = 1 + Math.abs(overflow) / Math.max(1, rect.width);
        const sy = 1 - (Math.abs(overflow) / MAX_OVERFLOW) * 0.2;   // squish vertical 1 → 0.8
        const origin = region === 'left' ? 'right' : 'left';
        trackwrap.style.transformOrigin = origin + ' center';
        trackwrap.style.transform = `scaleX(${sx}) scaleY(${sy})`;
      }
      function syncIcons() {
        const off = sigmoidDecay(Math.abs(overflow), MAX_OVERFLOW);
        leftIcon.style.transform  = region === 'left'  ? `translateX(${-off}px) scale(1.25)` : 'translateX(0) scale(1)';
        rightIcon.style.transform = region === 'right' ? `translateX(${ off}px) scale(1.25)` : 'translateX(0) scale(1)';
      }

      function onMove(e) {
        const rect = root.getBoundingClientRect();
        // clamped position → value
        const x = e.clientX;
        let v = ((x - rect.left) / rect.width) * 100;
        v = Math.max(0, Math.min(100, v));
        value = v;
        syncRange();
        // overflow when finger goes past edges
        if (x < rect.left) {
          region = 'left';
          overflow = -sigmoidDecay(rect.left - x, MAX_OVERFLOW);
        } else if (x > rect.right) {
          region = 'right';
          overflow = sigmoidDecay(x - rect.right, MAX_OVERFLOW);
        } else {
          region = 'middle';
          overflow = 0;
        }
        syncTrack();
        syncIcons();
      }

      function springBack() {
        const start = overflow;
        const t0 = performance.now();
        const dur = 360;
        function step(now) {
          const t = Math.min(1, (now - t0) / dur);
          // critically-damped-ish ease: out cubic with bounce
          const eased = 1 - Math.pow(1 - t, 3);
          overflow = start * (1 - eased);
          syncTrack();
          syncIcons();
          if (t < 1) requestAnimationFrame(step);
          else { overflow = 0; region = 'middle'; syncTrack(); syncIcons(); }
        }
        requestAnimationFrame(step);
      }

      root.addEventListener('pointerdown', e => {
        dragging = true;
        root.setPointerCapture(e.pointerId);
        onMove(e);
      });
      root.addEventListener('pointermove', e => { if (dragging) onMove(e); });
      function endDrag() {
        if (!dragging) return;
        dragging = false;
        springBack();
      }
      root.addEventListener('pointerup', endDrag);
      root.addEventListener('pointercancel', endDrag);
      root.addEventListener('lostpointercapture', endDrag);

      // hover scale on the whole slider
      wrapper.addEventListener('pointerenter', () => wrapper.classList.add('is-hover'));
      wrapper.addEventListener('pointerleave', () => wrapper.classList.remove('is-hover'));

      // play / pause toggle
      function refreshIcons() {
        const playing = !audio.paused;
        iconPlay.style.display  = playing ? 'none' : 'block';
        iconPause.style.display = playing ? 'block' : 'none';
      }
      toggleBtn.addEventListener('click', () => {
        if (audio.paused) audio.play(); else audio.pause();
        refreshIcons();
      });
      audio.addEventListener('play',  refreshIcons);
      audio.addEventListener('pause', refreshIcons);

      // initial volume
      syncRange();
      refreshIcons();
    })();
  </script>

  <script>
    // surface script errors on screen instead of dying silently white
    const errEl = document.getElementById('err');
    function showErr(msg) {
      errEl.style.display = 'block';
      errEl.textContent = (errEl.textContent ? errEl.textContent + '\n\n' : '') + msg;
    }
    window.addEventListener('error', e => showErr('Error: ' + e.message + (e.filename ? '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno : '')));
    window.addEventListener('unhandledrejection', e => showErr('Promise: ' + (e.reason?.stack || e.reason?.message || e.reason)));
  </script>

  <script type="module">
    /*
      Clean scene rebuild. Two design decisions that fix the problems
      from build B:
        1) The model stays at the origin (SkinnedMesh + skeleton intact).
        2) The CAMERA flies around it on a curve, always looking back at
           the model. Visually the model appears to be flying through the
           sky; mechanically every bone is still addressable, so the
           follow-up animation pass can drive the rig directly.

      Lighting: three.js Sky shader → PMREMGenerator → scene.environment.
      The bright sky becomes the IBL, which is what finally lets the
      model's metallic surfaces show their actual color instead of black.
    */
    import * as THREE                       from 'https://esm.sh/three@0.160';
    import { GLTFLoader }                   from 'https://esm.sh/three@0.160/examples/jsm/loaders/GLTFLoader.js';
    import { FontLoader }                   from 'https://esm.sh/three@0.160/examples/jsm/loaders/FontLoader.js';
    import { TextGeometry }                 from 'https://esm.sh/three@0.160/examples/jsm/geometries/TextGeometry.js';
    import { Lensflare, LensflareElement }  from 'https://esm.sh/three@0.160/examples/jsm/objects/Lensflare.js';
    import { EffectComposer }               from 'https://esm.sh/three@0.160/examples/jsm/postprocessing/EffectComposer.js';
    import { RenderPass }                   from 'https://esm.sh/three@0.160/examples/jsm/postprocessing/RenderPass.js';
    import { UnrealBloomPass }              from 'https://esm.sh/three@0.160/examples/jsm/postprocessing/UnrealBloomPass.js';
    import { OutputPass }                   from 'https://esm.sh/three@0.160/examples/jsm/postprocessing/OutputPass.js';
    import { ShaderPass }                    from 'https://esm.sh/three@0.160/examples/jsm/postprocessing/ShaderPass.js';

    const canvas = document.getElementById('c');
    const status = document.getElementById('status');
    // debug output goes to the console now; the on-screen corner element
    // is a permanent aesthetic label instead.
    const log = (m) => { console.log('[hero]', m); };
    status.innerHTML =
      '<img class="st-logo" src="harvard-logo.png" alt="" />' +
      '<span class="st-text"><span class="st-main">harvard cs</span>' +
      '<span class="st-sub">class of 2028</span></span>';

    /* ── renderer ─────────────────────────────────────────────────── */
    // touch devices: cap DPR at 1 (vs 2) — halves the fragment-shader
    // load (bloom + nebula + transmission are all per-pixel heavy), the
    // single biggest win against mobile scroll jank.
    const TOUCH_DEVICE = window.matchMedia('(hover: none), (pointer: coarse)').matches;
    const DPR_CAP = TOUCH_DEVICE ? 1 : 2;
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, DPR_CAP));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping      = THREE.NoToneMapping;
    renderer.toneMappingExposure = 1.0;

    /* ── scene ─────────────────────────────────────────────────────── */
    const scene  = new THREE.Scene();
    scene.background = new THREE.Color('#000000');
    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 4000);

    // click → raycast Rayquaza. The parent (which owns pointer events,
    // since this iframe is pointer-events:none) sets window.__heroClick to
    // normalized device coords; we raycast against the model and, on a
    // hit, play the cry (via the parent's unlocked audio) + flare the jaw.
    const raycaster = new THREE.Raycaster();
    let cryT = -10;   // timestamp of last cry, for the screech reaction

    // easing helpers for the ballistic screech (see cry block in tick)
    const clamp01 = x => Math.min(1, Math.max(0, x));
    const easeOutCubic   = x => 1 - Math.pow(1 - x, 3);
    const easeInOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
    const easeOutBack    = (x, s = 1.70158) => 1 + (s + 1) * Math.pow(x - 1, 3) + s * Math.pow(x - 1, 2);
    const lerp = (a, b, t) => a + (b - a) * t;
    // remap a sub-range of `since` into an eased 0..1
    const seg = (since, t0, t1, ease) => ease(clamp01((since - t0) / (t1 - t0)));

    // Measured RMS amplitude envelope of sfx/rayquaza-cry.mp3 (1.50s long),
    // one sample every 40ms, peak-normalised 0..1. The cry is a long held
    // screech with a natural warble, then a clean decay tail over the final
    // ~240ms. The ballistic-screech block samples this directly so the jaw
    // (and the body heave) track the actual sound rather than a synthetic sine.
    const CRY_AMP = [0.771,1.0,0.96,0.9,0.927,0.94,0.857,0.876,0.887,0.93,0.947,
                     0.928,0.918,0.901,0.787,0.887,0.833,0.779,0.828,0.839,0.797,
                     0.839,0.843,0.793,0.876,0.82,0.807,0.849,0.813,0.819,0.876,
                     0.82,0.659,0.485,0.259,0.104,0.039,0.01];
    const CRY_AMP_STEP = 40; // ms between samples
    // linear-interpolate the envelope at an arbitrary time (ms into the cry)
    const ampAt = (ms) => {
      if (ms <= 0) return CRY_AMP[0];
      const x = ms / CRY_AMP_STEP;
      const i = Math.floor(x);
      if (i >= CRY_AMP.length - 1) return CRY_AMP[CRY_AMP.length - 1];
      return lerp(CRY_AMP[i], CRY_AMP[i + 1], x - i);
    };

    /* ── nebula sphere (cosmic backdrop behind stars) ──────────────
       Big inverted sphere with a procedural noise shader giving soft
       purple/indigo cloud bands. Sits behind the starfield. Reads as
       deep space dust, not flat black. */
    {
      const nebulaGeo = new THREE.SphereGeometry(1500, 48, 32);
      const nebulaMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        toneMapped: false,
        uniforms: {
          uTime: { value: 0 },
          uPulse: { value: 0 },   // audio amplitude 0..1, set every frame
          uCloud: { value: 1 },   // cloud-band opacity (rayquaza only; faded out for greninja)
        },
        vertexShader: /* glsl */`
          varying vec3 vDir;
          void main() {
            vDir = normalize(position);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
        fragmentShader: /* glsl */`
          varying vec3 vDir;
          uniform float uTime;
          uniform float uPulse;        // 0..1 audio amplitude
          uniform float uCloud;        // 0..1 atmospheric cloud-band fade

          float hash(vec3 p){ return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }
          float noise(vec3 p){
            vec3 i = floor(p); vec3 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float n =
              mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                      mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                  mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                      mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
            return n;
          }
          float fbm(vec3 p){
            float v = 0.0; float a = 0.5;
            for (int i = 0; i < 5; i++){ v += a * noise(p); p *= 2.05; a *= 0.5; }
            return v;
          }

          void main(){
            vec3 d = vDir;
            float t = uTime * 0.010;
            vec3 stretchA = vec3(2.6, 7.0, 1.4);
            vec3 stretchB = vec3(5.0, 9.0, 2.2);
            float n  = fbm(d * stretchA + vec3(t, -t * 0.4, t * 0.6));
            float n2 = fbm(d * stretchB + vec3(-t * 0.7, t, -t * 0.3));

            float h = d.y;
            vec3 base = mix(vec3(0.001, 0.002, 0.008),
                            vec3(0.008, 0.014, 0.038),
                            smoothstep(-0.6, 0.8, h));

            // BLUE palette — deep cobalt + electric cyan + soft steel
            vec3 cobalt    = vec3(0.06, 0.18, 0.55);
            vec3 electric  = vec3(0.10, 0.40, 0.85);
            vec3 steel     = vec3(0.04, 0.12, 0.22);

            float cloudA = smoothstep(0.66, 0.92, n);
            float cloudB = smoothstep(0.72, 0.96, n2);
            // audio pulse brightens the filaments without lifting the
            // black floor — base stays dark, streaks breathe.
            float pulseLift = 1.0 + uPulse * 1.2;
            vec3 col = base
              + cobalt   * cloudA * 0.22 * pulseLift
              + electric * cloudA * cloudB * 0.18 * pulseLift
              + steel    * cloudB * 0.06;

            // ── atmospheric cloud band (finishing touch) ──────────────
            // wispy fbm bands drifting horizontally, concentrated on the
            // lower hemisphere so the scene reads as "sky" near the
            // horizon while staying deep space up high. Warm/violet tint
            // so the bands look lit by the distant sun. uCloud fades the
            // whole layer in only for rayquaza.
            float band   = smoothstep(0.35, -0.85, h);           // 0 up top → 1 low
            float cT     = uTime * 0.018;                          // slow horizontal drift
            float cloudN = fbm(d * vec3(3.2, 4.5, 3.2) + vec3(cT, 0.0, cT * 0.3));
            float wisp   = smoothstep(0.52, 0.95, cloudN) * band;
            vec3 cloudWarm   = vec3(0.45, 0.30, 0.42);            // warm violet, catches the sun
            vec3 cloudShadow = vec3(0.05, 0.06, 0.12);
            vec3 cloudCol    = mix(cloudShadow, cloudWarm, smoothstep(0.6, 1.0, cloudN));
            col += cloudCol * wisp * 0.16 * uCloud * pulseLift;

            gl_FragColor = vec4(col, 1.0);
          }`
      });
      const nebula = new THREE.Mesh(nebulaGeo, nebulaMat);
      nebula.renderOrder = -2;          // behind everything
      scene.add(nebula);
      // expose so tick() can advance the noise time + toggle visibility
      window.__nebulaMat  = nebulaMat;
      window.__nebulaMesh = nebula;
    }

    /* ── soft circular point texture (used by stars + dust) ────────
       Without a map, PointsMaterial renders each point as a hard
       square. A canvas-painted radial gradient gives soft circular
       falloff so points read as round, antialiased dots. */
    const softDot = (() => {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const g = c.getContext('2d');
      const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0.0, 'rgba(255,255,255,1.0)');
      grad.addColorStop(0.4, 'rgba(255,255,255,0.55)');
      grad.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      g.fillStyle = grad;
      g.fillRect(0, 0, 64, 64);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.generateMipmaps = false;
      return tex;
    })();

    /* ── starfield (in front of nebula) ────────────────────────────── */
    {
      const g = new THREE.BufferGeometry();
      const N = 2400;
      const arr = new Float32Array(N * 3);
      const colArr = new Float32Array(N * 3);
      for (let i = 0; i < N; i++) {
        const r = 400 + Math.random() * 800;
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        arr[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
        arr[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        arr[i*3+2] = r * Math.cos(phi);
        // most stars are cool white, a few warm
        const warm = Math.random() < 0.15;
        const b = 0.5 + Math.random() * 0.5;
        colArr[i*3+0] = warm ? b : b * 0.85;
        colArr[i*3+1] = b * 0.92;
        colArr[i*3+2] = warm ? b * 0.7 : b;
      }
      g.setAttribute('position', new THREE.BufferAttribute(arr, 3));
      g.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));
      const m = new THREE.PointsMaterial({
        size: 1.4, vertexColors: true, transparent: true, opacity: 0.85,
        map: softDot, alphaTest: 0.02, depthWrite: false,
        // normal blending — additive was stacking and blowing out into
        // glowy blobs against the dark bg.
        blending: THREE.NormalBlending,
      });
      const stars = new THREE.Points(g, m);
      scene.add(stars);
      window.__starfield = stars;   // toggled off for greninja
    }

    /* dust layer removed — was reading as ugly purple blobs against
       the nebula. Starfield + nebula filaments carry the cosmic feel
       on their own. */

    /* ── procedural env map for chrome reflections ──────────────────
       Pure metallic surfaces with metalness=1 read as pure black unless
       there's an environment to reflect. We paint a synthetic cubemap
       with a deep cool gradient and a few directional highlights so the
       chrome shows actual depth — warm pinpoint highlight on one side
       (mimics distant sun), cool rim on the other (reflected starfield),
       deep blue zenith → black nadir. */
    {
      const envScene = new THREE.Scene();
      const envGeo = new THREE.SphereGeometry(100, 32, 16);
      const envMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        toneMapped: false,
        depthWrite: false,
        vertexShader: /* glsl */`
          varying vec3 vDir;
          void main() {
            vDir = normalize(position);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
        fragmentShader: /* glsl */`
          varying vec3 vDir;
          void main() {
            // dark base gradient: zenith deep indigo → nadir near-black
            float h = vDir.y;
            vec3 col = mix(vec3(0.005, 0.008, 0.02), vec3(0.06, 0.05, 0.12), smoothstep(-0.5, 0.7, h));

            // warm sun highlight at +x/+y direction (gives the chrome a
            // strong directional gleam to bounce)
            vec3 sunDir = normalize(vec3(0.6, 0.55, 0.35));
            float s = max(0.0, dot(vDir, sunDir));
            col += pow(s, 28.0) * vec3(1.8, 1.4, 0.9);     // tight bright spot
            col += pow(s, 4.0)  * vec3(0.35, 0.25, 0.15);  // soft falloff

            // cool rim highlight from opposite (subtle blue rim on the dark side)
            vec3 rimDir = normalize(vec3(-0.55, 0.15, -0.6));
            float r = max(0.0, dot(vDir, rimDir));
            col += pow(r, 8.0) * vec3(0.18, 0.30, 0.55);

            gl_FragColor = vec4(col, 1.0);
          }`
      });
      envScene.add(new THREE.Mesh(envGeo, envMat));
      const pmrem = new THREE.PMREMGenerator(renderer);
      pmrem.compileEquirectangularShader();
      scene.environment = pmrem.fromScene(envScene, 0.06).texture;
    }

    /* ── lights ───────────────────────────────────────────────────── */
    // warm key matches the env's sun direction so highlights align
    const sunLight = new THREE.DirectionalLight(0xfff0d8, 2.6);
    sunLight.position.set(60, 55, 35);
    scene.add(sunLight);
    const rimLight = new THREE.DirectionalLight(0x5e8cff, 0.9);
    rimLight.position.set(-55, 15, -60);
    scene.add(rimLight);
    const ambLight = new THREE.AmbientLight(0x4060a0, 0.15);
    scene.add(ambLight);

    /* ── visible sun + lens flare ─────────────────────────────────── */
    // PointLight here is just an anchor for the lensflare sprite — its
    // intensity is 0 because the actual scene illumination is already
    // handled by the directional + ambient + env map above. The flare
    // sits far along the env's sun direction so the reflection cue on
    // the chrome lines up with the visible source.
    {
      const sunDir = new THREE.Vector3(0.6, 0.55, 0.35).normalize();
      const sunAnchor = new THREE.PointLight(0xfff0d8, 0, 0);
      sunAnchor.position.copy(sunDir).multiplyScalar(900);
      scene.add(sunAnchor);

      // textures live in the three.js gh repo (npm strips them)
      const texLoader = new THREE.TextureLoader().setPath(
        'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/lensflare/'
      );
      const flare0 = texLoader.load('lensflare0.png');
      const flare3 = texLoader.load('lensflare3.png');

      const lf = new Lensflare();
      lf.addElement(new LensflareElement(flare0, 680, 0,   new THREE.Color(0xffe2b0)));
      lf.addElement(new LensflareElement(flare3,  60, 0.6));
      lf.addElement(new LensflareElement(flare3,  90, 0.7));
      lf.addElement(new LensflareElement(flare3, 140, 0.9));
      lf.addElement(new LensflareElement(flare3,  70, 1.0));
      sunAnchor.add(lf);
    }

    /* ── audio amplitude source ──────────────────────────────────────
       When this page is EMBEDDED inside index.html (the live hero), the
       PARENT owns the audio + player and feeds us amplitude through the
       same-origin global `window.__heroAmp`. This matters on iOS: audio
       can only be unlocked by a gesture in the browsing context that
       owns it, and the iframe is pointer-events:none so it never
       receives one. Parent-owned audio is the only reliable path.

       When opened STANDALONE (dev), we run our own audio engine so the
       scene still has sound + reactivity. */
    const EMBEDDED = (window.self !== window.top);
    const audioEl = document.getElementById('bg-audio');
    let audioCtx = null, analyser = null, audioBytes = null;
    let gainNode = null;
    let audioReady = false;

    function initAudio() {
      if (audioReady) return;
      try {
        audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaElementSource(audioEl);
        analyser  = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        analyser.smoothingTimeConstant = 0.85;
        gainNode = audioCtx.createGain();
        gainNode.gain.value = 0.25;
        src.connect(analyser);
        analyser.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        audioBytes = new Uint8Array(analyser.frequencyBinCount);
        audioReady = true;
        window.__gain = gainNode;
      } catch (e) { console.warn('audio init failed', e); }
    }

    function tryPlay() {
      initAudio();
      audioCtx?.resume?.();
      audioEl.play().catch(() => {});
    }

    if (EMBEDDED) {
      // parent runs the show — hide our player, stay silent.
      audioEl.muted = true;
      const p = document.getElementById('music-player');
      if (p) p.style.display = 'none';
    } else {
      audioEl.volume = 1.0;
      tryPlay();
      const kickAudio = () => { tryPlay(); window.removeEventListener('pointerdown', kickAudio); window.removeEventListener('keydown', kickAudio); };
      window.addEventListener('pointerdown', kickAudio, { passive: true });
      window.addEventListener('keydown',     kickAudio, { passive: true });
    }

    // exposed so tick() can sample. embedded → read parent-fed value.
    window.__audio = {
      getAmp() {
        if (EMBEDDED) return window.__heroAmp || 0;
        if (!audioReady) return 0;
        analyser.getByteFrequencyData(audioBytes);
        const N = Math.floor(audioBytes.length * 0.66);
        let s = 0;
        for (let i = 0; i < N; i++) s += audioBytes[i];
        return s / (N * 255);
      }
    };

    /* ── lightning bolts (electric arcs that strike around Rayquaza) ──
       Pool of reusable Line objects with fractal-subdivided jagged
       paths. Additive blend + bloom turns thin lines into glowing
       strikes. Fires randomly with extra weight on audio amplitude
       peaks. The fragment is geometry-only — visual thickness comes
       from bloom. */
    const LIGHTNING_POOL = 5;
    const BOLT_VERTS     = 128;          // upper bound on subdivided points
    const lightningSlots = [];
    for (let i = 0; i < LIGHTNING_POOL; i++) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(BOLT_VERTS * 3), 3));
      const mat = new THREE.LineBasicMaterial({
        // brighter near-white core so bloom picks it up hard
        color: 0xeaf3ff,
        transparent: true,
        opacity: 0,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const line = new THREE.Line(geo, mat);
      line.frustumCulled = false;
      line.visible = false;
      scene.add(line);
      lightningSlots.push({ line, geo, mat, life: 0, maxLife: 0.32 });
    }

    const _tmpV  = new THREE.Vector3();
    const _tmpV2 = new THREE.Vector3();
    function generateBolt(start, end, displacement, subdivisions, outArr) {
      // recursive midpoint displacement — each iteration halves the
      // displacement so high-frequency jitter is small
      let points = [start.clone(), end.clone()];
      for (let iter = 0; iter < subdivisions; iter++) {
        const next = [points[0]];
        for (let i = 0; i < points.length - 1; i++) {
          const a = points[i], b = points[i+1];
          const mid = _tmpV.lerpVectors(a, b, 0.5).clone();
          // perpendicular offset in the camera-facing plane
          const dir  = _tmpV2.subVectors(b, a).normalize();
          const perp = new THREE.Vector3(-dir.y, dir.x, dir.z * 0.3).normalize();
          mid.addScaledVector(perp, (Math.random() - 0.5) * displacement);
          next.push(mid, b);
        }
        points = next;
        displacement *= 0.55;
      }
      const cap = Math.min(points.length, outArr.length / 3);
      for (let i = 0; i < cap; i++) {
        outArr[i*3+0] = points[i].x;
        outArr[i*3+1] = points[i].y;
        outArr[i*3+2] = points[i].z;
      }
      return cap;
    }

    // shared charge state — set to 1.0 on each strike, decayed in tick
    const glassCharge = { v: 0 };

    function fireLightning() {
      const slot = lightningSlots.find(s => s.life <= 0);
      if (!slot) return;
      // start: somewhere overhead, end: ON the pk text bounding box
      const target = pkText ? pkText.position : modelCenter;
      const ang = Math.random() * Math.PI * 2;
      const radius = 22 + Math.random() * 22;
      const start = new THREE.Vector3(
        target.x + Math.cos(ang) * radius,
        target.y + 22 + Math.random() * 14,
        target.z + Math.sin(ang) * radius * 0.5
      );
      // narrow scatter around the text — lands ON the letters,
      // not floating in empty space
      const end = new THREE.Vector3(
        target.x + (Math.random() - 0.5) * 10,
        target.y + (Math.random() - 0.5) * 5,
        target.z + (Math.random() - 0.5) * 4
      );
      const count = generateBolt(start, end, 9, 6, slot.geo.attributes.position.array);
      slot.geo.setDrawRange(0, count);
      slot.geo.attributes.position.needsUpdate = true;
      slot.line.visible = true;
      slot.life = slot.maxLife = 0.28 + Math.random() * 0.12;
      slot.mat.opacity = 1.0;

      // charge the glass — soft accumulation. each strike adds 25% of
      // remaining headroom, so multiple rapid strikes take longer to
      // saturate the emissive (avoids "too bright too fast" pile-up).
      glassCharge.v = glassCharge.v + (1.0 - glassCharge.v) * 0.25;
    }

    // exposed so the tick can drive the lifecycle + trigger
    window.__lightning = {
      slots: lightningSlots,
      fire: fireLightning,
      lastStrikeT: -1,
      cooldown: 0.10,
    };

    /* ══════════════════════════════════════════════════════════════════
       GRENINJA WORLD — water/ninja theme. Everything here is built once
       up-front but starts hidden; the tick + switchPokemon toggle it on
       only while currentPokemon === 'greninja'. None of it renders or
       updates for rayquaza.

       Knobs (top of file feel): GREN_CYAN (rim/aura colour),
       WET_RAMP (wet-glass ramp speed), UW_MARINE_COUNT (snow density),
       and the UW_* underwater palette/intensity knobs below.
       ══════════════════════════════════════════════════════════════════ */
    const GREN_CYAN  = new THREE.Color(0x33e0ff);   // aura / rim tint knob
    const WET_RAMP   = 1.8;    // wetness units/sec ramp (uWet 0→1)

    /* ── underwater textures (greninja scene) ──────────────────────────
       caustics.png : seamless grayscale caustic (CC0) — RepeatWrapping,
                      sampled twice + min()'d to kill tiling.
       waternormals.jpg: three.js MIT surface-ripple normal (kept for the
                      optional Snell-window shimmer; loaded but the dome
                      uses procedural normals so a 404 still can't break
                      the scene). Loads are guarded — on error the dome
                      shader simply renders without the texture (uHasCaust
                      stays 0) instead of throwing.
       Tuning knobs for the whole underwater look live in UW_* below. */
    const causticsTex = new THREE.TextureLoader().load(
      'underwater/caustics.png',
      (tex) => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.minFilter = THREE.LinearMipmapLinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.colorSpace = THREE.NoColorSpace;   // it's a data/height map, not sRGB
        try { if (greninjaSkyMat) greninjaSkyMat.uniforms.uHasCaust.value = 1; } catch(e){}
      },
      undefined,
      () => { /* 404-safe: leave uHasCaust=0, dome renders w/o caustics */ }
    );
    causticsTex.wrapS = causticsTex.wrapT = THREE.RepeatWrapping;

    // underwater palette + intensity knobs (all greninja-only)
    const UW_FOG_COLOR     = 0x0a3a4a;   // FogExp2 colour (deep blue-green)
    const UW_FOG_DENSITY   = 0.018;      // FogExp2 density (0.012–0.05)
    const UW_NEAR_TINT      = new THREE.Color(0x0e5a66); // water near surface
    const UW_DEEP_TINT      = new THREE.Color(0x041a24); // water at depth
    const UW_SHAFT_TINT     = new THREE.Color(0xbfeaff); // god-ray / surface light
    const UW_CAUST_SCALE    = 3.0;   // caustic cell size (bigger = larger cells)
    const UW_CAUST_STRENGTH = 1.25;  // caustic brightness
    const UW_CAUST_POWER     = 2.2;  // caustic contrast (higher = sharper webs)
    const UW_CAUST_ABERR     = 0.012;// chromatic split on caustics
    const UW_GODRAY_STRENGTH = 1.15; // shaft intensity multiplier
    const UW_MARINE_COUNT    = TOUCH_DEVICE ? 500 : 1100; // marine-snow particles

    /* ── greninja backdrop: REALISTIC UNDERWATER DOME ─────────────────
       Replaces the old storm-sky dome. Inverted sphere whose shader
       composites the whole "water volume" look in one pass:

         (a) DEPTH GRADIENT  — bright blue-green up top (toward the
             surface) fading to a near-black deep at the bottom, with a
             soft bright Snell's-window disc straight overhead.
         (b) BEER–LAMBERT absorption — per-channel exp(-absorb*d) over the
             view ray so warm/red light dies first with depth, the way it
             does underwater. (FogExp2 on the scene handles the model;
             this is the backdrop's own depth tint.)
         (c) GOD-RAY SHAFTS  — strong vertical volumetric shafts projected
             from a bright sun high in +Y. Two animated noise layers of
             stripes, soft-additive, masked stronger near the top + along
             the up direction. This is the PROCEDURAL-SHAFT FALLBACK the
             spec allows (chosen over bolting the 3-pass GodRaysShader onto
             the shared EffectComposer, which would have risked rayquaza's
             bloom/ACES chain — a contained dome layer is zero-risk and
             gated greninja-only).
         (d) CAUSTICS        — underwater/caustics.png sampled as two
             scrolled layers, min()'d together to break tiling, with a
             chromatic UV split + pow() contrast (technique per spec);
             projected from above (world-XZ-ish via dir.xz/dir.y) and
             faded out with depth so they read as surface-projected light.

       Refs: god-ray + caustic compositing technique — three.js ocean /
       Shadertoy caustic patterns (the min()-of-two-layers trick is the
       standard anti-tiling approach); Beer–Lambert underwater absorption
       coefficients vec3(0.45,0.10,0.05) from the underwater-rendering
       literature. Hidden unless greninja is active. Knobs: UW_* above. */
    let greninjaSkyMat = null;
    {
      const geo = new THREE.SphereGeometry(1400, 48, 32);
      const mat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        toneMapped: true,   // let OutputPass ACES tone-map the bright shafts
        uniforms: {
          uTime:         { value: 0 },
          causticsTex:   { value: causticsTex },
          uHasCaust:     { value: 0 },        // 1 once the texture finishes loading
          uNearTint:     { value: UW_NEAR_TINT },
          uDeepTint:     { value: UW_DEEP_TINT },
          uShaftTint:    { value: UW_SHAFT_TINT },
          uCausScale:    { value: UW_CAUST_SCALE },
          uCausStrength: { value: UW_CAUST_STRENGTH },
          uCausPower:    { value: UW_CAUST_POWER },
          uCausAberr:    { value: UW_CAUST_ABERR },
          uGodStrength:  { value: UW_GODRAY_STRENGTH },
          uPulse:        { value: 0 },   // 0..1 music amplitude (reactive)
        },
        vertexShader: /* glsl */`
          varying vec3 vDir;
          void main() {
            vDir = normalize(position);
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }`,
        fragmentShader: /* glsl */`
          varying vec3 vDir;
          uniform float uTime;
          uniform sampler2D causticsTex;
          uniform float uHasCaust;
          uniform vec3  uNearTint, uDeepTint, uShaftTint;
          uniform float uCausScale, uCausStrength, uCausPower, uCausAberr, uGodStrength;
          uniform float uPulse;   // 0..1 music amplitude — drives reactive brightness

          float hash(vec3 p){ return fract(sin(dot(p, vec3(127.1, 311.7, 74.7))) * 43758.5453); }
          float noise(vec3 p){
            vec3 i = floor(p); vec3 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            float n =
              mix(mix(mix(hash(i + vec3(0,0,0)), hash(i + vec3(1,0,0)), f.x),
                      mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                  mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                      mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
            return n;
          }
          float fbm(vec3 p){
            float v = 0.0; float a = 0.5;
            for (int i = 0; i < 4; i++){ v += a * noise(p); p = p * 2.03 + 7.1; a *= 0.5; }
            return v;
          }

          // layered, anti-tiled caustics (spec technique) — caustics.png is
          // grayscale (r=g=b) but the per-channel UV offset still gives a
          // real chromatic split at the web edges.
          vec3 sampleCaustics(vec2 wUV){
            vec2 uv1 = wUV*(1.0/uCausScale)            + uTime*0.030*vec2(1.0,0.7);
            vec2 uv2 = wUV*(1.0/(uCausScale*0.90))     - uTime*0.022*vec2(0.7,1.0);
            vec2 dd  = vec2(uCausAberr, 0.0);
            vec3 c1 = vec3(texture2D(causticsTex,uv1+dd).r, texture2D(causticsTex,uv1).g, texture2D(causticsTex,uv1-dd).b);
            vec3 c2 = vec3(texture2D(causticsTex,uv2+dd).r, texture2D(causticsTex,uv2).g, texture2D(causticsTex,uv2-dd).b);
            vec3 c  = min(c1, c2);                 // AND of two layers kills the tile
            c = pow(c, vec3(uCausPower));
            return c * uCausStrength;
          }

          void main(){
            vec3 d = normalize(vDir);
            float h = d.y;                          // -1 down .. 1 up

            // ── (a) depth gradient + (b) Beer–Lambert absorption ────────
            // pseudo view-depth: looking down/along is "deeper" water in
            // front of the ray than looking up toward the surface.
            float surf  = smoothstep(-0.25, 1.0, h);          // 0 deep .. 1 surface
            float depth = (1.0 - surf) * 6.0;                 // optical path length
            vec3 absorb = vec3(0.45, 0.10, 0.05);             // red dies first
            vec3 water  = mix(uDeepTint, uNearTint, surf);
            // apply absorption: tint the "transmitted" colour, blend by depth
            vec3 col = mix(water, water * exp(-absorb * depth), 1.0 - exp(-0.18 * depth));

            // ── Snell's window: soft bright disc straight overhead ──────
            // music-reactive: surface light brightens on the beat
            float window = smoothstep(0.55, 1.0, h);
            col += uShaftTint * pow(window, 2.0) * (0.45 + uPulse * 0.55);

            // ── (c) procedural GOD-RAY shafts from the surface ──────────
            // Near-PARALLEL, soft VERTICAL light beams descending from the
            // surface, NOT a radial fan. We use a horizontal screen-ish
            // coordinate sx (slightly splayed with depth so beams lean out
            // a touch toward the edges) as the across-beam axis, and depth as
            // the along-beam axis. Two low-frequency noise bands scrolling
            // sideways make broad, soft, drifting columns. Low contrast so
            // they read as hazy light, not hard spokes.
            vec2 sp = d.xz / max(0.18, h * 0.6 + 0.55);       // ceiling-projected coords
            float sx = d.x * (1.0 + (1.0 - h) * 0.35);        // across-beam axis (gentle splay)
            // broad columns: low x-freq + very low depth-freq, scroll sideways
            float band1 = fbm(vec3(sx * 3.0,        (1.0 - h) * 0.35, uTime * 0.04 + 11.0));
            float band2 = fbm(vec3(sx * 5.5 + 3.0,  (1.0 - h) * 0.50, uTime * 0.06 + 2.0));
            // soften: lower power, and smoothstep to roll off the low end so
            // there are no hard edges. value stays in a gentle 0..1.
            float shafts = clamp(band1 * 0.62 + band2 * 0.42, 0.0, 1.0);
            shafts = smoothstep(0.35, 0.95, shafts);          // soft beams, no sharp spokes
            // fade beams in from the surface and gently outward (no hot center spike)
            float beamTop = smoothstep(-0.15, 0.9, h);        // brightest up high, fade with depth
            float beamSide = mix(1.0, 0.55, smoothstep(0.4, 1.3, abs(d.x))); // mild edge falloff
            shafts *= beamTop * beamSide;
            // music-reactive: the god-ray beams swell/brighten with the beat
            col += uShaftTint * shafts * uGodStrength * (0.6 + uPulse * 0.9);

            // ── (d) caustics, surface-projected, faded with depth ───────
            if (uHasCaust > 0.5){
              vec3 caus = sampleCaustics(sp * 1.3);
              // brighter toward the surface, present across the upper field;
              // caustics shimmer brighter on the beat (music-reactive)
              col += caus * uShaftTint * surf * (0.6 + 0.6 * window) * (1.1 + uPulse * 0.8);
            }

            gl_FragColor = vec4(col, 1.0);
          }`
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.renderOrder = -2;
      mesh.visible = false;     // greninja-only
      scene.add(mesh);
      greninjaSkyMat = mat;
      window.__greninjaSky = mesh;
    }

    /* ── greninja MARINE SNOW — suspended particulate (replaces rain) ──
       Underwater there is no rain; instead the water is full of slow-
       drifting organic/mineral detritus ("marine snow"). THREE.Points,
       additive, soft round falloff, near-white cool tint, sinking slowly
       with a gentle sine XZ wobble + a tiny per-particle twinkle. All
       positions derived from a per-particle seed + `t` (no integration,
       no allocation, framerate-independent). Hidden + not updated unless
       greninja is active. Count scaled on TOUCH_DEVICE (UW_MARINE_COUNT).

       DESIGN (after feedback that big uniform dots read as clip-art): the
       field is deliberately BARELY-THERE — tiny specks (mostly ~1px, a
       rare slightly-larger one), very low opacity, heavy per-particle
       brightness/size variance, and a hard point-size CAP so nothing ever
       blooms into a bokeh blob no matter how close to the camera it drifts.
       The volume is pushed mostly BEHIND/around the model (away from the
       lens) and far flakes dim toward the fog. It's an atmospheric accent,
       not a feature — easy to tune down further or cut via UW_MARINE_COUNT.

       Knobs: UW_MARINE_COUNT (density), SNOW_R (volume radius),
       SNOW_H (vertical span), SNOW_SPEED (sink speed), SNOW_SIZE (px),
       SNOW_OPACITY, SNOW_MAX_PX (hard size cap). */
    const SNOW_R       = 46;    // horizontal radius of the snow volume
    const SNOW_H       = 64;    // vertical span it recycles over
    const SNOW_TOP     = 34;    // top of the volume relative to scene center
    const SNOW_Z_BACK  = 14;    // push the cloud back (away from the camera)
    const SNOW_SPEED   = 1.3;   // slow sink (world units/sec)
    const SNOW_SIZE    = 1.4;   // base point size (px @ DPR1, pre-attenuation)
    const SNOW_OPACITY = 0.085; // master opacity (very faint)
    const SNOW_MAX_PX  = 3.5;   // HARD cap so nothing becomes a blob
    let snowMesh = null, snowPos = null, snowSeed = null;
    {
      const geo = new THREE.BufferGeometry();
      snowPos  = new Float32Array(UW_MARINE_COUNT * 3);
      // per-particle seed: x, z, phase(0..1), wobble-amp(0..1)
      snowSeed = new Float32Array(UW_MARINE_COUNT * 4);
      const jit = new Float32Array(UW_MARINE_COUNT); // size/brightness jitter
      for (let i = 0; i < UW_MARINE_COUNT; i++) {
        const ang = Math.random() * Math.PI * 2;
        const rad = Math.sqrt(Math.random()) * SNOW_R;
        snowSeed[i*4+0] = Math.cos(ang) * rad;          // x base
        snowSeed[i*4+1] = Math.sin(ang) * rad;          // z base
        snowSeed[i*4+2] = Math.random();                // fall phase 0..1
        snowSeed[i*4+3] = Math.random();                // wobble seed 0..1
        // HEAVY size variance: pow() pushes most flakes tiny, only a rare
        // few approach 1.0 → no uniform polka-dot look.
        jit[i] = Math.pow(Math.random(), 3.0);          // ~0 mostly, rarely ~1
      }
      geo.setAttribute('position', new THREE.BufferAttribute(snowPos, 3));
      geo.setAttribute('aJit',     new THREE.BufferAttribute(jit, 1));
      const mat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        toneMapped: false,
        uniforms: {
          uColor:   { value: new THREE.Color(0xcfe8e8) },
          uOpacity: { value: SNOW_OPACITY },
          uSize:    { value: SNOW_SIZE * (TOUCH_DEVICE ? 1.0 : (window.devicePixelRatio || 1)) },
          uMaxPx:   { value: SNOW_MAX_PX * (TOUCH_DEVICE ? 1.0 : (window.devicePixelRatio || 1)) },
          uTime:    { value: 0 },
        },
        vertexShader: /* glsl */`
          uniform float uSize, uMaxPx;
          attribute float aJit;
          varying float vJit;
          varying float vFade;
          void main(){
            vJit = aJit;
            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            float dist = -mv.z;
            // base size grows a touch with jitter; perspective attenuation
            // then HARD-CAPPED so a near flake can never be a giant blob.
            float px = uSize * (0.6 + aJit * 1.6) * (60.0 / max(8.0, dist));
            gl_PointSize = clamp(px, 0.0, uMaxPx);
            // far flakes dim toward the fog so density isn't uniform in z
            vFade = smoothstep(120.0, 18.0, dist);
            gl_Position = projectionMatrix * mv;
          }`,
        fragmentShader: /* glsl */`
          uniform vec3  uColor;
          uniform float uOpacity;
          uniform float uTime;
          varying float vJit;
          varying float vFade;
          void main(){
            float dd = length(gl_PointCoord - 0.5);
            float a  = smoothstep(0.5, 0.0, dd);          // soft round falloff
            // brightness varies with jitter (most flakes dim) + slow twinkle
            float bright = 0.35 + 0.65 * vJit;
            a *= uOpacity * bright * vFade;
            a *= 0.65 + 0.35 * sin(uTime * 1.3 + vJit * 53.1);
            gl_FragColor = vec4(uColor, a);
          }`
      });
      snowMesh = new THREE.Points(geo, mat);
      snowMesh.frustumCulled = false;
      snowMesh.visible = false;     // greninja-only
      scene.add(snowMesh);
      window.__snow = snowMesh;
    }
    // advance the marine snow — called each frame ONLY while greninja shown.
    function updateSnow(t) {
      const cx = modelCenter.x, cy = modelCenter.y, cz = modelCenter.z - SNOW_Z_BACK;
      const span = SNOW_H, pos = snowPos;
      for (let i = 0; i < UW_MARINE_COUNT; i++) {
        const sx = snowSeed[i*4+0];
        const sz = snowSeed[i*4+1];
        const ph = snowSeed[i*4+2];
        const wb = snowSeed[i*4+3];
        const fall = (ph * span + t * SNOW_SPEED) % span;   // 0..span, recycles
        const o = i * 3;
        pos[o+0] = cx + sx + Math.sin(t * 0.35 + wb * 6.2) * 0.8;  // gentle XZ wobble
        pos[o+1] = cy + SNOW_TOP - fall;
        pos[o+2] = cz + sz + Math.cos(t * 0.30 + wb * 4.1) * 0.8;
      }
      snowMesh.geometry.attributes.position.needsUpdate = true;
    }

    /* ── greninja cyan key light + lighting swap ──────────────────────
       Dedicated cool fill, only enabled while greninja is active. The
       warm rayquaza key (sunLight) is dimmed + cooled and rimLight
       boosted while greninja is shown; all three lerp smoothly toward a
       per-pokemon target each frame so the toggle never flickers and
       always settles back to the exact rayquaza baseline. */
    const greninjaKey = new THREE.DirectionalLight(GREN_CYAN.getHex(), 0.0);
    greninjaKey.position.set(-30, 40, 60);   // bias toward camera so the
    scene.add(greninjaKey);                   // creature's facing side is lit

    // baselines captured from the rayquaza setup above
    const RAY_SUN_COLOR = sunLight.color.clone();
    const RAY_SUN_INT   = sunLight.intensity;
    const RAY_RIM_COLOR = rimLight.color.clone();
    const RAY_RIM_INT   = rimLight.intensity;
    const RAY_AMB_COLOR = ambLight.color.clone();

    // greninja targets — cooler, dimmer warm key; punchier blue rim;
    // cyan ambient; cyan fill light on.
    const GRN_SUN_COLOR = new THREE.Color(0xbfe9ff);  // cool cyan-white
    const GRN_SUN_INT   = 1.5;
    const GRN_RIM_COLOR = new THREE.Color(0x4fd6ff);  // strong aqua rim
    const GRN_RIM_INT   = 1.6;
    const GRN_AMB_COLOR = new THREE.Color(0x16384a);  // teal ambient
    const GRN_KEY_INT   = 2.2;   // brighter cyan key so gyarados reads
                                 // against the heavy underwater haze

    const _lc = new THREE.Color();
    // lerp the scene lighting toward the active pokemon's target. Called
    // every frame; converges fast but smoothly (no pop on switch).
    function updateLighting() {
      const gren = currentPokemon === 'greninja';
      const s = 0.12;   // lerp factor
      sunLight.color.lerp(gren ? GRN_SUN_COLOR : RAY_SUN_COLOR, s);
      sunLight.intensity += ((gren ? GRN_SUN_INT : RAY_SUN_INT) - sunLight.intensity) * s;
      rimLight.color.lerp(gren ? GRN_RIM_COLOR : RAY_RIM_COLOR, s);
      rimLight.intensity += ((gren ? GRN_RIM_INT : RAY_RIM_INT) - rimLight.intensity) * s;
      ambLight.color.lerp(gren ? GRN_AMB_COLOR : RAY_AMB_COLOR, s);
      greninjaKey.intensity += ((gren ? GRN_KEY_INT : 0.0) - greninjaKey.intensity) * s;
    }

    /* ── greninja cyan fresnel rim (aura) ──────────────────────────────
       Injected into the greninja model's standard/physical materials via
       onBeforeCompile so skinning still works. Adds an additive cyan rim
       on the silhouette: cyan * pow(1 - dot(viewDir, normal), p) * uRimI.
       uRimI is shared across all the model's materials and animated
       (subtle pulse) only while greninja is active; set to 0 otherwise. */
    const greninjaRim = { intensity: { value: 0.0 } };   // shared uniform object
    function installGreninjaRim(root) {
      root.traverse(o => {
        if (!(o.isMesh || o.isSkinnedMesh) || !o.material) return;
        const mats = Array.isArray(o.material) ? o.material : [o.material];
        mats.forEach(m => {
          if (!('onBeforeCompile' in m) || m.userData.__rimInstalled) return;
          m.userData.__rimInstalled = true;
          const prev = m.onBeforeCompile;
          m.onBeforeCompile = (shader) => {
            if (prev) prev(shader);
            shader.uniforms.uRimColor = { value: GREN_CYAN };
            shader.uniforms.uRimI     = greninjaRim.intensity;
            // Robust fresnel rim: declare the uniforms (the previous version
            // assumed three.js auto-declared them, and relied on `normal` /
            // `<dithering_fragment>` being present — which is fragile across
            // material configs and produced a non-rendering program for the
            // gyarados PBR materials). Here we declare the uniforms ourselves
            // and add the rim right after <opaque_fragment>, computing the
            // fresnel from the always-present `vNormal` + `vViewPosition`
            // varyings so the lit PBR output is untouched on every material.
            shader.fragmentShader = shader.fragmentShader.replace(
              '#include <common>',
              `#include <common>
               uniform vec3  uRimColor;
               uniform float uRimI;`
            ).replace(
              '#include <opaque_fragment>',
              `#include <opaque_fragment>
               {
                 vec3 vd = normalize(vViewPosition);
                 float fres = pow(1.0 - clamp(dot(vd, normalize(vNormal)), 0.0, 1.0), 2.5);
                 gl_FragColor.rgb += uRimColor * (fres * uRimI);
               }`
            );
          };
          m.needsUpdate = true;
        });
      });
    }

    /* ── GYARADOS body wave ─────────────────────────────────────────────
       The old fake vertex-shader body-wave (which displaced `transformed`
       on a boneless static mesh) has been REMOVED. gyarados_rigged.glb has
       a real 63-joint skeleton, so it is now driven by a real per-bone
       travelling wave in tick() (built from userData.gyaChain in the
       loader) — the SAME technique rayquaza uses. Nothing to install here. */

    /* ── post-processing: bloom + ACES tone mapping ───────────────── */
    // Use the default composer targets and bump samples on them — this
    // is more reliable across pixel-ratio combinations than supplying
    // a custom render target. The defaults are HDR-friendly and resize
    // correctly with composer.setSize().
    const composer = new EffectComposer(renderer);
    composer.setPixelRatio(Math.min(window.devicePixelRatio || 1, DPR_CAP));
    composer.setSize(window.innerWidth, window.innerHeight);
    // MSAA: 4x on desktop, 0 on touch (mobile GPUs choke on multisampled
    // HDR targets + bloom; DPR cap already keeps edges acceptable).
    const MSAA = TOUCH_DEVICE ? 0 : 4;
    composer.renderTarget1.samples = MSAA;
    composer.renderTarget2.samples = MSAA;
    composer.renderTarget1.texture.type = THREE.HalfFloatType;
    composer.renderTarget2.texture.type = THREE.HalfFloatType;
    composer.addPass(new RenderPass(scene, camera));
    // (resolution, strength, radius, threshold) — high threshold so
    // only the bright env-driven highlights bloom; starfield + glass
    // stay clean.
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),  // full-res — quality
      0.55,   // strength
      0.40,   // radius
      1.05    // threshold (only HDR-ish brights pass)
    );
    composer.addPass(bloomPass);

    /* ── RAIN-ON-GLASS (fullscreen post-process) ───────────────────────
       Refracts the whole composited image as if seen through a rain-
       covered pane of glass: layered droplets bead and roll down leaving
       residual-bead trails, each drop acts as a lens (gradient-of-height
       refraction that bends + magnifies the scene behind it), and the dry
       glass is softly fogged. Driven by uWet (synced from pkWet each
       frame): ramps in for Greninja, a true no-op for Rayquaza.
       Original clean-room implementation of the well-known stateless
       wet-window technique. */
    const RainShader = {
      uniforms: {
        tDiffuse:    { value: null },               // auto-filled by ShaderPass
        iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        iTime:       { value: 0 },
        uWet:        { value: 0 },
      },
      vertexShader: `varying vec2 vUv;
        void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
      fragmentShader: `
        precision highp float;
        uniform sampler2D tDiffuse;
        uniform vec2  iResolution;
        uniform float iTime;
        uniform float uWet;
        varying vec2  vUv;

        const float DROP_SPEED  = 0.42;
        const float REFRACT     = 0.05;
        const float BLUR_AMT    = 0.0;

        float hash11(float p){ p=fract(p*0.1031); p*=p+33.33; p*=p+p; return fract(p); }
        vec3  hash31(float p){ vec3 q=fract(vec3(p)*vec3(.1031,.1030,.0973));
          q+=dot(q,q.yzx+33.33); return fract((q.xxy+q.yzz)*q.zyx); }
        float S(float a,float b,float t){ return smoothstep(a,b,t); }
        float Saw(float b,float t){ return S(0.,b,t)*S(1.,b,t); }

        // one layer of rolling drops + trails → (height, clarity)
        vec2 dropLayer(vec2 uv, float t){
          vec2 grid = vec2(6.0, 1.0);
          uv.y += t * DROP_SPEED;
          vec2 id = floor(uv*grid);
          vec3 n  = hash31(id.x*35.2 + id.y*2376.1);
          vec2 st = fract(uv*grid) - vec2(0.5, 0.0);
          float ti = fract(t*(0.5+n.z*0.5) + n.z);
          float y  = (Saw(0.85, ti)-0.5)*0.9 + 0.5;
          float x  = n.x - 0.5;
          x += sin(y + sin(y))*(0.5-abs(x))*(n.z-0.5);
          vec2 p = vec2(x, y);
          float d = length((st-p)*grid.yx);
          float mainDrop = S(0.4, 0.0, d);
          float r  = sqrt(S(1.0, y, st.y));
          float cd = abs(st.x - x);
          float trail = S(0.23*r, 0.15*r*r, cd) * S(-0.02, 0.02, st.y - y);
          float droplets = max(0.0, (sin(st.y*(1.0-st.y)*120.0) - st.y)) * trail * n.z;
          float m = mainDrop + droplets*r*mainDrop;
          return vec2(m, max(mainDrop, droplets*0.5));
        }
        vec2 getDrops(vec2 uv, float t){
          vec2 c = vec2(0.0);
          c += dropLayer(uv*1.0, t);
          c += dropLayer(uv*1.85 + 7.7, t*1.3);
          vec2 sid = fract(uv*30.0);
          vec3 sn  = hash31(dot(floor(uv*30.0), vec2(7.0,113.0)));
          float stat = S(0.3,0.0, length(sid-0.5)) * Saw(0.025, fract(t*0.3+sn.z));
          c += vec2(stat*0.6);
          return c;
        }

        void main(){
          vec2 uv = vUv;
          if (uWet <= 0.001){ gl_FragColor = texture2D(tDiffuse, uv); return; }  // no-op (rayquaza)
          vec2 asp = vec2(iResolution.x/iResolution.y, 1.0);
          vec2 guv = (uv-0.5)*asp + 0.5;
          float t  = iTime;

          vec2  c    = getDrops(guv, t);
          float e    = 1.5/iResolution.y;
          float hx   = getDrops(guv+vec2(e,0.0), t).x;
          float hy   = getDrops(guv+vec2(0.0,e), t).x;
          vec2  grad = vec2(hx - c.x, hy - c.x);
          vec2  refr = uv - grad*REFRACT*uWet;

          float clarity = clamp(c.y, 0.0, 1.0);
          // sample the scene SHARP (only the tiny refraction offset) — no blur
          // sampling, no darkening, so the view stays clear behind the glass.
          vec3 col = texture2D(tDiffuse, refr).rgb;

          float glint = pow(clamp(grad.y*-6.0,0.0,1.0), 2.0) * clarity;
          col += glint*0.28*uWet;   // bright beads so droplets still read on the glass

          vec3 dry = texture2D(tDiffuse, uv).rgb;
          // droplets/glints are visible on the letters, but refraction+blur
          // are kept low (consts above) so the wet pass doesn't smear or
          // block the text + greninja behind it.
          gl_FragColor = vec4(mix(dry, col, uWet * 0.75), 1.0);
        }`,
    };
    const rainPass = new ShaderPass(RainShader);
    rainPass.enabled = false;   // flipped on once uWet > 0 (greninja)
    composer.addPass(rainPass);

    // OutputPass applies ACES Filmic at the END so bloom is computed in
    // linear and only tone-mapped once.
    composer.addPass(new OutputPass());

    /* ── camera curve (flies around the model) ────────────────────── */
    // closed loop around the origin: sweeps wide → close pass → climbs → drops
    const camCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3( 50,  10,   0),
      new THREE.Vector3( 36,  22, -32),
      new THREE.Vector3(  0,  30, -46),
      new THREE.Vector3(-34,  18, -30),
      new THREE.Vector3(-44,  -2,   2),
      new THREE.Vector3(-30, -10,  36),
      new THREE.Vector3(  4,  -4,  48),
      new THREE.Vector3( 34,   6,  34)
    ], /* closed */ true, 'centripetal', 0.5);

    // (debug cube removed — we now know the model renders at its skeleton
    // center; the camera orbits around that instead of origin.)

    /* ── wet-glass uniforms for the pk text (greninja only) ───────────
       uWet ramps 0→1 when greninja is active, 1→0 (fully dry, original
       glass) for rayquaza. The shader injection perturbs the surface
       normal with a downward-drifting droplet/rivulet field and adds
       bright specular speckles where droplets sit — refraction wobbles
       and light beads on the letters. uWet=0 is a no-op so rayquaza's
       glass (and the lightning glassCharge optical modulation, which
       mutates roughness/clearcoat/iridescence/dispersion on the SAME
       material) is completely unchanged. The two coexist because the wet
       effect lives entirely inside the compiled shader behind uWet, while
       glassCharge only touches JS material properties — different layers,
       no shared state. */
    const pkWet = { uWet: { value: 0.0 }, uTime: { value: 0.0 }, uPulse: { value: 0.0 } };
    function installWetGlass(mat) {
      // Per-letter droplet effect: drops bead and roll down ONLY the glass
      // "pk" letters (object-space), refracting/beading on the surface. The
      // fullscreen rain-on-glass post-process is DISABLED (it smeared the
      // whole view), so these per-letter droplets are the wet effect.
      if (mat.userData.__wetInstalled) return;
      mat.userData.__wetInstalled = true;
      const prev = mat.onBeforeCompile;
      mat.onBeforeCompile = (shader) => {
        if (prev) prev(shader);
        shader.uniforms.uWet   = pkWet.uWet;
        shader.uniforms.uTime  = pkWet.uTime;
        shader.uniforms.uPulse = pkWet.uPulse;
        // droplet field helpers + a normal perturbation, injected before
        // lighting so the wobble affects reflection/refraction. Object-
        // space position (vWetPos) gives a stable UV that rolls downward.
        shader.vertexShader = shader.vertexShader.replace(
          '#include <common>',
          `#include <common>
           varying vec3 vWetPos;`
        ).replace(
          '#include <begin_vertex>',
          `#include <begin_vertex>
           vWetPos = position;`
        );
        shader.fragmentShader = shader.fragmentShader.replace(
          '#include <common>',
          `#include <common>
           varying vec3 vWetPos;
           uniform float uWet;
           uniform float uTime;
           uniform float uPulse;   // 0..1 music amplitude — pulses the blue glow
           // ── rain-on-glass droplet field — adapted from "Heartfelt" by
           //    Martijn Steinrucken / BigWIngs (Shadertoy ltffzl,
           //    CC BY-NC-SA 3.0), ported to object-space on the letters.
           //    Produces big drops that TRICKLE downward leaving thin
           //    rivulet trails dotted with small droplets, plus a field of
           //    static beads. Returns vec2(height, trailMask): height is
           //    the wet "thickness" used for the refraction normal; the
           //    combined value also drives the bright specular beads. ──
           float whS(float t){ return fract(sin(t*12345.564)*7658.76); }   // N
           vec3 whS3(float p){                                             // N13
             vec3 p3 = fract(vec3(p) * vec3(.1031,.11369,.13787));
             p3 += dot(p3, p3.yzx + 19.19);
             return fract(vec3((p3.x+p3.y)*p3.z, (p3.x+p3.z)*p3.y, (p3.y+p3.z)*p3.x));
           }
           float wSaw(float b, float t){ return smoothstep(0.,b,t)*smoothstep(1.,b,t); }
           #define wS(a,b,t) smoothstep(a,b,t)
           // falling drops + trails (Heartfelt DropLayer2)
           vec2 dropLayer2(vec2 uv, float t){
             vec2 UV = uv;
             uv.y += t*0.75;
             vec2 a = vec2(6., 1.);
             vec2 grid = a*2.;
             vec2 id = floor(uv*grid);
             float colShift = whS(id.x);
             uv.y += colShift;
             id = floor(uv*grid);
             vec3 n = whS3(id.x*35.2+id.y*2376.1);
             vec2 st = fract(uv*grid)-vec2(.5,0);
             float x = n.x-.5;
             float y = UV.y*20.;
             float wiggle = sin(y+sin(y));
             x += wiggle*(.5-abs(x))*(n.z-.5);
             x *= .7;
             float ti = fract(t+n.z);
             y = (wSaw(.85,ti)-.5)*.9+.5;
             vec2 p = vec2(x,y);
             float d = length((st-p)*a.yx);
             float mainDrop = wS(.4,.0,d);
             float r = sqrt(wS(1.,y,st.y));
             float cd = abs(st.x-x);
             float trail = wS(.23*r,.15*r*r,cd);
             float trailFront = wS(-.02,.02,st.y-y);
             trail *= trailFront*r*r;
             y = UV.y;
             float trail2 = wS(.2*r,.0,cd);
             float droplets = max(0.,(sin(y*(1.-y)*120.)-st.y))*trail2*trailFront*n.z;
             y = fract(y*10.)+(st.y-.5);
             float dd = length(st-vec2(x,y));
             droplets = wS(.3,0.,dd);
             float m = mainDrop+droplets*r*trailFront;
             return vec2(m, trail);
           }
           // static beads clinging to the glass (Heartfelt StaticDrops)
           float staticDrops(vec2 uv, float t){
             uv *= 40.;
             vec2 id = floor(uv);
             uv = fract(uv)-.5;
             vec3 n = whS3(id.x*107.45+id.y*3543.654);
             vec2 p = (n.xy-.5)*.7;
             float d = length(uv-p);
             float fade = wSaw(.025, fract(t+n.z));
             return wS(.3,0.,d)*fract(n.z*10.)*fade;
           }
           // combine static beads + two falling-drop layers (Heartfelt Drops)
           vec2 dropField(vec2 uv, float t){
             float s = staticDrops(uv, t)*0.32;          // fewer static beads
             vec2 m1 = dropLayer2(uv, t)*0.60;           // fewer falling drops
             vec2 m2 = dropLayer2(uv*1.85, t)*0.35;
             float c = s+m1.x+m2.x;
             c = wS(.45,1.,c);                            // higher threshold → sparser
             return vec2(c, max(m1.y, m2.y));
           }`
        );
        // perturb the normal right after it's established. wetMask is
        // declared at <common> scope (a global in the fragment main) so
        // later includes can read it. We compute it here.
        shader.fragmentShader = shader.fragmentShader.replace(
          'varying vec3 vWetPos;',
          `varying vec3 vWetPos;
           float wetMask = 0.0;`
        );
        shader.fragmentShader = shader.fragmentShader.replace(
          '#include <normal_fragment_maps>',
          `#include <normal_fragment_maps>
           if (uWet > 0.001) {
             // object-space UV over the letter face; scaled so drops read
             // at a believable physical size on the glyph surface.
             vec2 wuv = vWetPos.xy * 0.11 + vec2(0.5, 0.5);  // higher scale → smaller drops
             float tt = uTime * 0.30;
             vec2 fld = dropField(wuv, tt);
             float height = fld.x;          // wet thickness (drops + trails)
             wetMask = clamp(height + fld.y*0.6, 0.0, 1.0);
             // finite-difference gradient of the height field → refraction
             // wobble. Drops sit ON the surface and bend the view through
             // them; gravity already lives in the field's downward motion.
             float e = 0.0015;
             float hx = dropField(wuv+vec2(e,0.), tt).x - dropField(wuv-vec2(e,0.), tt).x;
             float hy = dropField(wuv+vec2(0.,e), tt).x - dropField(wuv-vec2(0.,e), tt).x;
             vec3 wob = vec3(-hx, -hy, 0.0) * (0.9/e) * 0.012 * uWet;
             normal = normalize(normal + wob);
           }`
        );
        // wet surface reads sharper/glossier (lower roughness) where the
        // water film sits — applied after roughnessFactor is established.
        shader.fragmentShader = shader.fragmentShader.replace(
          '#include <roughnessmap_fragment>',
          `#include <roughnessmap_fragment>
           roughnessFactor = mix(roughnessFactor, roughnessFactor * 0.18, uWet * wetMask);`
        );
        shader.fragmentShader = shader.fragmentShader.replace(
          '#include <dithering_fragment>',
          `#include <dithering_fragment>
           // bright beaded specular highlight catching on the drops — a
           // tight hot core plus a softer halo so beads read as glossy
           // water rather than flat speckle.
           float bead = uWet * wetMask;
           gl_FragColor.rgb += vec3(0.70, 0.85, 1.0) * pow(bead, 2.2) * 0.85
                             + vec3(0.30, 0.45, 0.62) * bead * 0.30;
           // blue fresnel rim + soft inner glow so the glass letters stay
           // visible against the dark water (greninja/underwater only, via
           // uWet — rayquaza glass is untouched). Brightest at glancing
           // edges (fresnel) with a gentle all-over cool fill.
           {
             vec3 vd = normalize(vViewPosition);
             float fres = pow(1.0 - clamp(dot(normalize(normal), vd), 0.0, 1.0), 2.5);
             vec3 rimCol = vec3(0.25, 0.62, 1.0);   // cool blue
             // music-reactive: the blue rim/glow swells with the beat
             float glow = uWet * (0.9 + uPulse * 1.1);
             gl_FragColor.rgb += rimCol * fres * glow;                       // glowing edge
             gl_FragColor.rgb += vec3(0.10, 0.28, 0.5) * uWet * (0.18 + uPulse * 0.22); // soft fill
           }`
        );
      };
      mat.needsUpdate = true;
    }

    /* ── pk logo (loaded in parallel with model) ──────────────────── */
    let pkText = null;
    new FontLoader().load(
      'https://cdn.jsdelivr.net/npm/three@0.160/examples/fonts/helvetiker_bold.typeface.json',
      (font) => {
        const geo = new TextGeometry('pk', {
          font,
          size: 8,
          height: 2.2,
          curveSegments: 24,
          bevelEnabled: true,
          // very small bevel — just enough to soften the sharp corner
          // and pick up a hairline highlight, not enough to read as a
          // chunky rounded edge.
          bevelThickness: 0.06,
          bevelSize: 0.025,
          bevelOffset: 0,
          bevelSegments: 4
        });
        geo.computeBoundingBox();
        geo.center();
        // refined glass — adds three layers of nuance on top of the base
        // refraction:
        //   1) iridescence — thin-film interference creates subtle
        //      rainbow shifts across the surface as the camera moves
        //   2) dispersion — light splits into RGB through the bevel
        //      edges (real glass prism behavior), only available on
        //      three r156+
        //   3) bumped thickness + lower roughness for deeper, sharper
        //      refraction of Rayquaza behind the letters
        // subtle invisible-glass — maximum transparency, only the
        // gentlest cues that it's there (light bevel highlight, faint
        // refraction). Reads as a presence more than a material.
        const mat = new THREE.MeshPhysicalMaterial({
          color:               0xffffff,
          metalness:           0.0,
          roughness:           0.06,
          transmission:        1.0,
          thickness:           1.4,
          ior:                 1.5,
          envMapIntensity:     1.0,
          clearcoat:           0.5,
          clearcoatRoughness:  0.08,
          attenuationColor:    new THREE.Color(0xeef4ff),
          attenuationDistance: 12.0,
          // dial iridescence down to a whisper
          iridescence:                  0.25,
          iridescenceIOR:               1.3,
          iridescenceThicknessRange:    [120, 420],
          dispersion: 0.2,
          transparent: true,
          side: THREE.DoubleSide,
          // CRITICAL: exempt the glass from scene.fog. Underwater the
          // FogExp2 water haze would otherwise wash the letters into a
          // flat blue blob; keeping fog off the glass lets it stay clear,
          // refractive and legible (it still picks up a cool tint via the
          // water it refracts/reflects, which reads as realistically
          // submerged glass without dissolving into the background).
          fog: false
        });
        installWetGlass(mat);   // wet-glass shader (inert until uWet > 0)
        pkText = new THREE.Mesh(geo, mat);
        if (model) pkText.position.copy(modelCenter);
        scene.add(pkText);
      }
    );

    /* ── load model, capture skeleton ─────────────────────────────── */
    let model       = null;
    let bodyChain   = [];   // ordered head → spine → tail, full chain
    let jaw         = null;
    let arms        = { L: [], R: [] };
    let modelCenter = new THREE.Vector3();

    /* ── pokemon switching state ───────────────────────────────────────
       `currentPokemon` gates which animation system runs each frame:
         'rayquaza' → procedural bone undulation + cry (the original rig)
         'greninja' → THREE.AnimationMixer playing a baked GLB clip
       Only one model is in the scene at a time; the other is removed
       (and its GPU resources disposed) on switch. Greninja is lazy-loaded
       on first toggle so initial page load only pays for Rayquaza. */
    let currentPokemon = 'rayquaza';
    let greninjaModel  = null;     // gltf.scene once loaded
    let greninjaMixer  = null;     // THREE.AnimationMixer for the baked clip
    let greninjaLoading = false;
    let switching       = false;   // guards re-entrant clicks during a swap

    // Greninja framing — easy-to-tweak knobs. The model is auto-fit at
    // load time so it occupies GRENINJA_TARGET_SIZE world units (matching
    // Rayquaza's visual footprint in front of the camera); these offsets
    // then nudge it into the same pocket between the "pk" letters.
    const GRENINJA_TARGET_SIZE = 17.10; // user-chosen size (locked in)
    const GRENINJA_Y_OFFSET    = 0.10;  // user-chosen pose
    const GRENINJA_X_OFFSET    = -1.80; // user-chosen pose
    const GRENINJA_Z_OFFSET    = 8.90;  // user-chosen pose
