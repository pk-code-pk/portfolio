        log(`model · center (${modelCenter.x.toFixed(1)},${modelCenter.y.toFixed(1)},${modelCenter.z.toFixed(1)}) · size ${worldSize.toFixed(1)}`);

        // place the pk text at the model's actual world center
        if (pkText) pkText.position.copy(modelCenter);

        // restore the model's native metallic look. The synthetic env map
        // provides the highlights + rim so chrome reads chrome, not black.
        // Selective brightness boost on the model (small margin) WITHOUT
        // changing materials on the pk text (which keeps its own settings).
        const maxAniso = renderer.capabilities.getMaxAnisotropy();
        model.traverse(o => {
          if (o.isMesh && o.material) {
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(m => {
              // texture quality: max anisotropy (sharp at glancing angles —
              // most of the serpent's body IS at a glancing angle) and force
              // smooth linear filtering in case the export baked in nearest
              // (reads as hard pixel blocks when magnified).
              ['map', 'normalMap', 'roughnessMap', 'metalnessMap', 'emissiveMap', 'aoMap'].forEach(k => {
                const tex = m[k];
                if (tex && tex.isTexture) {
                  tex.anisotropy = maxAniso;
                  if (tex.magFilter === THREE.NearestFilter) tex.magFilter = THREE.LinearFilter;
                  if (tex.minFilter === THREE.NearestFilter || tex.minFilter === THREE.NearestMipmapNearestFilter)
                    tex.minFilter = THREE.LinearMipmapLinearFilter;
                  tex.needsUpdate = true;
                }
              });
              if ('envMapIntensity' in m) m.envMapIntensity = 2.0;   // ~25% lift
              if ('roughness' in m)       m.roughness = Math.max(m.roughness, 0.25);
              // tiny self-glow so the body never crushes to pure black
              // in shadowed orientations — keeps the green/red readable
              if (m.map && 'emissive' in m) {
                m.emissive = new THREE.Color(0x141a14);
                m.emissiveIntensity = 0.35;
              }
            });
          }
        });

        // build the full body chain head → spine → tail-tip so the wave
        // travels along the whole serpent, not just the tail. order matters:
        // a traveling sin(t - k*i) wave needs i increasing monotonically
        // from one end of the body to the other.
        const found = { head: null, neck: [], spine: [], tail: [], jaw: null };
        const arms_L = [], arms_R = [];
        model.traverse(o => {
          if (!o.isBone) return;
          const n = o.name;
          if (/^Head_/.test(n))        found.head = o;
          else if (/^Neck(\d+)_/.test(n))  found.neck.push(o);
          else if (/^Spine(\d+)_/.test(n)) found.spine.push(o);
          else if (/^Tail(\d+)_/.test(n) && !/_end_/.test(n)) found.tail.push(o);
          else if (/^Jaw_/.test(n) && !/_end_/.test(n)) found.jaw = o;
          else if (/^LArm_|^LForeArm_/.test(n)) arms_L.push(o);
          else if (/^RArm_|^RForeArm_/.test(n)) arms_R.push(o);
        });
        const byNum = (re) => (a, b) =>
          parseInt(a.name.match(re)[1], 10) - parseInt(b.name.match(re)[1], 10);
        found.neck.sort(byNum(/Neck(\d+)/));
        found.spine.sort(byNum(/Spine(\d+)/));
        found.tail.sort(byNum(/Tail(\d+)/));

        // chain index 0 = head end (small wave amplitude), increasing
        // toward tail tip (largest amplitude).
        bodyChain = [
          ...(found.head ? [found.head] : []),
          ...found.neck.slice().reverse(),     // Neck2 closer to head than Neck1
          ...found.spine.slice().reverse(),    // Spine2 closer to head than Spine1
          ...found.tail
        ];
        jaw    = found.jaw;
        arms.L = arms_L;
        arms.R = arms_R;

        // snapshot rest rotations so animations are additive offsets
        [...bodyChain, jaw, ...arms.L, ...arms.R].filter(Boolean).forEach(b => {
          b.userData.rest = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };
        });

        log(`loaded · chain ${bodyChain.length} (head→tail) · arms ${arms.L.length+arms.R.length} · jaw ${jaw?'y':'n'}`);

        // ══ FLIGHT TRAIL-RIG CALIBRATION ═══════════════════════════════
        // Rayquaza's skeleton is a Y-junction (Waist → {Hips→Tail…} and
        // Waist → Spine1→Spine2→Neck1→Neck2→Head), topologically identical
        // to the gyarados rig. On click we drive the body head→tail along a
        // 3D flight curve so the WHOLE SERPENT flows through the path — head
        // leads into turns, spine follows the arc, tail trails the track.
        // This block pre-computes, per driven bone: its rest-forward axis
        // (toward its body-child), rest world quaternion, a parallel-
        // transported dorsal "up", and cumulative body-arc — everything the
        // per-frame aim needs. All state lives on model.userData.rqf.
        try {
          let rqWaist = null, rqHips = null;
          model.traverse(o => {
            if (!o.isBone) return;
            if (/^Waist/.test(o.name) && !rqWaist) rqWaist = o;
            if (/^Hips/.test(o.name)  && !rqHips)  rqHips  = o;
          });
          const neckRev  = found.neck.slice().reverse();   // [Neck2(head-side), Neck1]
          const spineRev = found.spine.slice().reverse();   // [Spine2(head-side), Spine1]
          // driven body order head→tail. Head is EXCLUDED (rides the neck via
          // pure FK, held at its rest-local so it never jitters). Hips is the
          // Y-seam that drives the tail base.
          const driven = [
            ...neckRev, ...spineRev,
            ...(rqHips ? [rqHips] : []),
            ...found.tail
          ].filter(Boolean);
          const drivenSet = new Set(driven);

          // processing order = hierarchy parent-before-child (traversal order),
          // so each bone reads its parent's fresh world matrix in Pass B.
          const proc = [];
          model.traverse(o => { if (o.isBone && drivenSet.has(o)) proc.push(o); });

          // calibrate in the model's IDENTITY rotation frame (runtime blends
          // model.rotation → 0 in flight, so the dorsal reference must be
          // measured there). Save + restore the loaded rotation.
          const rqSavedRot = model.rotation.clone();
          model.rotation.set(0, 0, 0);
          model.updateMatrixWorld(true);

          const tmpV = new THREE.Vector3();
          driven.forEach(b => {
            let bodyChild = b.children.find(c => c.isBone && drivenSet.has(c));
            if (!bodyChild) {
              bodyChild = b.children.find(c => c.isBone && /^Head/.test(c.name))
                       || b.children.find(c => c.isBone && !/^Jaw/.test(c.name))
                       || b.children.find(c => c.isBone);
            }
            tmpV.copy(bodyChild ? bodyChild.position : new THREE.Vector3(1,0,0)).normalize();
            b.userData.rqRestFwd      = tmpV.clone();
            b.userData.rqBodyChild    = bodyChild || null;
            b.userData.rqRestWorldQ   = b.getWorldQuaternion(new THREE.Quaternion());
            b.userData.rqRestFwdWorld = b.userData.rqRestFwd.clone()
                                          .applyQuaternion(b.userData.rqRestWorldQ).normalize();
            b.userData.rqWQ           = new THREE.Quaternion();   // per-frame aim target (world)
            b.userData.rqCurWQ        = new THREE.Quaternion();   // temporally-smoothed world quat
          });

          // continuous dorsal surface by parallel transport head→tail (seed +Y),
          // so head/neck/spine/tail all roll the same face up → no belly-flip.
          {
            const carry = new THREE.Vector3(0, 1, 0);
            for (let i = 0; i < driven.length; i++) {
              const fw = driven[i].userData.rqRestFwdWorld;
              carry.addScaledVector(fw, -carry.dot(fw));
              if (carry.lengthSq() < 1e-5) {
                carry.set(0, 1, 0).addScaledVector(fw, -fw.y);
                if (carry.lengthSq() < 1e-5) carry.set(0, 0, 1).addScaledVector(fw, -fw.z);
              }
              carry.normalize();
              driven[i].userData.rqRestUpWorld = carry.clone();
            }
          }

          // cumulative body-arc (world distance between successive driven-bone
          // heads at rest). Also the tail-end so the last bone has a forward.
          const wp = driven.map(b => new THREE.Vector3().setFromMatrixPosition(b.matrixWorld));
          const cum = [0];
          for (let i = 1; i < driven.length; i++) cum[i] = cum[i-1] + wp[i].distanceTo(wp[i-1]);
          driven.forEach((b, i) => { b.userData.rqCumArc = cum[i]; });
          const tailLeaf = driven[driven.length - 1];
          const tailEndBone = tailLeaf.userData.rqBodyChild;
          let rqTailEndArc = cum[cum.length - 1];
          if (tailEndBone) {
            const tp = new THREE.Vector3().setFromMatrixPosition(tailEndBone.matrixWorld);
            rqTailEndArc += tp.distanceTo(wp[wp.length - 1]);
          } else {
            rqTailEndArc += 0.5;
          }
          const rqBodyArc = rqTailEndArc;
          // junction (Waist) body-arc = arc of the front spine leaf (Spine1),
          // the seam bone. Anchor the model each frame so Waist lands there.
          const rqSpine1 = found.spine[0];  // Spine1
          const rqJunctionArc = (rqSpine1 && typeof rqSpine1.userData.rqCumArc === 'number')
                              ? rqSpine1.userData.rqCumArc : rqBodyArc * 0.4;

          // bake the HEAD rest-local so it rides the neck rigidly in flight.
          if (found.head) {
            found.head.userData.rqRestLocal = found.head.quaternion.clone();
          }

          // ── build the FLIGHT CURVE — a distinct 3D orbit around the letters
          // (NOT a figure-8): a single non-self-crossing ring in screen-XY that
          // also dives in front of / climbs behind the text (Z weave) and rolls
          // its height (Y harmonic) so it reads as a dragon banking through the
          // air. Sized so curveLength ≈ 2.2× bodyArc → body fills ~45% of the
          // loop: head clearly LEADS, tail clearly TRAILS on the same track.
          const baseShape = (th) => new THREE.Vector3(
            Math.cos(th) * 1.35,                                   // wide X orbit
            0.60 * Math.sin(th) + 0.16 * Math.sin(2*th + 0.5),     // ellipse + teardrop
            // depth weave — amplitude raised 0.55 → 0.95 (same phase, same
            // lobes): identical orbit, it just travels far enough in Z now
            // to pass clearly IN FRONT of and BEHIND the letters each lap.
            0.95 * Math.sin(th + 1.1) + 0.20 * Math.sin(3*th)
          );
          const SHN = 260;
          // measure base length
          let baseLen = 0; let prev = baseShape(0);
          for (let i = 1; i <= SHN; i++) {
            const p = baseShape((i / SHN) * Math.PI * 2);
            baseLen += p.distanceTo(prev); prev = p;
          }
          const scaleS = (2.2 * rqBodyArc) / baseLen;
          const flightPts = [];
          for (let i = 0; i < SHN; i++) {
            flightPts.push(baseShape((i / SHN) * Math.PI * 2).multiplyScalar(scaleS));
          }
          const flightCurve = new THREE.CatmullRomCurve3(flightPts, true, 'catmullrom', 0.1);
          flightCurve.arcLengthDivisions = 1200;
          flightCurve.updateArcLengths();
          const rqCurveLen = flightCurve.getLength();

          model.rotation.copy(rqSavedRot);
          model.updateMatrixWorld(true);

          // save rest-local quaternion for every driven bone so non-bodyChain
          // bones (e.g. Hips) can be restored to a consistent base on landing
          driven.forEach(b => { b.userData.rqRestLocalQ = b.quaternion.clone(); });
          const rqBodyChainSet = new Set(bodyChain);

          model.userData.rqf = {
            driven, proc, waist: rqWaist,
            bodyArc: rqBodyArc, tailEndArc: rqTailEndArc,
            junctionArc: rqJunctionArc,
            curve: flightCurve, curveLen: rqCurveLen,
            bodyChainSet: rqBodyChainSet,
          };
          log(`flight rig · driven ${driven.length} · bodyArc ${rqBodyArc.toFixed(1)} · curveLen ${rqCurveLen.toFixed(1)} (×${(rqCurveLen/rqBodyArc).toFixed(2)}) · junctionArc ${rqJunctionArc.toFixed(1)}`);
        } catch (e) {
          log('flight rig build failed: ' + e.message);
        }

        // warm up: compile all materials + run one full composer pass so
        // every shader (incl. bloom's render-target programs) is linked
        // up front. Without this the FIRST visible frame stalls on
        // shader-link — the main cause of the resume hitch.
        try {
          renderer.compile(scene, camera);
          composer.render();
        } catch (e) {}

        // HERO READY: model loaded + shaders compiled + first frame rendered.
        // Tell the parent so its preloader can dismiss only once the hero is
        // actually on screen (was dismissing on a fixed timer, leaving a blank
        // hero loading on slow phones).
        try {
          window.__heroReady = true;
          if (window.parent && window.parent !== window) {
            window.parent.postMessage({ __heroReady: true }, '*');
          }
        } catch (e) {}
      },
      undefined,
      (err) => {
        log('load error: ' + (err.message || err));
        // even on failure, don't trap the parent's preloader forever
        try { window.parent && window.parent.postMessage({ __heroReady: true }, '*'); } catch (e2) {}
      }
    );

    /* ── greninja: lazy load + mixer setup ─────────────────────────────
       Loaded on first switch. Auto-fit so it matches Rayquaza's footprint,
       recentred on `modelCenter`, and driven by an AnimationMixer playing
       its baked idle clip (advanced with delta time in tick()). */
    function loadGreninja() {
      return new Promise((resolve, reject) => {
        if (greninjaModel) { resolve(greninjaModel); return; }
        new GLTFLoader().load('pokemon/gyarados_rigged.glb',
          (gltf) => {
            const g = gltf.scene;

            // rigged gyarados GLB — pose: a dramatic HEAD-UP REARING serpent
            // at a 3/4 hero angle, coiling up through the "pk" letters (per
            // the user's reference). The model's long axis is local Z; we
            // rear it vertical (head up), then add a slight yaw + tilt so it
            // reads as a three-quarter view rising toward the viewer.
            //   • rotation.x = -PI/2  → stand the body vertical, HEAD UP
            //   • rotation.y          → yaw for the 3/4 turn
            //   • rotation.z          → ROLL about the body's long axis (local
            //     Z, applied first in XYZ Euler order) — +PI rolls the BLUE
            //     dorsal side + face to the camera (was showing cream belly),
            //     plus a small tilt off pure-vertical.
            // Captured as baseRotX/Y/Z so the idle group-sway adds onto it.
            g.rotation.set(3.141, 2.681, 3.141);   // user-chosen pose (locked in)

            // auto-fit: scale so the longest bbox dimension == target size.
            g.updateMatrixWorld(true);
            const box  = new THREE.Box3().setFromObject(g);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const s = GRENINJA_TARGET_SIZE / maxDim;
            g.scale.setScalar(s);
            // scale-per-target-size-unit, so the fixed target size maps cleanly
            // to world scale without re-fitting the bbox.
            g.userData.unitScale  = s / GRENINJA_TARGET_SIZE;
            g.userData.targetSize  = GRENINJA_TARGET_SIZE;

            // recompute box after scaling, then translate so its center
            // sits at the world origin used for framing, plus offsets.
            g.updateMatrixWorld(true);
            const box2    = new THREE.Box3().setFromObject(g);
            const center2 = box2.getCenter(new THREE.Vector3());
            // center the model on the same world point the camera frames
            // (Rayquaza's bone-derived center), not raw origin.
            g.position.sub(center2).add(modelCenter);
            g.userData.basePos = g.position.clone();   // baseline for idle drift

            // material tweak — same env lift treatment as Rayquaza so it
            // doesn't crush to black against the dark scene. The underwater
            // FogExp2 + cool low-key lighting otherwise swallow the creature
            // into the haze, so we also lift envMap + add a faint cyan
            // emissive floor so the serpent reads against the murk.
            g.traverse(o => {
              if (o.isMesh && o.material) {
                const mats = Array.isArray(o.material) ? o.material : [o.material];
                mats.forEach(m => {
                  // CRITICAL: exempt gyarados from the dense underwater
                  // FogExp2 — at the framed distance the fog was blending the
                  // whole creature into the water (it WAS on-screen & visible,
                  // just fully fogged out). Same trick used on the pk glass.
                  m.fog = false;
                  if ('envMapIntensity' in m) m.envMapIntensity = 2.4;
                  if ('emissive' in m && m.emissive) {
                    // gentle cool self-glow so the serpent lifts off the dark
                    // water without blowing out (fog no longer eats it).
                    m.emissive.setHex(0x2a4a55);
                    if ('emissiveIntensity' in m) m.emissiveIntensity = 0.6;
                  }
                  m.needsUpdate = true;
                });
              }
            });

            // REAL SKELETON — gyarados_rigged.glb has a 63-joint skeleton.
            // Build a head→tail ordered bone chain (the SAME technique
            // rayquaza uses) and drive it with a procedural travelling wave
            // in tick(). No baked clips → no AnimationMixer.
            //
            // Bone names are suffixed with an index (e.g. Tail1_04,
            // Spine1_018, Neck_025, Head_028); match by prefix-regex and
            // sort Spine/Tail by their numeric segment index. Chain order is
            // head→tail so wave amplitude can grow from ~0 at the head to
            // max at the tail tip (Tail9).
            const gFound = { head: null, neck: [], spine: [], tail: [] };
            g.traverse(o => {
              if (!o.isBone) return;
              const n = o.name;
              if (/^Head_/.test(n))            gFound.head = o;
              else if (/^Neck_/.test(n))       gFound.neck.push(o);
              else if (/^Spine(\d+)_/.test(n)) gFound.spine.push(o);
              else if (/^Tail(\d+)_/.test(n))  gFound.tail.push(o);
              // Fin / Whisker / Jaw bones ignored for the body wave
            });
            const gByNum = (re) => (a, b) =>
              parseInt(a.name.match(re)[1], 10) - parseInt(b.name.match(re)[1], 10);
            gFound.spine.sort(gByNum(/Spine(\d+)/));
            gFound.tail.sort(gByNum(/Tail(\d+)/));
            // ── FIGURE-8 PATH-FOLLOW RIG CALIBRATION ──────────────────────
            // This rig is a Y-skeleton: two sub-chains share one junction
            // (Waist≡Hips, same world point):
            //   front half  Spine1→Spine2→…→Spine5→Neck→Head   (Head is the LEAF)
            //   back  half  Tail1 →Tail2 →…→Tail9               (Tail9 is the LEAF)
            // So the physical serpent, HEAD→TAIL, is:
            //   Head, Neck, Spine5, Spine4, Spine3, Spine2, Spine1,
            //   [junction], Tail1 … Tail9.
            // We DRIVE this body order: each bone's local "restForward" axis
            // (the local axis that points toward its hierarchy-child along the
            // body) is re-aimed in parent space at the curve so the chain lays
            // along + travels a figure-8 (see tick()).
            gFound.spine.sort(gByNum(/Spine(\d+)/));   // Spine1..Spine5
            // ── the Y-junction seam bone ──────────────────────────────────
            // Rig (verified live):  Origin_01 → Waist_02 → { Spine1…(front),
            // Hips_03 → Tail1…(back) }.  Spine1 and Hips_03 are SIBLINGS under
            // Waist_02, all three coincident at the body centre. The TAIL hangs
            // off Hips_03, which previously was NOT driven → the whole tail kept
            // its rest orientation while the spine bent, hinging ~70-88° at the
            // Spine1/Tail1 seam (the "mid-body disconnect"). Insert Hips_03 into
            // the body order BETWEEN the spine and the tail so it is driven like
            // any other body bone — it then aims from the seam into Tail1 and the
            // tail base bends with the spine: one continuous serpent.
            let gHips = null;
            g.traverse(o => { if (o.isBone && /^Hips/.test(o.name) && !gHips) gHips = o; });
            // body order head→tail (spine reversed: Spine5 is head-side).
            // Head is intentionally EXCLUDED — it follows the neck via pure FK
            // in the model's native GLB orientation. No procedural override.
            const spineRev = gFound.spine.slice().reverse();
            const gyaBody = [
              ...gFound.neck,
              ...spineRev,
              ...(gHips ? [gHips] : []),   // Y-junction seam (drives the tail base)
              ...gFound.tail
            ];
            // legacy alias (kept so nothing else referencing gyaChain breaks)
            const gyaChain = gyaBody;
            // mark head + neck so Pass B glues them tighter to the body (higher
            // slerp factor) → head stays the front tip, never trails/detaches.
            if (gyaBody[0]) gyaBody[0].userData.gyaHeadGlue = true;   // Head
            if (gFound.neck) gFound.neck.forEach(n => { n.userData.gyaHeadGlue = true; });
            // snapshot rest rotations (some old code paths read these)
            gyaBody.forEach(b => {
              b.userData.rest = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };
            });

            // For each body bone, find its hierarchy-CHILD that is also the
            // next body bone (so we know the local direction "down the body").
            const bodySet = new Set(gyaBody);
            const tmpV = new THREE.Vector3();
            // capture the REST WORLD orientation with the GROUP AT IDENTITY
            // (runtime sets group rotation to identity, so the dorsal-up
            //  reference must be measured in that same frame). We restore the
            //  reared rotation afterwards so the rest of the loader is unchanged.
            const savedRot = g.rotation.clone();
            g.rotation.set(0, 0, 0);
            g.updateMatrixWorld(true);
            gyaBody.forEach(b => {
              // the body-child = the child bone that is in our body set
              let bodyChild = b.children.find(c => c.isBone && bodySet.has(c));
              // Head is a leaf in the body order → use EndHead for forward dir.
              if (!bodyChild) {
                bodyChild = b.children.find(c => c.isBone && /^EndHead/.test(c.name))
                         || b.children.find(c => c.isBone && /^EndTail/.test(c.name))
                         || b.children.find(c => c.isBone);
              }
              b.userData.gyaRestQuat = b.quaternion.clone();
              // restForwardLocal = unit vector (in b's local space) toward that
              // child. The child's local position IS already in b's space.
              if (bodyChild) {
                tmpV.copy(bodyChild.position).normalize();
              } else {
                tmpV.set(1, 0, 0);
              }
              b.userData.gyaRestFwd = tmpV.clone();
              b.userData.gyaBodyChild = bodyChild || null;
              // REST WORLD quaternion + restForward expressed in WORLD space.
              // Re-aiming via a minimal WORLD-space rotation of these preserves
              // the bone's rest ROLL (dorsal stays up) — no belly-up twist.
              b.userData.gyaRestWorldQ = b.getWorldQuaternion(new THREE.Quaternion());
              b.userData.gyaRestFwdWorld =
                b.userData.gyaRestFwd.clone().applyQuaternion(b.userData.gyaRestWorldQ).normalize();
              // scratch target world quaternion (filled each frame, no realloc)
              b.userData.gyaWQ = new THREE.Quaternion();
            });

            // ── REST DORSAL ("back") reference, parallel-transported ──
            // The model is REARED: the spine's rest-forward points roughly +Y
            // (straight up) while the head's points +Z (toward camera) and the
            // tail's points −Z. So orthogonalising a SINGLE world axis (e.g.
            // +Y) against each bone's forward yields a dorsal that means
            // DIFFERENT physical surfaces head→tail (head→+Y, spine→−Z): when
            // the runtime roll forces each bone's dorsal onto the same
            // transported up, the head & spine roll different faces up → the
            // visible twist/kink at the head–neck junction.
            //
            // Fix: define ONE continuous dorsal surface by parallel-transport
            // along the physical chain (head→tail) in REST pose — each bone's
            // dorsal = the previous bone's dorsal re-orthogonalised against the
            // new forward. Seeded once from world +Y. Head, Neck and Spine then
            // share the SAME back surface, so re-rolling them onto the runtime
            // transported frame keeps them a single continuous body.
            {
              const carry = new THREE.Vector3(0, 1, 0);  // dorsal seed (world up)
              for (let i = 0; i < gyaBody.length; i++) {
                const b  = gyaBody[i];
                const fw = b.userData.gyaRestFwdWorld;
                // transport: strip the new-forward component, renormalise
                carry.addScaledVector(fw, -carry.dot(fw));
                if (carry.lengthSq() < 1e-5) {
                  // degenerate (carry ∥ forward): reseed from world +Y, else +Z
                  carry.set(0, 1, 0).addScaledVector(fw, -fw.y);
                  if (carry.lengthSq() < 1e-5) carry.set(0, 0, 1).addScaledVector(fw, -fw.z);
                }
                carry.normalize();
                b.userData.gyaRestUpWorld = carry.clone();
              }
            }

            // cumulative body-arc from the head (world distance between
            // successive body-bone heads in the natural pose). Also the total.
            const wpos = gyaBody.map(b => new THREE.Vector3().setFromMatrixPosition(b.matrixWorld));
            const cumArc = [0];
            for (let i = 1; i < gyaBody.length; i++) {
              cumArc[i] = cumArc[i - 1] + wpos[i].distanceTo(wpos[i - 1]);
            }
            // include the tail-tip end so the last bone has a forward sample
            const tailLeaf = gyaBody[gyaBody.length - 1];
            const tailEnd  = tailLeaf.userData.gyaBodyChild;
            let tailEndArc = cumArc[cumArc.length - 1];
            if (tailEnd) {
              const tp = new THREE.Vector3().setFromMatrixPosition(tailEnd.matrixWorld);
              tailEndArc += tp.distanceTo(wpos[wpos.length - 1]);
            }
            const bodyArc = tailEndArc;
            gyaBody.forEach((b, i) => { b.userData.gyaCumArc = cumArc[i]; });

            // ── HEAD = keep its NATURAL rest pose relative to its parent ──
            // The head follows the body fine via FK — it just must NOT derive
            // its own aim/roll from the noisy trail (that caused the spaz). The
            // head is rigidly attached to its parent in the model's REST mesh,
            // so its native LOCAL rest quaternion already lines its tan
            // underside up with the body's underside. We simply hold that rest
            // local rotation every frame → head rides the body with zero
            // independent DOF and its belly stays matched to the body's belly.
            {
              const headB = gyaBody[0];
              if (headB) {
                // BAKE the user's posed angle into the head's rest LOCAL
                // rotation ONCE, here at load. After this the head bone is
                // NEVER touched again — it's rigidly bolted to the neck at this
                // angle and pure FK carries it naturally through every curve
                // (no per-frame recompute = nothing to "switch" at the curves).
                // keep the NATIVE (un-posed) rest so any future calibration
                // hook can re-bake from a clean starting pose.
                headB.userData.gyaHeadNative = headB.quaternion.clone();
                const reBake = () => {
                  const q = headB.userData.gyaHeadNative.clone();
                  if (HEAD_TUNE.rx || HEAD_TUNE.ry || HEAD_TUNE.rz) {
                    q.multiply(new THREE.Quaternion().setFromEuler(
                      new THREE.Euler(HEAD_TUNE.rx, HEAD_TUNE.ry, HEAD_TUNE.rz)));
                  }
                  headB.quaternion.copy(q);
                  headB.userData.gyaHeadRestLocal = q.clone();
                };
                reBake();
                window.__gyaReBakeHead = reBake;          // calibration hook
                headB.userData.gyaIsHead = true;
                if (gyaBody[1]) gyaBody[1].userData.gyaIsNeck = true;
                if (gyaBody[2]) gyaBody[2].userData.gyaIsNeck = true;
              }
            }

            // restore the reared rotation we temporarily zeroed for calibration
            g.rotation.copy(savedRot);
            g.updateMatrixWorld(true);

            // junction (Waist≡Hips) sits between Spine1 (last front) and Tail1.
            // Its body-arc = cumArc of Spine1 (front leaf of the spine chain).
            const spine1 = gFound.spine[0];                       // Spine1
            const junctionArc = spine1 ? (spine1.userData.gyaCumArc || 0) : (bodyArc * 0.45);
            // the group ORIGIN sits at the junction in the rig; we will move the
            // group so the junction tracks the curve sample at junctionArc.
            // find the junction bone (Waist) to read its offset from origin.
            let junctionBone = null;
            g.traverse(o => { if (o.isBone && /^Waist/.test(o.name) && !junctionBone) junctionBone = o; });

            // ── build the FIGURE-8 (lemniscate) curve, arc-length sampled ──
            // Horizontal ∞ facing the camera (X-Y screen plane) with a gentle
            // Z weave so it dips in front of / behind the pk text. Sized so the
            // curve length ≥ ~1.4× body arc → the long body never kinks.
            // Sized BIG so curveLength ≈ 2.2–2.5× body arc: the serpent's body
            // occupies only ~45% of the loop at a time → the head clearly LEADS
            // around a large, readable ∞ and the tail TRAILS behind on the same
            // track (instead of the body filling/coiling the whole tight 8).
            const GYA8_A = 10.0;   // half-width  (X)  — wide lobes, both visible
            const GYA8_B = 6.5;    // half-height (Y)  — tall enough to read as 8
            const GYA8_Z = 2.5;    // depth weave (Z)   gentle in/out of the text
            const fig8Pts = [];
            const FN = 240;
            for (let i = 0; i < FN; i++) {
              const th = (i / FN) * Math.PI * 2;
              const x = GYA8_A * Math.cos(th);
              const y = GYA8_B * Math.sin(2 * th) * 0.5;
              const z = GYA8_Z * Math.sin(th);          // one weave per loop
              fig8Pts.push(new THREE.Vector3(x, y, z));
            }
            const fig8Curve = new THREE.CatmullRomCurve3(fig8Pts, true, 'catmullrom', 0.1);
            // arc-length LUT
            const LUTN = 1200;
            fig8Curve.arcLengthDivisions = LUTN;
            fig8Curve.updateArcLengths();
            const curveLength = fig8Curve.getLength();

            // PROCESSING order must be parent-before-child in the THREE
            // hierarchy (so a child reads its parent's fresh world matrix). The
            // spine sub-chain is rooted at Spine1 (Head is the leaf), so we
            // process Spine1→…→Spine5→Neck→Head, then Tail1→…→Tail9. Each bone
            // keeps its own body-arc + body-child (for the aim), independent of
            // processing order.
            const gyaProc = [
              ...gFound.spine,            // Spine1..Spine5 (shallow→deep)
              ...gFound.neck,             // Neck (head follows via FK, not driven)
              ...(gHips ? [gHips] : []),  // Y-junction seam — MUST precede Tail1
              ...gFound.tail              // Tail1..Tail9 (child of Hips)
            ];

            g.userData.gyaBody       = gyaBody;
            g.userData.gyaProc       = gyaProc;
            g.userData.gyaJunction   = junctionBone;
            g.userData.gyaJunctionArc= junctionArc;
            g.userData.gyaBodyArc    = bodyArc;
            g.userData.gyaCurve      = fig8Curve;
            g.userData.gyaCurveLen   = curveLength;
            g.userData.gyaTailEndArc = tailEndArc;
            log(`gya path · bodyArc ${bodyArc.toFixed(2)} · curveLen ${curveLength.toFixed(2)} (×${(curveLength/bodyArc).toFixed(2)}) · junctionArc ${junctionArc.toFixed(2)} · bones ${gyaBody.length}`);

            g.userData.gyaChain = gyaChain;

            // no baked clips on this rig — drive bones procedurally.
            greninjaMixer = null;
            const clips = gltf.animations || [];
            log(`gyarados loaded · scale ${s.toFixed(3)} · bones ${gyaChain.length} (${gyaChain[0] && gyaChain[0].name} → ${gyaChain[gyaChain.length-1] && gyaChain[gyaChain.length-1].name}) · ${clips.length} clips`);

            // preserve the full rearing orientation so the idle group-sway
            // adds on top of it (not clobbers it).
            g.userData.baseRotX = g.rotation.x;
            g.userData.baseRotY = g.rotation.y;
            g.userData.baseRotZ = g.rotation.z;
            greninjaModel = g;
            resolve(g);
          },
          undefined,
          (err) => { greninjaLoading = false; reject(err); }
        );
      });
    }

    /* ── switch model ──────────────────────────────────────────────── */
    const pokeBtn  = document.getElementById('poke-toggle');
    const pokeName = document.getElementById('poke-name');

    async function switchPokemon() {
      if (switching) return;
      const next = currentPokemon === 'rayquaza' ? 'greninja' : 'rayquaza';
      switching = true;
      if (pokeBtn) pokeBtn.disabled = true;

      try {
        if (next === 'greninja') {
          if (pokeName) pokeName.textContent = greninjaModel ? 'gyarados' : 'loading…';
          await loadGreninja();
          if (model) scene.remove(model);            // pull rayquaza out
          // fold the framing offsets into basePos ONCE so it remains the true
          // resting center. The idle sway adds on top without re-applying the
          // offsets, and the guard prevents accumulation on re-show.
          if (!greninjaModel.userData.baseFramed) {
            greninjaModel.userData.basePos.x += GRENINJA_X_OFFSET;
            greninjaModel.userData.basePos.y += GRENINJA_Y_OFFSET;
            greninjaModel.userData.basePos.z += GRENINJA_Z_OFFSET;
            greninjaModel.userData.baseFramed = true;
          }
          greninjaModel.position.copy(greninjaModel.userData.basePos);
          scene.add(greninjaModel);
          installGreninjaRim(greninjaModel);          // cyan fresnel aura
          currentPokemon = 'greninja';
          if (pokeName) pokeName.textContent = 'gyarados';
          // swap the WORLD: cosmic → underwater scene
          if (window.__nebulaMesh)  window.__nebulaMesh.visible  = false;
          if (window.__starfield)   window.__starfield.visible   = false;
          if (window.__greninjaSky) window.__greninjaSky.visible = true;
          if (snowMesh)             snowMesh.visible              = true;
          // FogExp2 = the water volume: distant geometry fades into the
          // blue-green haze (Beer–Lambert handled in the dome shader).
          scene.fog = new THREE.FogExp2(UW_FOG_COLOR, UW_FOG_DENSITY);
        } else {
          if (greninjaModel) scene.remove(greninjaModel);
          if (model) scene.add(model);
          currentPokemon = 'rayquaza';
          if (pokeName) pokeName.textContent = 'rayquaza';
          // restore the cosmic world
          if (window.__nebulaMesh)  window.__nebulaMesh.visible  = true;
          if (window.__starfield)   window.__starfield.visible   = true;
          if (window.__greninjaSky) window.__greninjaSky.visible = false;
          if (snowMesh)             snowMesh.visible              = false;
          scene.fog = null;
        }
      } catch (e) {
        log('greninja load failed: ' + (e.message || e));
        if (pokeName) pokeName.textContent = currentPokemon;
      } finally {
        switching = false;
        if (pokeBtn) pokeBtn.disabled = false;
      }
    }
    if (pokeBtn) pokeBtn.addEventListener('click', switchPokemon);

    /* ── resize ───────────────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
    });

    /* ── animate ──────────────────────────────────────────────────── */
    const clock = new THREE.Clock();
    const tmpLookAt = new THREE.Vector3();

    // ── preallocated temporaries for the gyarados figure-8 path-follow
    //    (allocation-free hot loop) ─────────────────────────────────────
    const _gT0   = new THREE.Vector3();   // sample at bone i
    const _gT1   = new THREE.Vector3();   // sample at the bone's body-child
    const _gDir  = new THREE.Vector3();   // desired world forward
    const _gPQ   = new THREE.Quaternion();// parent world quaternion
    const _gPQi  = new THREE.Quaternion();// its inverse
    const _gDelta= new THREE.Quaternion();// minimal world-space aim rotation
    const _gRoll = new THREE.Quaternion();// roll-to-dorsal-up correction
    const _gTgtW = new THREE.Quaternion();// target world quaternion
    const _gTgt  = new THREE.Quaternion();// target bone-local quaternion
    const _gJW   = new THREE.Vector3();   // junction world position
    const _gSamp = new THREE.Vector3();   // junction target sample
    const _gUp    = new THREE.Vector3();  // parallel-transported up
    const _gWorldUp = new THREE.Vector3(0, 1, 0);
    const _gHeadUp  = new THREE.Vector3(0, 1, 0); // head up carried across frames
    const _gCurUp = new THREE.Vector3();  // dorsal after aim
    const _gWantUp= new THREE.Vector3();  // desired (transported) up
    const _gCentDir = new THREE.Vector3(); // centripetal direction for banking
    const _gBwdTan  = new THREE.Vector3(); // backward tangent scratch
    // head-damping: previous-frame head target WORLD quat, so we can rate-limit
    // the head's per-frame rotation and never let it snap ~180° (cooked head).
    const _gHeadPrevWQ = new THREE.Quaternion();
    let   _gHeadPrevOK = false;            // becomes true once seeded
    // ── live gyarados head calibration state ──────────────────────────
    // an ADDITIVE local-euler offset applied to the head bone after the path
    // sets it, plus the head/neck glue factors.
    const HEAD_TUNE = { rx: 0, ry: 0, rz: 0, neckGlue: 0.6, headGlue: 0.95, pause: false };
    let _gPausedT = 0;   // frozen clock value captured when pause turns on
    const _gHeadOff = new THREE.Quaternion();   // scratch for the offset
    const _gHeadEul = new THREE.Euler();
    let   _gLastT = null;                 // for real dt
    let   _gSHead = 0;                    // head arc-distance along the 8
    // ── trailing-history ("snake") buffer ──────────────────────────────
    // The head drives along the figure-8; every frame we push its world
    // position + the cumulative arc it has TRAVELLED into a ring buffer.
    // Each body bone is then aimed at the trail point exactly its own
    // rest-arc-distance behind the head, so the body follows the head's
    // own path and consecutive bones stay one bone-length apart (no
    // bunching, no separation). seeded lazily on first greninja frame.
    const _GHIST_N = 2048;                // ring capacity (~34s at 60fps)
    const _gHistPos = new Float32Array(_GHIST_N * 3);
    const _gHistArc = new Float32Array(_GHIST_N);
    let   _gHistHead = -1;                 // index of newest sample (-1 = empty)
    let   _gHistCount = 0;                 // how many valid samples
    let   _gHeadTravel = 0;                // cumulative arc the head has travelled
    let   _gWarmFrames = 0;                // >0 = snap bones to target (no ease-in)
    const _gHP0 = new THREE.Vector3();     // trail sample (this bone)
    const _gHP1 = new THREE.Vector3();     // trail sample (toward head)
    const _gTanA = new THREE.Vector3();   // curvature probe tangent A (behind)
    const _gTanB = new THREE.Vector3();   // curvature probe tangent B (ahead)
    let   _gSpeedMulS = 1.0;              // temporally-smoothed speedMul (no instant jumps)

    // ── Rayquaza FLIGHT trail-rig state ────────────────────────────────
    // On click, Rayquaza's whole body conforms to + travels a 3D flight
    // curve around the letters — same path-follow principle as gyarados
    // (head leads, spine follows the arc, tail trails the same track) but
    // analytic (no ring buffer) and BLENDED in/out of the idle pose by
    // rqBlend. Reuses the _g* scratch temps (gyarados never runs on this
    // page — currentPokemon is exclusive).
    let   _rqHeadS  = 0;                    // head arc-distance along the flight curve
    let   _rqPrevT  = null;                 // for framerate-independent dt
    let   _rqActive = false;                // was the flight rig running last frame (for priming)
    let   _rqLastToggle = -999;             // debounce: ignore repeat clicks within 300ms
    const _rqHeadUp = new THREE.Vector3(0, 1, 0);  // transported up carried across frames
    const _rqAnchor = new THREE.Vector3();  // full-flight model.position that lands junction on curve
    const _rqIdleP  = new THREE.Vector3();  // idle float target position

    // (#1) parent posts {__heroAction:'pause'|'throttle'|'resume'}:
    //   pause    → fully off-screen: stop rendering entirely.
    //   throttle → actively scrolling: keep animating but at a low fps so
    //              the main thread has room for smooth scroll (NO freeze).
    //   resume   → idle + visible: full framerate.
    // renderMode drives the tick's frame-gating below.
    let renderMode = 'resume';
    let lastFrameT = 0;
    // adaptive-quality ratchet state (see tick)
    let aqFrames = 0, aqSlow = 0, aqLevel = 0;
    window.addEventListener('message', (e) => {
      const action = e.data && e.data.__heroAction;
      if (action === 'pause' || action === 'throttle' || action === 'resume') {
        renderMode = action;
      } else if (action === 'switchPokemon') {
        // parent's switch button (the iframe's own toggle is hidden when
        // embedded) → flip rayquaza ↔ gyarados.
        try { switchPokemon(); } catch (err) {}
      } else if (e.data && e.data.__heroClick) {
        // parent forwards click coords as NDC (iframe is pointer-events:none
        // when embedded, so the parent captures the pointer for us).
        window.__heroClick = e.data.__heroClick;
      }
    });

    // when viewed STANDALONE (not embedded) the iframe is NOT pointer-events:
    // none, so capture our own clicks/taps directly. When embedded these never
    // fire (events pass through) and the parent forwards coords via postMessage.
    const _selfHeroClick = (cx, cy) => {
      window.__heroClick = {
        x:  (cx / window.innerWidth)  * 2 - 1,
        y: -((cy / window.innerHeight) * 2 - 1),
      };
    };
    window.addEventListener('click', (e) => _selfHeroClick(e.clientX, e.clientY));
    window.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches[0]) _selfHeroClick(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    function tick(now) {
      requestAnimationFrame(tick);
      now = now || 0;
      // frame-gating per mode. NOTE: 'pause' is a TRICKLE (~5fps), not a
      // hard stop — keeps the WebGL shaders warm and the compositor layer
      // promoted, so scrolling BACK to the hero resumes instantly instead
      // of hitching on shader-recompile + layer re-promotion.
      if (renderMode === 'pause')    { if (now - lastFrameT < 200) return; }  // ~5fps
      else if (renderMode === 'throttle') { if (now - lastFrameT < 48) return; } // ~20fps
      const _prevFrameT = lastFrameT;
      lastFrameT = now;

      /* ── adaptive quality (one-way ratchet) ─────────────────────────
         Weak GPUs (old phones, integrated laptops) can't hold this scene
         at the crisp settings. Watch real frame times while running at
         full rate; if >50% of a ~2s window misses ~38fps, step down:
           level 1 → DPR cap 1.5
           level 2 → DPR cap 1.25 + cheaper transmission buffer
         Strong devices never trigger it and keep max quality. */
      // Adaptive relief valve — NEVER touches resolution (a visible drop in
      // sharpness reads as "the site degraded"). If a device sustains
      // <30fps it only shrinks the transmission (refraction) buffer, which
      // shows up as marginally softer blur BEHIND the glass letters — the
      // one place the eye can't tell. Warmup-gated so load frames never
      // count.
      if (renderMode === 'resume' && now > 10000) {
        const _fdt = now - _prevFrameT;
        if (_fdt > 0 && _fdt < 250) {           // ignore tab-switch gaps
          aqFrames++;
          if (_fdt > 34) aqSlow++;              // < ~30fps
          if (aqFrames >= 180) {                // judge every ~3s
            if (aqSlow / aqFrames > 0.65 && aqLevel < 2) {
              aqLevel++;
              // gentle steps only — the letters live in this buffer. Floors
              // keep effective res (×DPR) ≥ ~1.7 (mild softening, never
              // pixelation).
              renderer.transmissionResolutionScale = TOUCH_DEVICE
                ? (aqLevel === 1 ? 0.6 : 0.55)
                : (aqLevel === 1 ? 0.85 : 0.75);
              log('adaptive: transmission buffer → ' + renderer.transmissionResolutionScale);
            }
            aqFrames = 0; aqSlow = 0;
          }
        }
      } else { aqFrames = 0; aqSlow = 0; }
      const t = clock.getElapsedTime();
      // mixer delta — independent of window.__lastT (which the lightning
      // block also uses). clamped so a tab-resume / throttle gap doesn't
      // fast-forward the baked clip by seconds.
      const mixDt = Math.min(0.05, t - (window.__mixerLastT ?? t));
      window.__mixerLastT = t;

      // sample audio amplitude once per frame, share across reactives
      const amp = window.__audio ? window.__audio.getAmp() : 0;

      const isGreninja = (currentPokemon === 'greninja');

      // nebula noise time + pulse uniform (cosmic = rayquaza). The cloud
      // band fades out for greninja so nothing leaks if the nebula is
      // ever momentarily visible mid-switch.
      if (window.__nebulaMat) {
        window.__nebulaMat.uniforms.uTime.value  = t;
        window.__nebulaMat.uniforms.uPulse.value = amp;
        const cloudTarget = isGreninja ? 0 : 1;
        const u = window.__nebulaMat.uniforms.uCloud;
        u.value += (cloudTarget - u.value) * 0.1;
      }

      // ── greninja world per-frame (only while active) ──────────────
      // lerp the scene lighting toward the active look every frame
      updateLighting();
      // wet-glass ramp on the pk text: up for greninja, down for rayquaza
      pkWet.uTime.value = t;
      // music-reactive blue glow on the glass (smoothed); harmless for
      // rayquaza since the glow multiplies by uWet which is 0 there.
      pkWet.uPulse.value += (amp - pkWet.uPulse.value) * 0.35;
      {
        const wetTarget = isGreninja ? 1 : 0;
        const dtWet = Math.min(0.05, t - (window.__wetLastT ?? t));
        window.__wetLastT = t;
        const w = pkWet.uWet;
        w.value += Math.sign(wetTarget - w.value) * Math.min(Math.abs(wetTarget - w.value), WET_RAMP * dtWet);
      }
      if (isGreninja) {
        // advance the underwater dome (caustics scroll + god-ray drift) and
        // feed the music amplitude so the scene PULSES with the beat
        if (greninjaSkyMat) {
          greninjaSkyMat.uniforms.uTime.value = t;
          // smooth the reactive pulse a touch so it swells rather than flickers
          const pu = greninjaSkyMat.uniforms.uPulse;
          pu.value += (amp - pu.value) * 0.35;
        }
        // marine snow: drift + twinkle
        if (snowMesh && snowMesh.visible) {
          updateSnow(t);
          snowMesh.material.uniforms.uTime.value = t;
        }
        // cyan aura: strong fresnel rim with a subtle breathing pulse,
        // reacts a touch to audio. Tweak the 1.1 base for more/less glow.
        greninjaRim.intensity.value = 1.1 + Math.sin(t * 1.6) * 0.3 + amp * 0.5;
      } else {
        greninjaRim.intensity.value = 0;
      }

      window.__lastT = t;

      // GYARADOS — a RIGGED sea-serpent whose ACTUAL BODY BONES conform to and
      // TRAVEL a figure-8 (lemniscate) path: the head leads into each curve,
      // the spine follows the arc, the tail trails through the same track, like
      // a snake following its own path. We arc-length-sample the curve, place a
      // moving "head arc-distance" (sHead) that advances slowly, and for each
      // body bone sample the curve at sHead − cumArc[i]. Each bone's restForward
      // axis is re-aimed (in parent space) at the next-toward-tail sample so the
      // chain lays along the curve. A small anguilliform wave + banking + fin
      // follow-through ride on top for life. Group is moved so the junction bone
      // tracks the curve (group rotation fixed so the 8 faces the camera).
      if (currentPokemon === 'greninja' && greninjaModel) {
        const ud    = greninjaModel.userData;
        const body  = ud.gyaBody;
        const curve = ud.gyaCurve;
        if (body && body.length && curve) {
          // real, framerate-independent dt (clamped against tab/throttle gaps)
          const dt = (_gLastT == null) ? 0.016 : Math.min(0.05, t - _gLastT);
          _gLastT = t;
          // frozen clock for PAUSE: when paused, all gyarados motion (travel,
          // undulation, bob) uses the time captured at the moment pause turned
          // on, so the body holds completely still while head sliders still
          // update live. (orientation passes below still run.)
          if (HEAD_TUNE.pause) { if (_gPausedT === 0) _gPausedT = t; }
          else { _gPausedT = 0; }
          const gt = HEAD_TUNE.pause ? _gPausedT : t;

          const L        = ud.gyaCurveLen;
          const bodyArc  = ud.gyaBodyArc;
          const react    = 1 + amp * 0.30;
          // Full figure-8 loop every ~8s (a touch faster on the beat).
          // Speed in arc-units/sec = (L / PERIOD) * speedMul.
          const PERIOD   = 8.0 / (1 + amp * 0.20);

          // ── curvature-eased travel ──────────────────────────────────────
          // The Gerono lemniscate has very non-uniform curvature: tight at the
          // lobe tips (radius ~4), zero at the crossover.  Constant-arc-speed
          // makes the serpent whip through turns and coast robotically through
          // the middle — the opposite of how a real swimmer moves.
          // We probe the path's bend angle over ±1.5 world-units and compute
          // a multiplier: slow in turns (bend large), fast in straights (bend≈0).
          // The centering term (+0.5) keeps the average near 1 so loop period
          // stays ~8s — it's a shape change, not a net speed change.
          const EASE     = 0.42;           // easing strength (0=off, 1=heavy)
          const BEND_REF = 0.45;           // radians at lobe tip (calibration)
          const CURV_DU  = 1.5 / L;        // ±1.5 world-units expressed as arc-fraction
          const fHead    = ((_gSHead % L) + L) % L / L;
          // wrap (not clamp) so the probe spans the seam correctly on a closed curve
          curve.getTangentAt(((fHead - CURV_DU) % 1 + 1) % 1, _gTanA);
          curve.getTangentAt((fHead + CURV_DU) % 1,            _gTanB);
          const bend     = Math.acos(Math.max(-1, Math.min(1, _gTanA.dot(_gTanB))));
          const speedRaw = Math.max(0.75, Math.min(1.25, 1 + EASE * (0.5 - bend / BEND_REF)));
          // smooth speedMul over ~10 frames so curvature changes can't cause instant speed jumps
          _gSpeedMulS += (speedRaw - _gSpeedMulS) * (1 - Math.exp(-10 * dt));
          const speedMul = _gSpeedMulS;

          // pause: freeze figure-8 travel while orientation passes keep running,
          // so head sliders update live on the frozen pose.
          if (!HEAD_TUNE.pause) _gSHead += (L / PERIOD) * speedMul * dt;
          if (_gSHead > 1e7) _gSHead -= 1e7;        // guard against unbounded growth

          // ── small anguilliform undulation layered on the path ──
          // a travelling lateral wave, amplitude growing head→tail (envelope),
          // perturbs the arc-sample offset sideways so it SWIMS, not snaps.
          const UND_FREQ = 0.35 * Math.PI * 2;      // slower undulation = more fluid
          const UND_WAVES = 1.5;                    // fewer waves = smoother body
          const UND_AMP  = 0.24 * react;            // reduced lateral push for less shake
          // organic "breathing": two slow, incommensurate LFOs drift the swim
          // amplitude so the gait never repeats perfectly — reads as alive, not
          // looped. Range ≈ ±22%.
          const UND_BREATH = 1 + 0.15 * Math.sin(gt * 0.31) + 0.07 * Math.sin(gt * 0.73);

          // helper: arc-distance → world point on the curve (arc-length LUT via
          // getPointAt). Writes into the given target vector.
          const sampleAt = (s, out) => {
            let frac = (s % L) / L;
            if (frac < 0) frac += 1;
            curve.getPointAt(frac, out);
            return out;
          };

          // ── TRAILING-HISTORY ("snake") drive ─────────────────────────
          // The HEAD is the single driver: it rides the figure-8 (sampled at
          // _gSHead). We record its WORLD position + cumulative travelled arc
          // into a ring buffer each frame, then place every body bone at the
          // trail point exactly its own rest-arc-distance BEHIND the head.
          // Because the offsets are the bones' REAL arc lengths, consecutive
          // bones stay one bone-length apart → the body follows the head's own
          // path around the 8 and CANNOT bunch up or separate.
          greninjaModel.rotation.set(0, 0, 0);
          const center = modelCenter;                // path center = pk logo
          const bobY = Math.sin(gt * 0.5) * 0.6 * react;

          // current HEAD world target = figure-8 sample at _gSHead, centred on
          // the logo (+ buoyancy bob). advance the travelled-arc by the world
          // distance the head actually moved this frame.
          sampleAt(_gSHead, _gT0);
          const headWX = center.x + _gT0.x;
          const headWY = center.y + _gT0.y + bobY;
          const headWZ = center.z + _gT0.z;
          if (_gHistHead < 0) {
            // FIRST FRAME PRE-SEED: fill the buffer as if the head had ALREADY
            // been swimming the figure-8 for at least a full body length. We
            // lay a dense trail BACKWARD along the curve (decreasing _gSHead)
            // covering bodyArc + margin, so trailAt(d) for d∈[0,bodyArc]
            // returns spread-out points on the very first frame → the body is
            // already strung along the 8 (no bunch-at-a-point then spread).
            const seedSpan = bodyArc * 1.25 + 2.0;   // arc covered behind head
            const SEED_N   = Math.min(_GHIST_N, 600); // dense → smooth interp
            // newest (head) sample sits at the highest travelled-arc; we want
            // trailAt(0) === head, so head travelled-arc = seedSpan.
            _gHeadTravel = seedSpan;
            // fill indices 0..SEED_N-1 oldest→newest so _gHistArc increases
            // monotonically with index; head ends up at index SEED_N-1.
            for (let h = 0; h < SEED_N; h++) {
              // behind-distance for this sample: oldest (h=0) is seedSpan back,
              // newest (h=SEED_N-1) is 0 back (the head itself).
              const behind = seedSpan * (1 - h / (SEED_N - 1));
              sampleAt(_gSHead - behind, _gT0);      // curve point `behind` arc back
              _gHistPos[h*3]   = center.x + _gT0.x;
              _gHistPos[h*3+1] = center.y + _gT0.y + bobY;
              _gHistPos[h*3+2] = center.z + _gT0.z;
              _gHistArc[h]     = _gHeadTravel - behind;  // = seedSpan - behind
            }
            _gHistHead  = SEED_N - 1;
            _gHistCount = SEED_N;
            // snap bones straight to their settled pose for the first few
            // frames so the body doesn't visibly ease in from rest (~1s).
            _gWarmFrames = 8;
          } else {
            const px = _gHistPos[_gHistHead*3], py = _gHistPos[_gHistHead*3+1], pz = _gHistPos[_gHistHead*3+2];
            const step = Math.hypot(headWX-px, headWY-py, headWZ-pz);
            _gHeadTravel += step;
            _gHistHead = (_gHistHead + 1) % _GHIST_N;
            _gHistPos[_gHistHead*3] = headWX; _gHistPos[_gHistHead*3+1] = headWY; _gHistPos[_gHistHead*3+2] = headWZ;
            _gHistArc[_gHistHead] = _gHeadTravel;
            if (_gHistCount < _GHIST_N) _gHistCount++;
          }

          // trailAt(d, out): world point that is travelled-arc-distance `d`
          // BEHIND the head (d≥0), interpolated along the recorded trail.
          // Walks back from the newest sample until the bracketing pair is
          // found, then lerps by arc. Clamps to the oldest sample.
          const trailAt = (d, out) => {
            const targetArc = _gHeadTravel - d;
            let idx = _gHistHead;
            for (let k = 1; k < _gHistCount; k++) {
              const prev = (_gHistHead - k + _GHIST_N) % _GHIST_N;
              if (_gHistArc[prev] <= targetArc) {
                // bracket [prev, idx]; lerp by arc
                const a0 = _gHistArc[prev], a1 = _gHistArc[idx];
                const f = (a1 > a0) ? (targetArc - a0) / (a1 - a0) : 0;
                out.set(
                  _gHistPos[prev*3]   + (_gHistPos[idx*3]   - _gHistPos[prev*3])   * f,
                  _gHistPos[prev*3+1] + (_gHistPos[idx*3+1] - _gHistPos[prev*3+1]) * f,
                  _gHistPos[prev*3+2] + (_gHistPos[idx*3+2] - _gHistPos[prev*3+2]) * f
                );
                return out;
              }
              idx = prev;
            }
            // ran past the oldest sample → clamp to it
            out.set(_gHistPos[idx*3], _gHistPos[idx*3+1], _gHistPos[idx*3+2]);
            return out;
          };

          // 1) MOVE the group so the JUNCTION bone lands on its trail point
          //    (junctionArc behind the head). group rotation fixed (identity)
          //    so the 8 plane faces camera.
          const junctionArc = ud.gyaJunctionArc;
          trailAt(junctionArc, _gSamp);
          greninjaModel.position.set(_gSamp.x, _gSamp.y, _gSamp.z);
          greninjaModel.updateMatrixWorld(true);
          const junction = ud.gyaJunction;
          if (junction) {
            _gJW.setFromMatrixPosition(junction.matrixWorld);
            // delta = where we WANT the junction − where it actually is
            greninjaModel.position.x += _gSamp.x - _gJW.x;
            greninjaModel.position.y += _gSamp.y - _gJW.y;
            greninjaModel.position.z += _gSamp.z - _gJW.z;
            greninjaModel.updateMatrixWorld(true);
          }

          // 2) ORIENT — TWO PASSES.
          //   Pass A walks the body HEAD→TAIL and builds, per bone, a target
          //   WORLD quaternion using a ROTATION-MINIMIZING FRAME (parallel
          //   transport): forward = trail tangent, and an "up" carried smoothly
          //   from the head so it never flips at the lobe tops or the crossover
          //   (a fixed world-up basis degenerates there → the classic head-flip
          //   + fold). Pass B applies those targets in hierarchy order (parent
          //   before child) so FK lays the chain out cleanly.
          const bodyArr = ud.gyaBody;
          const NB = bodyArr.length;

          // Pass A: compute target world quaternion per bone.
          // HEAD (i=0): no trail history exists ahead of the snout, so we aim
          // it using the figure-8 curve tangent one bone-length AHEAD of the
          // current tip. This correctly orients the head in the travel direction.
          // All other bones use the trail as before.
          for (let i = 0; i < NB; i++) {
            const b = bodyArr[i];
            if (i === 0) {
              // head: forward = where the serpent is going next on the curve
              const lookAhead = (bodyArr[1] ? bodyArr[1].userData.gyaCumArc : 0.5) * 3.5;
              sampleAt(_gSHead + lookAhead, _gT0);
              _gHP0.set(headWX, headWY, headWZ);
              _gHP1.set(center.x + _gT0.x, center.y + _gT0.y + bobY, center.z + _gT0.z);
            } else {
              const child = b.userData.gyaBodyChild;
              let childArc;
              if (child && typeof child.userData.gyaCumArc === 'number') {
                childArc = child.userData.gyaCumArc;
              } else if (i + 1 < NB && typeof bodyArr[i+1].userData.gyaCumArc === 'number') {
                childArc = bodyArr[i+1].userData.gyaCumArc;   // next body bone
              } else {
                childArc = ud.gyaTailEndArc;                  // genuine tail leaf
              }
              trailAt(b.userData.gyaCumArc, _gHP0);
              trailAt(childArc,             _gHP1);
            }
            _gT0.copy(_gHP0);
            _gT1.copy(_gHP1);

            // anguilliform wave (grows head→tail) perturbs the child sample so
            // the body swims rather than rigidly snapping to the trail.
            const u   = Math.min(1, b.userData.gyaCumArc / bodyArc);
            // small non-zero base (0.12) so the FRONT of the body sways subtly
            // too — the whole serpent flows instead of the tail doing all the
            // work — then grows smoothly into the tail whip.
            const env = 0.12 + u * (1.15 + u);
            const ph  = UND_FREQ * gt - UND_WAVES * Math.PI * 2 * u;
            const amp = UND_AMP * UND_BREATH * env;
            _gT1.z += Math.sin(ph) * amp;
            _gT1.y += Math.cos(ph) * amp * 0.5;   // richer vertical → 3D, not a flat wag

            // tangent toward the body-child sample
            _gDir.copy(_gT1).sub(_gT0);
            if (_gDir.lengthSq() < 1e-9) { b.userData.gyaWQ.copy(b.userData.gyaRestWorldQ); continue; }
            _gDir.normalize();

            // ── rotation-minimizing up ──
            if (i === 0) {
              // head bone seeds the up frame (temporal continuity from last frame)
              _gUp.copy(_gHeadUp.lengthSq() > 1e-6 ? _gHeadUp : _gWorldUp);
            }
            // parallel transport: remove tangent component, renormalize. If it
            // collapses (up ∥ tangent at a pole), fall back to world +Y / +X.
            _gUp.addScaledVector(_gDir, -_gUp.dot(_gDir));
            if (_gUp.lengthSq() < 1e-4) {
              _gUp.copy(_gWorldUp).addScaledVector(_gDir, -_gWorldUp.dot(_gDir));
              if (_gUp.lengthSq() < 1e-4) _gUp.set(1, 0, 0).addScaledVector(_gDir, -_gDir.x);
            }
            _gUp.normalize();

            // ── banking: blend up toward centripetal so the body rolls into
            //    curves like a train on a banked track, not a flat-falling loop.
            {
              const backArc = b.userData.gyaCumArc + 2.0;
              trailAt(backArc, _gBwdTan);
              // backward tangent = normalize(current_pos - back_pos)
              _gCentDir.subVectors(_gHP0, _gBwdTan).normalize();
              // centripetal ≈ fwd_tangent − bwd_tangent (points inside the curve)
              _gBwdTan.subVectors(_gDir, _gCentDir);
              const cLen = _gBwdTan.length();
              if (cLen > 0.02) {
                _gBwdTan.divideScalar(cLen);
                _gUp.addScaledVector(_gBwdTan, 0.22);
                _gUp.addScaledVector(_gDir, -_gUp.dot(_gDir));
                _gUp.normalize();
              }
            }

            if (i === 0) _gHeadUp.copy(_gUp);        // store for next frame (temporal seed)

            // build the target WORLD quaternion from (forward, up):
            //  1) aim restForward→tangent (minimal),
            //  2) roll about the tangent so the bone's dorsal (rest up) lands on
            //     the transported up — keeps blue-back up, no belly-up flip.
            _gDelta.setFromUnitVectors(b.userData.gyaRestFwdWorld, _gDir);
            _gTgtW.copy(_gDelta).multiply(b.userData.gyaRestWorldQ);
            // current dorsal-world after the aim:
            _gCurUp.copy(b.userData.gyaRestUpWorld).applyQuaternion(_gDelta);
            // project both onto the plane ⟂ tangent, then roll one onto the other
            _gCurUp.addScaledVector(_gDir, -_gCurUp.dot(_gDir));
            _gWantUp.copy(_gUp).addScaledVector(_gDir, -_gUp.dot(_gDir));
            if (_gCurUp.lengthSq() > 1e-6 && _gWantUp.lengthSq() > 1e-6) {
              _gCurUp.normalize(); _gWantUp.normalize();
              _gRoll.setFromUnitVectors(_gCurUp, _gWantUp);
              _gTgtW.premultiply(_gRoll);
            }
            b.userData.gyaWQ.copy(_gTgtW);
          }

          // ── NECK softening (optional, gentle) ───────────────────────────
          // Blends neck slightly toward spine so the front reads as one piece.
          if (NB >= 2 && HEAD_TUNE.neckGlue > 0) {
            bodyArr[0].userData.gyaWQ.slerp(bodyArr[1].userData.gyaWQ, HEAD_TUNE.neckGlue * 0.5);
          }

          // Pass B — apply, parents before children. Framerate-independent
          // exponential damping (1 - e^(-k·dt)) replaces the old fixed-factor
          // slerps + rate-limiter (those were framerate-dependent and stacked).
          // The HEAD is handled specially: it is set to the neck's CURRENT world
          // orientation × the fixed rest offset (captured at load), so it is
          // rigidly the neck's front tip — the single change that removes the
          // jitter/snap/roll-flip by construction.
          const proc = ud.gyaProc;
          const warming = _gWarmFrames > 0;
          // double-cover guard helper (nearer hemisphere before slerp)
          const _qguard = (cur, tgt) => { if (cur.dot(tgt) < 0) tgt.set(-tgt.x,-tgt.y,-tgt.z,-tgt.w); };
          for (let i = 0; i < proc.length; i++) {
            const b = proc[i];
            if (!b) continue;

            if (!b.userData.gyaWQ) continue;
            b.parent.getWorldQuaternion(_gPQ);
            _gPQi.copy(_gPQ).invert();
            _gTgt.copy(_gPQi).multiply(b.userData.gyaWQ);
            _qguard(b.quaternion, _gTgt);
            // damping rate (1/s). LOWER = smoother / more jitter-rejecting.
            // The NECK is the head's parent, so any neck jitter shows up in the
            // head → damp the neck EXTRA smooth (low k) to kill head jitter at
            // the source. Body stays responsive.
            const k = warming ? 1000 : (b.userData.gyaIsHead ? 10 * HEAD_TUNE.headGlue : (b.userData.gyaIsNeck ? 2.5 : 4.5));
            const a = warming ? 1 : (1 - Math.exp(-k * dt));
            b.quaternion.slerp(_gTgt, a);
            b.updateWorldMatrix(false, false);       // refresh for the child
          }
          if (_gWarmFrames > 0) _gWarmFrames--;
        }
      }

      if (currentPokemon === 'rayquaza' && model) {
        // handle a forwarded click: raycast against the model; on a hit,
        // toggle FLIGHT MODE — Rayquaza launches into a path-following flight
        // circuit around the letters (see the trail rig below).
        if (window.__heroClick) {
          const c = window.__heroClick; window.__heroClick = null;
          raycaster.setFromCamera({ x: c.x, y: c.y }, camera);
          const hits = raycaster.intersectObject(model, true);
          if (hits.length && t - _rqLastToggle > 0.5) {
            _rqLastToggle = t;
            rqLooping = !rqLooping;
            if (rqLooping) { rqLoopStart = t; }
            else           { rqLoopStop  = t; }
          }
        }

        // ── flight blend + head-travel advance (needed by idle scaling,
        //    arm flap, and the trail rig below) ──────────────────────────
        const rqDt = (_rqPrevT == null) ? 0.016 : Math.min(0.05, t - _rqPrevT);
        _rqPrevT = t;
        const BLEND_IN  = 1.5;   // seconds to reach full flight
        const BLEND_OUT = 1.2;   // seconds to return to idle
        const _rqBlendin  = rqLooping  ? Math.min(1, (t - rqLoopStart) / BLEND_IN)  : 0;
        const _rqBlendout = !rqLooping ? Math.max(0, 1 - (t - rqLoopStop) / BLEND_OUT) : 0;
        const _rqRaw   = Math.max(_rqBlendin, _rqBlendout);
        // quintic ease (Perlin) — smoother S-curve than smoothstep
        const rqBlend  = _rqRaw * _rqRaw * _rqRaw * (_rqRaw * (_rqRaw * 6 - 15) + 10);
        const _rqf     = model.userData.rqf;
        // head advances at rqBlend×speed: takeoff accelerates from 0, landing decelerates to 0
        if (_rqf && rqBlend > 0.001) {
          const RQ_PERIOD = 9.0;
          _rqHeadS += (_rqf.curveLen / RQ_PERIOD) * rqDt * rqBlend;
          if (_rqHeadS > 1e7) _rqHeadS -= 1e7;
        }
        /* full-body traveling wave + layered motion. wave travels
           head→tail (-k*i), amplitude grows toward the tip. Two
           harmonics overlaid for organic feel. Lateral (Y) is the main
           snake motion; vertical (X) adds 3D life; whole-body drift
           gives it scale. */
        const N = bodyChain.length;
        const omega    = 1.7;
        const k        = 0.62;
        // amplitude breathes between ~30% and 100% so undulation has dynamics
        const breathe  = 0.65 + Math.sin(t * 0.31) * 0.35;
        // bigger floor at the head end so head/neck don't read stiff
        // next to the punchy tail
        const yBase    = 0.10;
        const yTip     = 0.42;
        const xBase    = 0.05;
        const xTip     = 0.18;

        /* ── CRY SPASM intensity (0..1) ───────────────────────────────
           Drives the whole-body convulsion that overrides the calm idle
           undulation during the screech. Must match the cry timing used
           by the BALLISTIC SCREECH block below (CRY_DUR / since). Shaped
           so it builds at the scream onset, rides the real audio loudness
           through the sustain, then eases cleanly to 0 over the recovery
           tail — no pop at start or end. */
        const SPASM_CRY_DUR = 1.55;            // == CRY_DUR below
        const sinceSpasm    = t - cryT;
        const cryActive     = (sinceSpasm >= 0 && sinceSpasm < SPASM_CRY_DUR);
        const cryEnv        = cryActive ? ampAt(sinceSpasm * 1000) : 0;  // 0..1 real loudness
        let spasm = 0;
        if (cryActive) {
          const fc = sinceSpasm / SPASM_CRY_DUR;
          // ramp in over the first ~0.15s (snap), full body through sustain,
          // fade out across the recovery tail (last ~15%)
          const rampIn  = easeOutCubic(clamp01(sinceSpasm / 0.15));
          const fadeOut = 1 - easeInOutCubic(clamp01((fc - 0.85) / (1 - 0.85)));
          // ride the audio envelope through the hold so it warbles with the
          // sound, but keep a strong floor so it never goes limp mid-roar
          spasm = rampIn * fadeOut * (0.55 + 0.45 * cryEnv);
        }
        spasm = clamp01(spasm);
        // idle undulation gives way to the convulsion (don't fully kill it)
        const idleScale = 1 - 0.6 * spasm;

        // idle body wave (the flight trail rig below blends OVER this pose
        // by slerping toward world-space path targets — so at rqBlend=0 this
        // idle pose is what shows, at rqBlend=1 the flight rig fully drives).
        for (let i = 0; i < N; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          const u   = i / Math.max(1, N - 1);
          const amp = (yBase + (yTip - yBase) * u) * breathe;
          const axp = (xBase + (xTip - xBase) * u) * breathe;
          // primary travelling wave + second harmonic at half speed for chaos
          const wave =
            Math.sin(omega * t - k * i)               * 0.85 +
            Math.sin(omega * 0.45 * t - k * 0.55 * i + 1.2) * 0.35 +
            Math.sin(omega * 1.9 * t - k * 1.3 * i + 0.7)   * 0.12;  // small fast ripple
          b.rotation.y = b.userData.rest.y + wave * amp * idleScale;
          b.rotation.x = b.userData.rest.x + Math.sin(omega * t - k * i + Math.PI/2) * axp * 0.7 * idleScale;
          b.rotation.z = b.userData.rest.z + Math.sin(omega * 0.6 * t - k * 0.7 * i) * amp * 0.35 * idleScale;

          /* ── AGONY WRITHE — violent, chaotic convulsion over the whole
             chain while screaming. High-freq shudder (vs the calm idle
             omega≈1.7) built from 3 incommensurate frequencies + per-bone
             phase offsets so it reads irregular/spasming, not a clean wave.
             Grows toward the tail (uu) so the tail thrashes hardest, head
             least (head/neck also driven by the cry block, so keep their
             share modest). A DC curl ramps the tail under so the body looks
             clenched/withering with the shudder riding on top. */
          if (spasm > 0.0001) {
            // emphasise the tail: near-0 at head, →1 at tip, slightly eased
            const uu  = u * u * (0.25 + 0.75 * u);   // head≈0, tail≈1, biased to tip
            const ph  = i * 1.7;                     // fixed per-bone phase (pseudo-random-ish)
            const amt = spasm * cryEnv;              // peak only on loud moments
            // lateral thrash (biggest) — three detuned shudders
            const thrashY =
              Math.sin(13.0 * t + i * 1.7)            * 0.55 +
              Math.sin( 9.3 * t - i * 2.3 + 0.6)      * 0.30 +
              Math.sin(21.0 * t + i * 0.9)            * 0.15;
            // vertical buckling
            const thrashX =
              Math.sin(11.0 * t - i * 1.3 + 2.1)      * 0.6 +
              Math.sin(16.5 * t + i * 2.0)            * 0.4;
            // roll / twist
            const thrashZ =
              Math.sin( 8.7 * t + i * 1.1 + 1.4)      * 0.6 +
              Math.sin(19.0 * t - i * 0.7)            * 0.4;
            // DC curl: tail clenches under as the spasm ramps in
            const curl = spasm * uu * 0.45;          // body bows/withers at peak
            b.rotation.y += thrashY * 0.50 * uu * amt;
            b.rotation.x += thrashX * 0.25 * uu * amt - curl;
            b.rotation.z += thrashZ * 0.30 * uu * amt + Math.sin(ph) * curl * 0.4;
          }
        }

        // independent head + neck animation — surveys side to side and
        // tilts, applied across the first three bones with falloff so
        // the head leads, neck2 follows, neck1 trails. fixes the
        // stiff-neck look against the wagging tail.
        // suppressed during flight so dYaw (path direction) dominates
        const _surveyAmp = 1 - rqBlend * 0.75;
        for (let i = 0; i < 3; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          const falloff = i === 0 ? 1.0 : (i === 1 ? 0.7 : 0.45);
          b.rotation.y += (Math.sin(t * 0.42 + i * 0.4) * 0.20 +
                           Math.sin(t * 0.18 + 1.1 + i * 0.3) * 0.10) * falloff * _surveyAmp;
          b.rotation.x +=  Math.sin(t * 0.31 + 1 + i * 0.25) * 0.09 * falloff * _surveyAmp;
          b.rotation.z +=  Math.sin(t * 0.24 + 0.5 + i * 0.2) * 0.06 * falloff * _surveyAmp;
        }

        // independent SPINE sway — tightened. Only the two true spine
        // bones (Spine2, Spine1) get a small extra lateral motion so
        // the core has presence without fighting the body wave already
        // running through. No X-tilt (was reading as uncertain), small
        // Z roll only.
        for (let i = 3; i <= 4 && i < bodyChain.length; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          b.rotation.y += Math.sin(t * 0.28 + i * 0.5)       * 0.05;
          b.rotation.z += Math.sin(t * 0.22 + 0.7 + i * 0.4) * 0.04;
        }

        // jaw — idle breathing + occasional snap. The screech overrides
        // this in the dedicated cry block at the end of the frame.
        if (jaw) {
          const breath = Math.sin(t * 1.1) * 0.06 + 0.06;
          const snap   = Math.max(0, Math.sin(t * 0.55 - 1)) ** 10 * 0.30;
          jaw.rotation.x = jaw.userData.rest.x + breath + snap;
        }

        // arms — wing-like sway; amplitude grows in flight but frequency stays
        // constant so the phase never jumps during blend-in/out transitions.
        const armSway = Math.sin(t * 1.05) * (0.16 + rqBlend * 0.34);
        const armYaw  = Math.sin(t * 0.7)  * 0.10 - rqBlend * 0.22;
        arms.L.forEach((b, i) => {
          b.rotation.z = b.userData.rest.z + armSway * (1 + i*0.3);
          b.rotation.y = b.userData.rest.y + armYaw  * (1 + i*0.2);
        });
        arms.R.forEach((b, i) => {
          b.rotation.z = b.userData.rest.z - armSway * (1 + i*0.3);
          b.rotation.y = b.userData.rest.y - armYaw  * (1 + i*0.2);
        });

        // whole-body motion ────────────────────────────────────────────
        const MODEL_X_OFFSET = -1;
        const idlePX = MODEL_X_OFFSET + Math.sin(t * 0.21 + 0.5) * 0.55;
        const idlePY =                  Math.sin(t * 0.32)        * 0.45;
        const idlePZ =                  Math.sin(t * 0.18 + 1.2)  * 0.45;
        const idleRX = Math.sin(t * 0.20 + 0.6) * 0.05;
        const idleRY = Math.sin(t * 0.17) * 0.07;
        const idleRZ = Math.sin(t * 0.24) * 0.10;

        const rqf = model.userData.rqf;
        if (rqf && rqBlend > 0.001) {
          // ══ FLIGHT TRAIL RIG — the whole body conforms to + travels the 3D
          //    flight curve. Head leads, spine follows the arc, tail trails the
          //    same track. Blended OVER the idle pose set above by rqBlend. ══
          const curve = rqf.curve, L = rqf.curveLen, bodyArc = rqf.bodyArc;
          // arc-distance → world point on the flight curve (centred on the text)
          const sampleAt = (s, out) => {
            let frac = (s % L) / L; if (frac < 0) frac += 1;
            curve.getPointAt(frac, out);
            out.x += modelCenter.x; out.y += modelCenter.y; out.z += modelCenter.z;
            return out;
          };

          // 1) ANCHOR: place the model so the Waist junction lands on its curve
          //    sample (junctionArc behind the head). model.rotation → 0 at full
          //    flight so the bones' WORLD quaternions render true. Both position
          //    and rotation lerp from the idle float by rqBlend (smooth takeoff).
