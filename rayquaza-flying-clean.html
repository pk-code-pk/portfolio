                                       // (in-plane at z≈0 it vanishes into haze).
    const GRENINJA_CLIP        = null; // gyarados is a static rigid mesh — no baked clips

    // dispose helper — frees geometries + materials (+ their textures) for
    // a subtree so repeated switching doesn't leak GPU memory.
    function disposeObject(root) {
      root.traverse(o => {
        if (o.isMesh || o.isSkinnedMesh) {
          o.geometry?.dispose?.();
          const mats = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
          mats.forEach(m => {
            for (const key in m) {
              const val = m[key];
              if (val && val.isTexture) val.dispose();
            }
            m.dispose?.();
          });
        }
      });
    }

    new GLTFLoader().load('rayquaza/rayquaza.glb',
      (gltf) => {
        model = gltf.scene;

        // do NOT transform the wrapper group — SkinnedMesh wraps its skin
        // matrices around the parent's transform at load time, and we end
        // up with vertices rendering at unknown world positions while
        // model.position reports a different (cosmetic) value. Both
        // build agents hit this. Instead: add as-is, then compute the
        // SkinnedMesh's actual rendered bounding box from its geometry
        // and bone matrices, and aim the camera at that center.
        scene.add(model);
        model.updateMatrixWorld(true);

        // sample bone world positions to discover where the model is
        // actually rendering
        const worldBox = new THREE.Box3();
        const tmp = new THREE.Vector3();
        model.traverse(o => {
          if (o.isBone) { o.getWorldPosition(tmp); worldBox.expandByPoint(tmp); }
        });
        modelCenter.copy(worldBox.getCenter(new THREE.Vector3()));
        const worldSize = worldBox.getSize(new THREE.Vector3()).length();
        log(`model · center (${modelCenter.x.toFixed(1)},${modelCenter.y.toFixed(1)},${modelCenter.z.toFixed(1)}) · size ${worldSize.toFixed(1)}`);

        // place the pk text at the model's actual world center
        if (pkText) pkText.position.copy(modelCenter);

        // restore the model's native metallic look. The synthetic env map
        // provides the highlights + rim so chrome reads chrome, not black.
        // Selective brightness boost on the model (small margin) WITHOUT
        // changing materials on the pk text (which keeps its own settings).
        model.traverse(o => {
          if (o.isMesh && o.material) {
            const mats = Array.isArray(o.material) ? o.material : [o.material];
            mats.forEach(m => {
              if ('envMapIntensity' in m) m.envMapIntensity = 2.0;   // ~25% lift
              if ('roughness' in m)       m.roughness = Math.max(m.roughness, 0.25);
              // tiny self-glow so the body never crushes to pure black
              // in shadowed orientations — keeps the green/red readable
              if (m.map && 'emissive' in m) {
                m.emissive = new THREE.Color(0x141a14);
                m.emissiveIntensity = 0.35;
              }
            });
          }
        });

        // build the full body chain head → spine → tail-tip so the wave
        // travels along the whole serpent, not just the tail. order matters:
        // a traveling sin(t - k*i) wave needs i increasing monotonically
        // from one end of the body to the other.
        const found = { head: null, neck: [], spine: [], tail: [], jaw: null };
        const arms_L = [], arms_R = [];
        model.traverse(o => {
          if (!o.isBone) return;
          const n = o.name;
          if (/^Head_/.test(n))        found.head = o;
          else if (/^Neck(\d+)_/.test(n))  found.neck.push(o);
          else if (/^Spine(\d+)_/.test(n)) found.spine.push(o);
          else if (/^Tail(\d+)_/.test(n) && !/_end_/.test(n)) found.tail.push(o);
          else if (/^Jaw_/.test(n) && !/_end_/.test(n)) found.jaw = o;
          else if (/^LArm_|^LForeArm_/.test(n)) arms_L.push(o);
          else if (/^RArm_|^RForeArm_/.test(n)) arms_R.push(o);
        });
        const byNum = (re) => (a, b) =>
          parseInt(a.name.match(re)[1], 10) - parseInt(b.name.match(re)[1], 10);
        found.neck.sort(byNum(/Neck(\d+)/));
        found.spine.sort(byNum(/Spine(\d+)/));
        found.tail.sort(byNum(/Tail(\d+)/));

        // chain index 0 = head end (small wave amplitude), increasing
        // toward tail tip (largest amplitude).
        bodyChain = [
          ...(found.head ? [found.head] : []),
          ...found.neck.slice().reverse(),     // Neck2 closer to head than Neck1
          ...found.spine.slice().reverse(),    // Spine2 closer to head than Spine1
          ...found.tail
        ];
        jaw    = found.jaw;
        arms.L = arms_L;
        arms.R = arms_R;

        // snapshot rest rotations so animations are additive offsets
        [...bodyChain, jaw, ...arms.L, ...arms.R].filter(Boolean).forEach(b => {
          b.userData.rest = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };
        });

        log(`loaded · chain ${bodyChain.length} (head→tail) · arms ${arms.L.length+arms.R.length} · jaw ${jaw?'y':'n'}`);

        // warm up: compile all materials + run one full composer pass so
        // every shader (incl. bloom's render-target programs) is linked
        // up front. Without this the FIRST visible frame stalls on
        // shader-link — the main cause of the resume hitch.
        try {
          renderer.compile(scene, camera);
          composer.render();
        } catch (e) {}
      },
      undefined,
      (err) => log('load error: ' + (err.message || err))
    );

    /* ── greninja: lazy load + mixer setup ─────────────────────────────
       Loaded on first switch. Auto-fit so it matches Rayquaza's footprint,
       recentred on `modelCenter`, and driven by an AnimationMixer playing
       its baked idle clip (advanced with delta time in tick()). */
    function loadGreninja() {
      return new Promise((resolve, reject) => {
        if (greninjaModel) { resolve(greninjaModel); return; }
        new GLTFLoader().load('pokemon/gyarados_rigged.glb',
          (gltf) => {
            const g = gltf.scene;

            // rigged gyarados GLB — pose: a dramatic HEAD-UP REARING serpent
            // at a 3/4 hero angle, coiling up through the "pk" letters (per
            // the user's reference). The model's long axis is local Z; we
            // rear it vertical (head up), then add a slight yaw + tilt so it
            // reads as a three-quarter view rising toward the viewer.
            //   • rotation.x = -PI/2  → stand the body vertical, HEAD UP
            //   • rotation.y          → yaw for the 3/4 turn
            //   • rotation.z          → ROLL about the body's long axis (local
            //     Z, applied first in XYZ Euler order) — +PI rolls the BLUE
            //     dorsal side + face to the camera (was showing cream belly),
            //     plus a small tilt off pure-vertical.
            // Captured as baseRotX/Y/Z so the idle group-sway adds onto it.
            g.rotation.set(3.141, 2.681, 3.141);   // user-chosen pose (locked in)

            // auto-fit: scale so the longest bbox dimension == target size.
            g.updateMatrixWorld(true);
            const box  = new THREE.Box3().setFromObject(g);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const s = GRENINJA_TARGET_SIZE / maxDim;
            g.scale.setScalar(s);
            // scale-per-target-size-unit, so the pose tuner's size slider can
            // map a desired world size → scalar without re-fitting the bbox.
            g.userData.unitScale  = s / GRENINJA_TARGET_SIZE;
            g.userData.tunerSize  = GRENINJA_TARGET_SIZE;

            // recompute box after scaling, then translate so its center
            // sits at the world origin used for framing, plus offsets.
            g.updateMatrixWorld(true);
            const box2    = new THREE.Box3().setFromObject(g);
            const center2 = box2.getCenter(new THREE.Vector3());
            // center the model on the same world point the camera frames
            // (Rayquaza's bone-derived center), not raw origin.
            g.position.sub(center2).add(modelCenter);
            g.userData.basePos = g.position.clone();   // baseline for idle drift

            // material tweak — same env lift treatment as Rayquaza so it
            // doesn't crush to black against the dark scene. The underwater
            // FogExp2 + cool low-key lighting otherwise swallow the creature
            // into the haze, so we also lift envMap + add a faint cyan
            // emissive floor so the serpent reads against the murk.
            g.traverse(o => {
              if (o.isMesh && o.material) {
                const mats = Array.isArray(o.material) ? o.material : [o.material];
                mats.forEach(m => {
                  // CRITICAL: exempt gyarados from the dense underwater
                  // FogExp2 — at the framed distance the fog was blending the
                  // whole creature into the water (it WAS on-screen & visible,
                  // just fully fogged out). Same trick used on the pk glass.
                  m.fog = false;
                  if ('envMapIntensity' in m) m.envMapIntensity = 2.4;
                  if ('emissive' in m && m.emissive) {
                    // gentle cool self-glow so the serpent lifts off the dark
                    // water without blowing out (fog no longer eats it).
                    m.emissive.setHex(0x2a4a55);
                    if ('emissiveIntensity' in m) m.emissiveIntensity = 0.6;
                  }
                  m.needsUpdate = true;
                });
              }
            });

            // REAL SKELETON — gyarados_rigged.glb has a 63-joint skeleton.
            // Build a head→tail ordered bone chain (the SAME technique
            // rayquaza uses) and drive it with a procedural travelling wave
            // in tick(). No baked clips → no AnimationMixer.
            //
            // Bone names are suffixed with an index (e.g. Tail1_04,
            // Spine1_018, Neck_025, Head_028); match by prefix-regex and
            // sort Spine/Tail by their numeric segment index. Chain order is
            // head→tail so wave amplitude can grow from ~0 at the head to
            // max at the tail tip (Tail9).
            const gFound = { head: null, neck: [], spine: [], tail: [] };
            g.traverse(o => {
              if (!o.isBone) return;
              const n = o.name;
              if (/^Head_/.test(n))            gFound.head = o;
              else if (/^Neck_/.test(n))       gFound.neck.push(o);
              else if (/^Spine(\d+)_/.test(n)) gFound.spine.push(o);
              else if (/^Tail(\d+)_/.test(n))  gFound.tail.push(o);
              // Fin / Whisker / Jaw bones ignored for the body wave
            });
            const gByNum = (re) => (a, b) =>
              parseInt(a.name.match(re)[1], 10) - parseInt(b.name.match(re)[1], 10);
            gFound.spine.sort(gByNum(/Spine(\d+)/));
            gFound.tail.sort(gByNum(/Tail(\d+)/));
            // head end (index 0, least movement) → tail tip (max movement):
            // Head, Neck, Spine1..Spine5, Tail1..Tail9
            const gyaChain = [
              ...(gFound.head ? [gFound.head] : []),
              ...gFound.neck,
              ...gFound.spine,
              ...gFound.tail
            ];
            // snapshot rest rotations so the wave is an additive offset
            gyaChain.forEach(b => {
              b.userData.rest = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };
            });
            g.userData.gyaChain = gyaChain;

            // no baked clips on this rig — drive bones procedurally.
            greninjaMixer = null;
            const clips = gltf.animations || [];
            log(`gyarados loaded · scale ${s.toFixed(3)} · bones ${gyaChain.length} (${gyaChain[0] && gyaChain[0].name} → ${gyaChain[gyaChain.length-1] && gyaChain[gyaChain.length-1].name}) · ${clips.length} clips`);

            // preserve the full rearing orientation so the idle group-sway
            // adds on top of it (not clobbers it).
            g.userData.baseRotX = g.rotation.x;
            g.userData.baseRotY = g.rotation.y;
            g.userData.baseRotZ = g.rotation.z;
            greninjaModel = g;
            resolve(g);
          },
          undefined,
          (err) => { greninjaLoading = false; reject(err); }
        );
      });
    }

    /* ── switch model ──────────────────────────────────────────────── */
    const pokeBtn  = document.getElementById('poke-toggle');
    const pokeName = document.getElementById('poke-name');

    async function switchPokemon() {
      if (switching) return;
      const next = currentPokemon === 'rayquaza' ? 'greninja' : 'rayquaza';
      switching = true;
      if (pokeBtn) pokeBtn.disabled = true;

      try {
        if (next === 'greninja') {
          if (pokeName) pokeName.textContent = greninjaModel ? 'gyarados' : 'loading…';
          await loadGreninja();
          if (model) scene.remove(model);            // pull rayquaza out
          // fold the framing offsets into basePos ONCE so basePos is the true
          // resting center (the pose tuner edits basePos directly; the tick
          // idle-sway adds onto it without re-applying the offsets). Guarded
          // so re-showing doesn't accumulate the offset each toggle.
          if (!greninjaModel.userData.baseFramed) {
            greninjaModel.userData.basePos.x += GRENINJA_X_OFFSET;
            greninjaModel.userData.basePos.y += GRENINJA_Y_OFFSET;
            greninjaModel.userData.basePos.z += GRENINJA_Z_OFFSET;
            greninjaModel.userData.baseFramed = true;
          }
          greninjaModel.position.copy(greninjaModel.userData.basePos);
          scene.add(greninjaModel);
          installGreninjaRim(greninjaModel);          // cyan fresnel aura
          currentPokemon = 'greninja';
          if (pokeName) pokeName.textContent = 'gyarados';
          // swap the WORLD: cosmic → underwater scene
          if (window.__nebulaMesh)  window.__nebulaMesh.visible  = false;
          if (window.__starfield)   window.__starfield.visible   = false;
          if (window.__greninjaSky) window.__greninjaSky.visible = true;
          if (snowMesh)             snowMesh.visible              = true;
          // FogExp2 = the water volume: distant geometry fades into the
          // blue-green haze (Beer–Lambert handled in the dome shader).
          scene.fog = new THREE.FogExp2(UW_FOG_COLOR, UW_FOG_DENSITY);
        } else {
          if (greninjaModel) scene.remove(greninjaModel);
          if (model) scene.add(model);
          currentPokemon = 'rayquaza';
          if (pokeName) pokeName.textContent = 'rayquaza';
          // restore the cosmic world
          if (window.__nebulaMesh)  window.__nebulaMesh.visible  = true;
          if (window.__starfield)   window.__starfield.visible   = true;
          if (window.__greninjaSky) window.__greninjaSky.visible = false;
          if (snowMesh)             snowMesh.visible              = false;
          scene.fog = null;
        }
      } catch (e) {
        log('greninja load failed: ' + (e.message || e));
        if (pokeName) pokeName.textContent = currentPokemon;
      } finally {
        switching = false;
        if (pokeBtn) pokeBtn.disabled = false;
      }
    }
    if (pokeBtn) pokeBtn.addEventListener('click', switchPokemon);

    /* ── resize ───────────────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);   // full-res
      rainPass.uniforms.iResolution.value.set(window.innerWidth, window.innerHeight);
    });

    /* ── animate ──────────────────────────────────────────────────── */
    const clock = new THREE.Clock();
    const tmpLookAt = new THREE.Vector3();

    // (#1) parent posts {__heroAction:'pause'|'throttle'|'resume'}:
    //   pause    → fully off-screen: stop rendering entirely.
    //   throttle → actively scrolling: keep animating but at a low fps so
    //              the main thread has room for smooth scroll (NO freeze).
    //   resume   → idle + visible: full framerate.
    // renderMode drives the tick's frame-gating below.
    let renderMode = 'resume';
    let lastFrameT = 0;
    window.addEventListener('message', (e) => {
      const action = e.data && e.data.__heroAction;
      if (action === 'pause' || action === 'throttle' || action === 'resume') {
        renderMode = action;
      } else if (action === 'switchPokemon') {
        // parent's switch button (the iframe's own toggle is hidden when
        // embedded) → flip rayquaza ↔ gyarados.
        try { switchPokemon(); } catch (err) {}
      }
    });

    function tick(now) {
      requestAnimationFrame(tick);
      now = now || 0;
      // frame-gating per mode. NOTE: 'pause' is a TRICKLE (~5fps), not a
      // hard stop — keeps the WebGL shaders warm and the compositor layer
      // promoted, so scrolling BACK to the hero resumes instantly instead
      // of hitching on shader-recompile + layer re-promotion.
      if (renderMode === 'pause')    { if (now - lastFrameT < 200) return; }  // ~5fps
      else if (renderMode === 'throttle') { if (now - lastFrameT < 48) return; } // ~20fps
      lastFrameT = now;
      const t = clock.getElapsedTime();
      // mixer delta — independent of window.__lastT (which the lightning
      // block also uses). clamped so a tab-resume / throttle gap doesn't
      // fast-forward the baked clip by seconds.
      const mixDt = Math.min(0.05, t - (window.__mixerLastT ?? t));
      window.__mixerLastT = t;

      // sample audio amplitude once per frame, share across reactives
      const amp = window.__audio ? window.__audio.getAmp() : 0;

      const isGreninja = (currentPokemon === 'greninja');

      // nebula noise time + pulse uniform (cosmic = rayquaza). The cloud
      // band fades out for greninja so nothing leaks if the nebula is
      // ever momentarily visible mid-switch.
      if (window.__nebulaMat) {
        window.__nebulaMat.uniforms.uTime.value  = t;
        window.__nebulaMat.uniforms.uPulse.value = amp;
        const cloudTarget = isGreninja ? 0 : 1;
        const u = window.__nebulaMat.uniforms.uCloud;
        u.value += (cloudTarget - u.value) * 0.1;
      }

      // ── greninja world per-frame (only while active) ──────────────
      // lerp the scene lighting toward the active look every frame
      updateLighting();
      // wet-glass ramp on the pk text: up for greninja, down for rayquaza
      pkWet.uTime.value = t;
      // music-reactive blue glow on the glass (smoothed); harmless for
      // rayquaza since the glow multiplies by uWet which is 0 there.
      pkWet.uPulse.value += (amp - pkWet.uPulse.value) * 0.35;
      {
        const wetTarget = isGreninja ? 1 : 0;
        const dtWet = Math.min(0.05, t - (window.__wetLastT ?? t));
        window.__wetLastT = t;
        const w = pkWet.uWet;
        w.value += Math.sign(wetTarget - w.value) * Math.min(Math.abs(wetTarget - w.value), WET_RAMP * dtWet);
      }
      // fullscreen rain-on-glass pass STAYS DISABLED — it smeared/blurred
      // the WHOLE view (text + model). Droplets now come ONLY from the
      // per-letter installWetGlass injection on the pk glass, so the rest
      // of the scene stays sharp.
      rainPass.uniforms.uWet.value  = pkWet.uWet.value;
      rainPass.uniforms.iTime.value = t;
      rainPass.enabled = false;
      if (isGreninja) {
        // advance the underwater dome (caustics scroll + god-ray drift) and
        // feed the music amplitude so the scene PULSES with the beat
        if (greninjaSkyMat) {
          greninjaSkyMat.uniforms.uTime.value = t;
          // smooth the reactive pulse a touch so it swells rather than flickers
          const pu = greninjaSkyMat.uniforms.uPulse;
          pu.value += (amp - pu.value) * 0.35;
        }
        // marine snow: drift + twinkle
        if (snowMesh && snowMesh.visible) {
          updateSnow(t);
          snowMesh.material.uniforms.uTime.value = t;
        }
        // cyan aura: strong fresnel rim with a subtle breathing pulse,
        // reacts a touch to audio. Tweak the 1.1 base for more/less glow.
        greninjaRim.intensity.value = 1.1 + Math.sin(t * 1.6) * 0.3 + amp * 0.5;
      } else {
        greninjaRim.intensity.value = 0;
      }

      // lightning lifecycle + audio-reactive trigger
      if (window.__lightning) {
        const dt = Math.min(0.05, t - (window.__lastT || t));
        const L = window.__lightning;
        for (const slot of L.slots) {
          if (slot.life > 0) {
            slot.life -= dt;
            // sharp falloff so bolts vanish fast (lightning IRL stays
            // visible only a few frames)
            const k = Math.max(0, slot.life / slot.maxLife);
            slot.mat.opacity = k * k;
            if (slot.life <= 0) slot.line.visible = false;
          }
        }
        // trigger: amp peaks above threshold, with cooldown.
        // music-driven strikes are kept rare so the scene doesn't
        // pile up into solid white; ambient trickle stays as-is.
        // rayquaza-only: no new strikes while greninja is shown (existing
        // bolts still decay out above, so the toggle leaves no artifacts).
        const ready = !isGreninja && (t - L.lastStrikeT) > L.cooldown;
        const ampTrigger     = ready && amp > 0.30 && Math.random() < 0.55;
        const ambientTrigger = ready && Math.random() < 0.025;
        if (ampTrigger || ambientTrigger) {
          L.fire();
          L.lastStrikeT = t;
        }

        // decay the glass charge and modulate OPTICAL properties of
        // the pk material. Heavy emissive made it read as glowing
        // plastic; instead we drive the glass-specific knobs so the
        // material itself feels "energized":
        //   - iridescence climbs (rainbow shimmer intensifies)
        //   - dispersion climbs (RGB split at edges goes wild)
        //   - clearcoat sharpens (mirror-flash on surface)
        //   - faint inner emissive lifts the body without dominating
        if (pkText) {
          glassCharge.v *= 0.94;
          if (glassCharge.v < 0.002) glassCharge.v = 0;
          const k = glassCharge.v;
          const mat = pkText.material;
          // bases (matching the baseline material config above)
          const baseIrid       = 0.25,  peakIrid       = 0.95;
          const baseDisp       = 0.20,  peakDisp       = 0.90;
          const baseClearcoat  = 0.50,  peakClearcoat  = 1.00;
          const baseCcRough    = 0.08,  peakCcRough    = 0.02;
          const baseEnv        = 1.00,  peakEnv        = 2.40;
          mat.iridescence        = baseIrid       + (peakIrid       - baseIrid)       * k;
          mat.dispersion         = baseDisp       + (peakDisp       - baseDisp)       * k;
          mat.clearcoat          = baseClearcoat  + (peakClearcoat  - baseClearcoat)  * k;
          mat.clearcoatRoughness = baseCcRough    + (peakCcRough    - baseCcRough)    * k;
          mat.envMapIntensity    = baseEnv        + (peakEnv        - baseEnv)        * k;
          // very subtle internal glow — just enough to suggest the
          // glass is conducting, not enough to read as a light bulb
          mat.emissive.setRGB(0.10 * k, 0.18 * k, 0.28 * k);
          mat.emissiveIntensity = 0.25 * k;
        }
      }
      window.__lastT = t;

      // GYARADOS — a RIGGED sea-serpent. Its real skeleton (head→tail chain
      // in userData.gyaChain) is driven with a Rayquaza-style PER-BONE
      // travelling wave, so the body undulates for real (no fake vertex-
      // shader displacement). Gyarados is huge + menacing: SLOW frequency,
      // LONG wavelength (~1.25 waves → a single smooth S along the body),
      // generous amplitude that grows toward the tail tip. A subtle vertical
      // weave (.x) + roll (.z) at offset phases adds 3D life; a gentle
      // whole-group bob/sway underneath gives buoyancy. Music level (amp)
      // lifts the swim a touch on the beat. Framerate-independent (clock t).
      if (currentPokemon === 'greninja' && greninjaModel) {
        const chain = greninjaModel.userData.gyaChain;
        if (chain && chain.length) {
          const N      = chain.length;
          const omega  = 0.95;                 // slow, heavy phase speed
          // ~0.9 waves along the body → ONE long, open S that extends out
          // (fewer waves = the body stretches into a flowing curve instead of
          // bunching into a tight hunched coil).
          const k      = (0.9 * 2 * Math.PI) / Math.max(1, N - 1);
          const react  = 1 + amp * 0.35;       // gentle beat boost
          const breathe = 0.8 + Math.sin(t * 0.22) * 0.2;
          // Rayquaza-style BASE+TIP envelope: the WHOLE body undulates (the
          // head/neck get a real baseline amplitude, not ~0) and it grows
          // toward the tail. Combined with a MULTI-HARMONIC wave (below) this
          // flows snakelike and extends out instead of bunching into a hump.
          const yBase  = 0.15, yTip = 0.40;    // lateral (yaw) — head moves too
          const xBase  = 0.05, xTip = 0.15;    // secondary vertical weave
          const zBase  = 0.03, zTip = 0.11;    // body roll
          for (let i = 0; i < N; i++) {
            const b = chain[i];
            if (!b || !b.userData.rest) continue;
            const u    = i / Math.max(1, N - 1);
            // smoothstep growth (not linear) → the bend is distributed evenly
            // down the body instead of kinking at the neck/upper-spine (the
            // hump). uShaped eases 0→1, so neighbouring bones differ gently.
            const uShaped = u * u * (3 - 2 * u);
            const ay   = (yBase + (yTip - yBase) * uShaped) * breathe * react;
            const ax   = (xBase + (xTip - xBase) * uShaped) * breathe;
            const az   = (zBase + (zTip - zBase) * uShaped) * breathe;
            const ph   = omega * t - k * i;
            // primary travelling wave + a slow half-harmonic + a tiny fast
            // ripple (same recipe as Rayquaza) — three sines sum to an organic,
            // fluid undulation rather than a stiff mechanical single bend.
            const wave =
              Math.sin(ph)                               * 0.85 +
              Math.sin(omega * 0.45 * t - k * 0.55 * i + 1.2) * 0.30 +
              Math.sin(omega * 1.9  * t - k * 1.30 * i + 0.7) * 0.10;
            b.rotation.y = b.userData.rest.y + wave * ay;
            b.rotation.x = b.userData.rest.x + Math.sin(ph + Math.PI / 2) * ax;
            b.rotation.z = b.userData.rest.z + Math.sin(omega * 0.6 * t - k * 0.7 * i) * az;
          }
        }
        // whole-group buoyancy bob/sway UNDER the bone wave
        const b = greninjaModel.userData.basePos;
        if (b) {
          const react = 1 + amp * 0.5;
          greninjaModel.position.y = b.y + Math.sin(t * 0.26)       * 0.45 * react;
          greninjaModel.position.x = b.x + Math.sin(t * 0.15 + 0.5) * 0.45;
          greninjaModel.position.z = b.z + Math.sin(t * 0.13 + 1.2) * 0.35;
          const baseRotX = greninjaModel.userData.baseRotX || 0;
          const baseRotY = greninjaModel.userData.baseRotY || 0;
          const baseRotZ = greninjaModel.userData.baseRotZ || 0;
          // additive idle sway on top of the rearing 3/4 base pose
          greninjaModel.rotation.z = baseRotZ + Math.sin(t * 0.12)       * 0.05;            // slow coil
          greninjaModel.rotation.y = baseRotY + Math.sin(t * 0.045)      * 0.12;            // slow hunting survey
          greninjaModel.rotation.x = baseRotX + Math.sin(t * 0.16 + 0.6) * 0.05 * react;   // gentle rear
        }
      }

      if (currentPokemon === 'rayquaza' && model) {
        // handle a forwarded click: raycast against the model; on a hit,
        // play the cry through the parent + kick the jaw-flare reaction.
        if (window.__heroClick) {
          const c = window.__heroClick; window.__heroClick = null;
          raycaster.setFromCamera({ x: c.x, y: c.y }, camera);
          const hits = raycaster.intersectObject(model, true);
          if (hits.length) {
            cryT = t;
            try { window.parent && window.parent.__playCry && window.parent.__playCry(); } catch (e) {}
          }
        }

        /* full-body traveling wave + layered motion. wave travels
           head→tail (-k*i), amplitude grows toward the tip. Two
           harmonics overlaid for organic feel. Lateral (Y) is the main
           snake motion; vertical (X) adds 3D life; whole-body drift
           gives it scale. */
        const N = bodyChain.length;
        const omega    = 1.7;
        const k        = 0.62;
        // amplitude breathes between ~30% and 100% so undulation has dynamics
        const breathe  = 0.65 + Math.sin(t * 0.31) * 0.35;
        // bigger floor at the head end so head/neck don't read stiff
        // next to the punchy tail
        const yBase    = 0.10;
        const yTip     = 0.42;
        const xBase    = 0.05;
        const xTip     = 0.18;

        /* ── CRY SPASM intensity (0..1) ───────────────────────────────
           Drives the whole-body convulsion that overrides the calm idle
           undulation during the screech. Must match the cry timing used
           by the BALLISTIC SCREECH block below (CRY_DUR / since). Shaped
           so it builds at the scream onset, rides the real audio loudness
           through the sustain, then eases cleanly to 0 over the recovery
           tail — no pop at start or end. */
        const SPASM_CRY_DUR = 1.55;            // == CRY_DUR below
        const sinceSpasm    = t - cryT;
        const cryActive     = (sinceSpasm >= 0 && sinceSpasm < SPASM_CRY_DUR);
        const cryEnv        = cryActive ? ampAt(sinceSpasm * 1000) : 0;  // 0..1 real loudness
        let spasm = 0;
        if (cryActive) {
          const fc = sinceSpasm / SPASM_CRY_DUR;
          // ramp in over the first ~0.15s (snap), full body through sustain,
          // fade out across the recovery tail (last ~15%)
          const rampIn  = easeOutCubic(clamp01(sinceSpasm / 0.15));
          const fadeOut = 1 - easeInOutCubic(clamp01((fc - 0.85) / (1 - 0.85)));
          // ride the audio envelope through the hold so it warbles with the
          // sound, but keep a strong floor so it never goes limp mid-roar
          spasm = rampIn * fadeOut * (0.55 + 0.45 * cryEnv);
        }
        spasm = clamp01(spasm);
        // idle undulation gives way to the convulsion (don't fully kill it)
        const idleScale = 1 - 0.6 * spasm;

        for (let i = 0; i < N; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          const u   = i / Math.max(1, N - 1);
          const amp = (yBase + (yTip - yBase) * u) * breathe;
          const axp = (xBase + (xTip - xBase) * u) * breathe;
          // primary travelling wave + second harmonic at half speed for chaos
          const wave =
            Math.sin(omega * t - k * i)               * 0.85 +
            Math.sin(omega * 0.45 * t - k * 0.55 * i + 1.2) * 0.35 +
            Math.sin(omega * 1.9 * t - k * 1.3 * i + 0.7)   * 0.12;  // small fast ripple
          b.rotation.y = b.userData.rest.y + wave * amp * idleScale;
          b.rotation.x = b.userData.rest.x + Math.sin(omega * t - k * i + Math.PI/2) * axp * 0.7 * idleScale;
          // z roll along the chain too — subtle, makes the tail flick read 3D
          b.rotation.z = b.userData.rest.z + Math.sin(omega * 0.6 * t - k * 0.7 * i) * amp * 0.35 * idleScale;

          /* ── AGONY WRITHE — violent, chaotic convulsion over the whole
             chain while screaming. High-freq shudder (vs the calm idle
             omega≈1.7) built from 3 incommensurate frequencies + per-bone
             phase offsets so it reads irregular/spasming, not a clean wave.
             Grows toward the tail (uu) so the tail thrashes hardest, head
             least (head/neck also driven by the cry block, so keep their
             share modest). A DC curl ramps the tail under so the body looks
             clenched/withering with the shudder riding on top. */
          if (spasm > 0.0001) {
            // emphasise the tail: near-0 at head, →1 at tip, slightly eased
            const uu  = u * u * (0.25 + 0.75 * u);   // head≈0, tail≈1, biased to tip
            const ph  = i * 1.7;                     // fixed per-bone phase (pseudo-random-ish)
            const amt = spasm * cryEnv;              // peak only on loud moments
            // lateral thrash (biggest) — three detuned shudders
            const thrashY =
              Math.sin(13.0 * t + i * 1.7)            * 0.55 +
              Math.sin( 9.3 * t - i * 2.3 + 0.6)      * 0.30 +
              Math.sin(21.0 * t + i * 0.9)            * 0.15;
            // vertical buckling
            const thrashX =
              Math.sin(11.0 * t - i * 1.3 + 2.1)      * 0.6 +
              Math.sin(16.5 * t + i * 2.0)            * 0.4;
            // roll / twist
            const thrashZ =
              Math.sin( 8.7 * t + i * 1.1 + 1.4)      * 0.6 +
              Math.sin(19.0 * t - i * 0.7)            * 0.4;
            // DC curl: tail clenches under as the spasm ramps in
            const curl = spasm * uu * 0.45;          // body bows/withers at peak
            b.rotation.y += thrashY * 0.50 * uu * amt;
            b.rotation.x += thrashX * 0.25 * uu * amt - curl;
            b.rotation.z += thrashZ * 0.30 * uu * amt + Math.sin(ph) * curl * 0.4;
          }
        }

        // independent head + neck animation — surveys side to side and
        // tilts, applied across the first three bones with falloff so
        // the head leads, neck2 follows, neck1 trails. fixes the
        // stiff-neck look against the wagging tail.
        for (let i = 0; i < 3; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          const falloff = i === 0 ? 1.0 : (i === 1 ? 0.7 : 0.45);
          b.rotation.y += (Math.sin(t * 0.42 + i * 0.4) * 0.20 +
                           Math.sin(t * 0.18 + 1.1 + i * 0.3) * 0.10) * falloff;
          b.rotation.x +=  Math.sin(t * 0.31 + 1 + i * 0.25) * 0.09 * falloff;
          b.rotation.z +=  Math.sin(t * 0.24 + 0.5 + i * 0.2) * 0.06 * falloff;
        }

        // independent SPINE sway — tightened. Only the two true spine
        // bones (Spine2, Spine1) get a small extra lateral motion so
        // the core has presence without fighting the body wave already
        // running through. No X-tilt (was reading as uncertain), small
        // Z roll only.
        for (let i = 3; i <= 4 && i < bodyChain.length; i++) {
          const b = bodyChain[i];
          if (!b || !b.userData.rest) continue;
          b.rotation.y += Math.sin(t * 0.28 + i * 0.5)       * 0.05;
          b.rotation.z += Math.sin(t * 0.22 + 0.7 + i * 0.4) * 0.04;
        }

        // jaw — idle breathing + occasional snap. The screech overrides
        // this in the dedicated cry block at the end of the frame.
        if (jaw) {
          const breath = Math.sin(t * 1.1) * 0.06 + 0.06;
          const snap   = Math.max(0, Math.sin(t * 0.55 - 1)) ** 10 * 0.30;
          jaw.rotation.x = jaw.userData.rest.x + breath + snap;
        }

        // arms — bigger wing-like sway, opposite phase + a Y rotation
        // so they don't just flap straight up/down
        const armSway = Math.sin(t * 1.05) * 0.16;
        const armYaw  = Math.sin(t * 0.7)  * 0.10;
        arms.L.forEach((b, i) => {
          b.rotation.z = b.userData.rest.z + armSway * (1 + i*0.3);
          b.rotation.y = b.userData.rest.y + armYaw  * (1 + i*0.2);
        });
        arms.R.forEach((b, i) => {
          b.rotation.z = b.userData.rest.z - armSway * (1 + i*0.3);
          b.rotation.y = b.userData.rest.y - armYaw  * (1 + i*0.2);
        });

        // whole-body motion — kept tighter so the body stays anchored
        // between the letters and doesn't drift far from the "in
        // between p and k" silhouette. rotations carry most of the
        // life now; translations are gentle accents.
        const MODEL_X_OFFSET = -1;
        model.position.y =                 Math.sin(t * 0.32)        * 0.45;
        model.position.x = MODEL_X_OFFSET + Math.sin(t * 0.21 + 0.5) * 0.55;
        model.position.z =                  Math.sin(t * 0.18 + 1.2) * 0.45;
        model.rotation.z = Math.sin(t * 0.24) * 0.10;
        model.rotation.y = Math.sin(t * 0.17) * 0.07;
        model.rotation.x = Math.sin(t * 0.20 + 0.6) * 0.05;

        /* ── BALLISTIC SCREECH ──────────────────────────────────────
           One deliberate, sustained roar (not a vibration), additive on
           top of the idle pose. The whole thing is mapped onto the ACTUAL
           1.50s cry audio (see CRY_AMP / ampAt) so the mouth and the body
           heave track the real sound. Timeline over CRY_DUR (≈1.55s):
             0–8%   ANTICIPATION  — head/neck rear back, jaw cracks open,
                                    body coils back (windup ≈120ms, fast,
                                    because the audio attacks instantly)
             8–16%  THRUST/SNAP   — head whips forward+down (overshoot),
                                    jaw SNAPS wide, body recoils hard;
                                    landing ≈ the audio's full-amplitude
                                    onset (~240ms)
             16–85% SUSTAIN       — the big held roar (~1.07s). Jaw is
                                    driven by ampAt() so it warbles with
                                    the sound. Head surveys + bobs, neck
                                    lags, body heaves/sways scaled by the
                                    envelope — alive, not frozen.
             85–100% RECOVERY     — jaw follows ampAt() down as the audio
                                    fades (1280→1520ms), head + body settle.
           All driven by `since`, so it's smooth at any framerate. Each
           phase's start value equals the previous phase's end value. */
        const CRY_DUR = 1.55;     // ≈ audio length (1.50s) + a little settle
        const P_ANT = 0.08, P_SNAP = 0.16, P_SUS = 0.85; // phase boundaries
        const since = t - cryT;
        if (since >= 0 && since < CRY_DUR) {
          const f  = since / CRY_DUR;
          const ms = since * 1000;
          const head = bodyChain[0], neck = bodyChain[1];

          // envelope sample (0..1) and a sustain-local progress 0..1 used to
          // shape the slow, low-frequency "living" motion through the roar.
          const env = ampAt(ms);
          const su  = clamp01((f - P_SNAP) / (P_SUS - P_SNAP)); // 0 at snap → 1 at recovery start

          // ── HEAD pitch (rear back + → thrust forward −, overshoot → live) ──
          let headX;
          if      (f < P_ANT)  headX = lerp(0, 0.20, seg(since, 0, P_ANT*CRY_DUR, easeOutCubic));
          else if (f < P_SNAP) headX = lerp(0.20, -0.26, seg(since, P_ANT*CRY_DUR, P_SNAP*CRY_DUR, easeOutBack));
          else if (f < P_SUS) {
            // slow forward drift across the roar + a gentle low-freq bob, all
            // additive on the snap's −0.26 landing. Heaves a touch with `env`.
            const drift = lerp(-0.26, -0.14, easeInOutCubic(su));     // creeps forward over the hold
            const bob   = Math.sin(su * Math.PI * 2.0) * 0.05;        // one slow nod through the roar
            headX = drift + bob - 0.03 * env;                         // dips deeper on louder moments
          } else {
            const e = seg(since, P_SUS*CRY_DUR, CRY_DUR, easeInOutCubic);
            headX = lerp(-0.14, 0, e);                                // settle from the sustain end value
          }

          // ── HEAD yaw / roll — slow side survey + roll so it keeps living ──
          let headY = 0, headZ = 0;
          if (f >= P_SNAP && f < P_SUS) {
            headY = Math.sin(su * Math.PI * 1.5 + 0.4) * 0.06;        // slow side survey ±0.06
            headZ = Math.sin(su * Math.PI * 1.2)       * 0.04;        // gentle roll ±0.04
          } else if (f >= P_SUS) {
            const e = seg(since, P_SUS*CRY_DUR, CRY_DUR, easeInOutCubic);
            headY = lerp(Math.sin(Math.PI*1.5+0.4)*0.06, 0, e);      // ease the survey/roll back to 0
            headZ = lerp(Math.sin(Math.PI*1.2)*0.04,     0, e);
          }

          // ── NECK — follows the head, smaller + with a slight lag ──
          let neckX;
          if      (f < P_ANT)  neckX = lerp(0, 0.13, seg(since, 0, P_ANT*CRY_DUR, easeOutCubic));
          else if (f < P_SNAP) neckX = lerp(0.13, -0.12, seg(since, P_ANT*CRY_DUR, P_SNAP*CRY_DUR, easeOutCubic));
          else if (f < P_SUS) {
            const sl    = clamp01(su - 0.06) / (1 - 0.06);            // lag the head a touch
            const drift = lerp(-0.12, -0.06, easeInOutCubic(sl));
            const bob   = Math.sin(sl * Math.PI * 2.0) * 0.025;
            neckX = drift + bob - 0.015 * env;
          } else {
            const e = seg(since, P_SUS*CRY_DUR, CRY_DUR, easeInOutCubic);
            neckX = lerp(-0.06, 0, e);
          }
          const neckY = headY * 0.5, neckZ = headZ * 0.5;             // follow head with falloff

          // ── JAW — pre-open → SNAP wide → ride the REAL envelope → fade ──
          const JAW_BASE = 0.45, JAW_MAX = 0.95;
          let jawX;
          if      (f < P_ANT)  jawX = lerp(0, 0.30, seg(since, 0, P_ANT*CRY_DUR, easeOutCubic));
          else if (f < P_SNAP) jawX = lerp(0.30, JAW_BASE + (JAW_MAX-JAW_BASE)*ampAt(P_SNAP*CRY_DUR*1000),
                                           seg(since, P_ANT*CRY_DUR, P_SNAP*CRY_DUR, easeOutCubic));
          else {
            // PRIMARY motion: mouth open amount tracks the audio loudness/warble.
            jawX = JAW_BASE + (JAW_MAX - JAW_BASE) * env;
            // subtle high-freq micro-tremor, only in the first ~200ms of sustain
            if (f < P_SUS) {
              const tre = Math.exp(-(since - P_SNAP*CRY_DUR) * 10);   // dies within ~200ms
              jawX += 0.03 * tre * Math.sin(since * Math.PI * 46);
            }
            // (RECOVERY needs no special case — env itself decays to ~0 over
            //  the audio tail, so the mouth closes in sync with the dying sound)
          }

          // ── WHOLE BODY — coil → hard recoil → slow settle-forward + heave ──
          let mZ, mPitch, mRoll = 0, mX = 0;
          if (f < P_ANT) {
            const e = seg(since, 0, P_ANT*CRY_DUR, easeOutCubic);
            mZ = lerp(0, 0.6, e); mPitch = lerp(0, 0.04, e);
          } else if (f < P_SNAP) {
            const e = seg(since, P_ANT*CRY_DUR, P_SNAP*CRY_DUR, easeOutBack);
            mZ = lerp(0.6, -1.5, e); mPitch = lerp(0.04, -0.06, e);   // recoil hard on the snap
          } else if (f < P_SUS) {
            // slow recoil-and-recover surge: from the hard −1.5 recoil, the
            // body eases forward through the roar, with a continuous sway/roll
            // and a heave scaled by the live envelope so it reacts to the sound.
            const settle = easeOutCubic(su);
            mZ     = lerp(-1.5, -0.5, settle) - 0.35 * env;           // heaves back on louder moments
            mPitch = lerp(-0.06, -0.03, settle) - 0.02 * env;
            mRoll  = Math.sin(su * Math.PI * 1.3 + 0.2) * 0.06 * (0.5 + 0.5*env); // slow sway, louder = bigger
            mX     = Math.sin(su * Math.PI * 1.0)       * 0.30;       // gentle lateral drift
          } else {
            const e = seg(since, P_SUS*CRY_DUR, CRY_DUR, easeInOutCubic);
            mZ     = lerp(-0.5 - 0.35*ampAt(P_SUS*CRY_DUR*1000), 0, e);
            mPitch = lerp(-0.03, 0, e);
            mRoll  = lerp(Math.sin(Math.PI*1.3+0.2)*0.06, 0, e);
            mX     = lerp(Math.sin(Math.PI*1.0)*0.30,     0, e);
          }

          // ── ARMS (wing-like) — flare wider through the roar, scaled by env ──
          if (f >= P_ANT) {
            const flare = (f < P_SUS)
              ? easeOutCubic(clamp01((f - P_ANT) / (P_SUS - P_ANT))) * (0.5 + 0.5*env)
              : lerp(0.5 + 0.5*ampAt(P_SUS*CRY_DUR*1000), 0, seg(since, P_SUS*CRY_DUR, CRY_DUR, easeInOutCubic));
            const armFlare = 0.30 * flare;   // extra outward sway on top of idle
            arms.L.forEach((b, i) => { if (b.userData.rest) b.rotation.z += armFlare * (1 + i*0.3); });
            arms.R.forEach((b, i) => { if (b.userData.rest) b.rotation.z -= armFlare * (1 + i*0.3); });
          }

          if (head && head.userData.rest) { head.rotation.x += headX; head.rotation.y += headY; head.rotation.z += headZ; }
          if (neck && neck.userData.rest) { neck.rotation.x += neckX; neck.rotation.y += neckY; neck.rotation.z += neckZ; }
          if (jaw) jaw.rotation.x = jaw.userData.rest.x + Math.max(0, jawX);
          model.position.z += mZ;
          model.position.x += mX;
          model.rotation.x += mPitch;
          model.rotation.z += mRoll;

          // ── WHOLE-MODEL AGONY SHAKE — fast high-freq tremor on top of the
          // recoil/sway above, so the entire creature visibly shudders while
          // it screams. Scaled by spasm*env (computed above) so it builds at
          // the onset and dies as the cry fades — additive, smooth at edges.
          const shake = spasm * cryEnv;
          if (shake > 0.0001) {
            model.position.x += (Math.sin(34 * t) * 0.10 + Math.sin(53 * t + 1.3) * 0.05) * shake;
            model.position.y += (Math.sin(41 * t + 0.7) * 0.10 + Math.sin(27 * t) * 0.05) * shake;
            model.rotation.z += Math.sin(47 * t + 0.4) * 0.05 * shake;
            model.rotation.x += Math.sin(38 * t + 2.1) * 0.04 * shake;
            model.rotation.y += Math.sin(30 * t + 1.1) * 0.04 * shake;
          }
        }
      }

      // camera locked — frame the model + pk text dead center. we'll
      // add motion back later once the composition is right.
      camera.position.set(modelCenter.x, modelCenter.y + 4, modelCenter.z + 55);
      camera.lookAt(modelCenter);

      // audio-reactive bloom — subtle pulse around base strength
      {
        const target = 0.55 + amp * 0.45;
        bloomPass.strength += (target - bloomPass.strength) * 0.08;
      }

      // audio-reactive camera FOV breath — tiny zoom-in on bass hits
      {
        const targetFov = 38 - amp * 0.6;
        camera.fov += (targetFov - camera.fov) * 0.10;
        camera.updateProjectionMatrix();
      }

      composer.render();
    }
    tick();
  </script>
</body>
</html>
